<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Knowledge Graph</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.34.0/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
body{margin:0;background:#0f1117;color:#e2e8f0;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}
#hd{padding:8px 16px;background:#1a1f2e;border-bottom:1px solid #2d3748;font-size:12px;color:#90cdf4}
#cy{flex:1}
#info{position:fixed;right:0;top:32px;width:240px;background:#1a1f2e;padding:10px;height:calc(100vh - 32px);overflow:auto;font-size:11px;border-left:1px solid #2d3748}
</style>
</head>
<body>
<div id="hd">Loading KG...</div>
<div id="cy"></div>
<div id="info"><em style="color:#718096">Click a node</em></div>
<script>
cytoscape.use(cytoscapeFcose);
var COLORS = {
  'harness:recipe':'#4299e1','harness:skill':'#9f7aea','harness:agent':'#48bb78',
  'harness:doc':'#718096','epic':'#f6ad55','feature':'#fc8181',
  'acceptance_criterion':'#68d391','test':'#4fd1c5','code_file':'#b794f4',
  'derived_status':'#e53e3e'
};
var jsonl = atob('');
var filter = null;
var nodeMap = {}, rels = [];
jsonl.split('
').filter(Boolean).forEach(function(l) {
  try {
    var d = JSON.parse(l);
    if (d.type === 'entity' && !nodeMap[d.name]) nodeMap[d.name] = d;
    else if (d.type === 'relation') rels.push(d);
  } catch(e) {}
});
var nodes = Object.values(nodeMap)
  .filter(function(n) { return !filter || n.entityType === filter; })
  .map(function(n) { return { data: { id: n.name, label: n.name.length > 20 ? n.name.slice(0,18) + '...' : n.name, entityType: n.entityType, obs: n.observations, derived: n.derived } }; });
var ids = new Set(nodes.map(function(n) { return n.data.id; }));
var edges = rels
  .filter(function(r) { return ids.has(r.from) && ids.has(r.to); })
  .map(function(r, i) { return { data: { id: 'e' + i, source: r.from, target: r.to, label: r.relationType, derived: r.derived } }; });
document.getElementById('hd').textContent = 'KG: ' + nodes.length + ' entities - ' + edges.length + ' relations';
var cy = cytoscape({
  container: document.getElementById('cy'),
  elements: nodes.concat(edges),
  style: [
    { selector: 'node', style: { 'label': 'data(label)', 'font-size': 9, 'text-valign': 'bottom', 'color': '#a0aec0',
      'background-color': function(n) { return COLORS[n.data('entityType')] || '#a0aec0'; },
      'border-width': function(n) { return n.data('derived') ? 2 : 0; },
      'border-color': '#f6ad55', 'border-style': 'dashed' }},
    { selector: 'edge', style: { 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'arrow-scale': 0.7,
      'line-color': function(e) { return e.data('derived') ? '#f6ad55' : '#4a5568'; },
      'target-arrow-color': function(e) { return e.data('derived') ? '#f6ad55' : '#4a5568'; },
      'label': 'data(label)', 'font-size': 7, 'color': '#4a5568',
      'line-style': function(e) { return e.data('derived') ? 'dashed' : 'solid'; } }},
    { selector: ':selected', style: { 'border-color': '#90cdf4', 'border-width': 3 }}
  ],
  layout: { name: 'fcose', quality: 'proof', animate: true }
});
cy.on('tap', 'node', function(e) {
  var d = e.target.data();
  var obs = (d.obs || []).map(function(o) { return '<div>' + o + '</div>'; }).join('');
  var out = cy.edges().filter(function(r) { return r.data('source') === d.id; }).map(function(r) { return '<div style="color:#68d391">-&gt; ' + r.data('label') + ' -&gt; ' + r.data('target') + '</div>'; }).join('');
  var inp = cy.edges().filter(function(r) { return r.data('target') === d.id; }).map(function(r) { return '<div style="color:#fc8181">&lt;- ' + r.data('label') + ' &lt;- ' + r.data('source') + '</div>'; }).join('');
  document.getElementById('info').innerHTML = '<b style="color:#90cdf4">' + d.id + '</b><br><em style="color:#9f7aea">' + d.entityType + '</em><hr>' + obs + out + inp;
});
</script>
</body>
</html>
