version: 1.0.0
title: Constitution — Project non-negotiable principles
description: >
  Creates or updates a project constitution at .specs/constitution.md.
  Establishes non-negotiable principles: testing conventions, approved technology stack,
  architecture guardrails, and quality gates. All plan.yaml runs are grounded by this.
  Run once per project at inception; amend with a new session when principles change.
  This fills the SDD Constitution phase — the first step before any Specify/Discover run.
instructions: |
  ## AD-001 Pattern: Specialist
  ## In-session agents: architect
  ## AD-001 pattern: Specialist. Load architect in-session for constitution synthesis; no Summon sub-sessions.
  ## Pattern rationale: constitution is authored by architect who understands
  ## technical constraints and organisational standards. Single in-session agent.
  ## Stop/escalation: if no project context can be found after bd prime and file inspection,
  ## ask the user at most 5 targeted questions before drafting; do not draft from zero context.

  You write the project constitution — a concise, non-negotiable governance layer that
  grounds every plan.yaml run. This is NOT a spec (it doesn't describe WHAT to build).
  It IS the answer to "what rules must every plan respect?"

  ## First visible output (required before any tool call)
  State this block before acting:
    Constitution scope: [project name]
    Mode: [create (new) | amend (existing .specs/constitution.md found)]
    Context sources: [AGENTS.md | STATE.md | README | package.json | user-provided]

  ## Required sections (all 5 must be present)

  ### I. Core Principles
  Non-negotiable engineering and architectural standards.
  Each principle: short title + 1–2 sentence rule.
  Minimum 3 principles. Examples:
  - "Library-first: every feature ships as an independently testable module."
  - "TDD mandatory: failing test must be confirmed RED before any production code is written."
  - "Spec-before-code: no implementation without a .specs/features/*/spec.md for Medium+ scope."

  ### II. Approved Technology Stack
  Explicitly list approved and forbidden items per concern.
  | Concern | Approved | Forbidden |
  |---|---|---|
  Forbidden column must not be empty — state "none currently" if nothing is forbidden.

  ### III. Quality Gates (non-negotiable)
  Measurable thresholds only — no aspirational prose:
  - Test coverage: ≥ NN% branch/function
  - CI: [list required pipeline checks]
  - Accessibility: WCAG 2.2 AA (or explicit N/A with reason)
  - Performance budget: [specific p95 latency, bundle size, or "N/A: CLI tool"]

  ### IV. Architecture Guardrails
  Structural rules each new design must respect:
  - One bullet per rule, checkable in code review
  - Examples: "No circular imports", "Services must be stateless", "No direct DB access from UI layer"

  ### V. Governance
  - Who can amend: [role or process]
  - Amendment process: [PR + approval criteria]
  - Version: X.Y.Z | Ratified: YYYY-MM-DD | Last amended: YYYY-MM-DD

  ## Process

  ### Step 1 — Orient
  1. `bd prime` — load architecture memories and active decisions.
  2. Read `.specs/constitution.md` if it exists — present current content to user.
  3. Read `STATE.md` (ADRs) — extract architectural decisions that become guardrails.
  4. Read `AGENTS.md` — extract conventions already established.
  5. Read `package.json`, `pyproject.toml`, or equivalent — confirm the actual tech stack.

  ### Step 2 — Draft (5-question max)
  If any of the 5 required sections cannot be filled from existing context:
  Ask targeted questions — one question per section gap, maximum 5 total.
  Never ask open-ended questions ("tell me about your project").
  Confirm the draft with the user before writing.

  ### Step 3 — Write and store
  Write `.specs/constitution.md` using the format below.
  Store pointer: `bd remember "Project constitution: .specs/constitution.md — read before any plan.yaml run" --key project-constitution`
  If STATE.md lacks an AD-NNN entry for the constitution, propose one.

  ### Step 4 — plan.yaml integration report
  After writing, check `.goose/recipes/plan.yaml` for a constitution check step (Step 1.5).
  If present: confirm — "plan.yaml is constitutionally grounded ✓"
  If absent: report — "plan.yaml does not yet reference the constitution.
    Add this to plan.yaml Step 1 Orient: 'Read .specs/constitution.md if present;
    its approved stack and guardrails constrain ALL task decomposition.'"

  ## Constitution file format
  ```markdown
  # [Project Name] Constitution

  > Version: 1.0.0 | Ratified: YYYY-MM-DD | Last amended: YYYY-MM-DD
  > Supersedes: [list of superseded docs or "nothing"]

  ## I. Core Principles

  ### [Principle name]
  [1–2 sentence rule]

  ## II. Approved Technology Stack

  | Concern | Approved | Forbidden |
  |---|---|---|
  | Language | | |
  | Framework | | |
  | Database | | |
  | Deployment | | |

  ## III. Quality Gates (non-negotiable)

  - **Test coverage**: ≥ NN% branch
  - **CI checks**: [list]
  - **Accessibility**: WCAG 2.2 AA
  - **Performance**: [budget or N/A]

  ## IV. Architecture Guardrails

  - [Rule 1]
  - [Rule 2]

  ## V. Governance

  - **Amendment process**: [description]
  - **Version**: X.Y.Z | **Ratified**: YYYY-MM-DD | **Last amended**: YYYY-MM-DD
  ```

  ## Self-validation before confirming
  - [ ] All 5 sections present and non-empty
  - [ ] At least 3 Core Principles defined
  - [ ] Technology Stack table has at least one Forbidden entry (or explicit "none currently")
  - [ ] Quality gates have measurable thresholds (numbers, not prose)
  - [ ] Governance has version + ratification date
  - [ ] Pointer memory stored in Beads
  - [ ] plan.yaml integration status reported
settings:
  max_turns: 25
parameters:
  - key: project
    input_type: string
    requirement: optional
    default: ""
    description: Project name. Defaults to current directory name if blank.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: mode
    input_type: select
    requirement: optional
    default: auto
    options: [auto, create, amend]
    description: auto=detect from .specs/constitution.md presence; create=new; amend=update existing.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
prompt: |
  Project: {{ project }}
  Repo: {{ repo_path }}
  Mode: {{ mode }}

  ## Step 0 — Elicit project if missing
  If the project line above is blank or empty, derive the project name from the
  current directory (basename of {{ repo_path }}). State the derived name in the
  First visible output block; do not ask unless the directory name is ambiguous.

  ## Step 1 — First visible output
  State: constitution scope, mode (create/amend), context sources identified.

  ## Step 2 — Orient
  load skills sdd. load skills agentic-devlopment.
  load agent architect.
  Run `bd prime`. Read `.specs/constitution.md` if present. Read `STATE.md` for active ADRs.
  Read `AGENTS.md` for project conventions. Read package manifest for tech stack facts.

  ## Step 3 — Draft constitution
  If mode=amend: show current constitution to user; identify outdated sections.
  Ask at most 5 targeted questions to fill gaps in the 5 required sections.
  Confirm the draft summary before writing to disk.

  ## Step 4 — Write and store
  Write `.specs/constitution.md` in the format defined in the instructions.
  Run: `bd remember "Project constitution: .specs/constitution.md — read before any plan.yaml run" --key project-constitution`

  ## Step 5 — plan.yaml integration check
  Read `.goose/recipes/plan.yaml` and check for "Constitution check" in Step 1.
  Report integration status. If absent, provide the exact text block to add.

  ## Step 6 — Handoff
  Report: constitution written at `.specs/constitution.md`, Beads pointer stored,
  plan.yaml integration status, recommended next step (/discover or /spec).
