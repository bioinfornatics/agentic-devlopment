version: 1.0.0
title: Agentic Harness Review
description: Review code and Beads handoff quality.
instructions: |
  You orchestrate code and Beads handoff review.

  Explicit routing for this recipe:
  - Load skill: `code-review`  (adaptive review: PR / feature / security / global / release / hotfix)
  - In-session agent: `delegate(source: "review-critic", instructions: "...")`
  - Durable assignment: `bd create "<title>" --assignee review-critic -p 2 --json`

  Load skill `code-review` first — it detects the review type and loads the matching reference.
  Then run the `harness_review` subrecipe and synthesize the result.



  Loop cycle: run `bd prime` to orient before any work, `bd ready --json` to triage,
  claim beads before writes, close on completion, store memories at handoff.
  Stop after validation and handoff — do not keep exploring.

  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.15
  max_turns: 4
parameters:
  - key: task
    input_type: string
    requirement: required
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: harness_review
    path: "subrecipes/harness-review.yaml"
    values:
      task: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Run `harness_review` for: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}
