version: 1.0.0
title: Harness Review — Comprehensive Quality Check
description: >
  Full-spectrum review of the agentic development harness: code quality,
  documentation consistency, recipe validation, and Beads workflow hygiene.
  Combines code-review and doc-review into a single pass and emits a
  unified APPROVE | PASS-WITH-NITS | BLOCK verdict.
instructions: |
  You orchestrate a comprehensive review of the agentic development harness.

  Explicit routing for this recipe (AD-001 — Specialist pattern):
  - load skill: code-review          (adaptive code/PR review methodology)
  - load skill: agentic-devlopment  (harness workflow rules and scope discipline)
  - load skill: beads                (memory-pointer format and Beads hygiene rules)
  - In-session agent: load agent review-critic

  ## First visible output (required before any tool call)
  State this exact block before any tool call or skill load:
    Harness-review scope: [code | docs | full]
    Focus: [what is being reviewed, or "full harness" if unspecified]
    Approach: [code subrecipe only | doc-review subrecipe only | both in sequence]

  ## Orient (bd prime FIRST — run before anything else)
  load skill: code-review.
  load skill: agentic-devlopment.
  load skill: beads.
  load agent review-critic.
  1. Run `bd prime` — load project memories and workflow context.
  2. Run `bd ready --json` — check for related review beads already open.
  3. Run `bd memories harness` — load any persisted harness quality facts.
  Only then proceed with the review workflow.

  ## Routing by scope

  **scope = code (or full)** → invoke the `review` subrecipe for code/diff changes.
  **scope = docs (or full)** → invoke the `doc-review` subrecipe for documentation consistency.
  **scope = full (default)** → invoke both subrecipes in sequence; synthesize into one report.

  When scope is "full", invoke code review first, then doc review. Collect all findings
  before synthesizing to avoid context fragmentation.

  ## Synthesis
  Merge findings from all review passes:
  - Deduplicate overlapping findings from code and documentation passes.
  - Rank all findings by severity: CRITICAL → HIGH → MEDIUM → LOW.
  - Before detailed findings, emit a summary table with CRITICAL/HIGH/MEDIUM/LOW counts and code/docs origin.
  - For every CRITICAL or HIGH finding, include exact file path, quoted evidence, concrete failure mode, proposed fix, and an exact `bd create` command.
  - Note cross-surface implications (e.g., a recipe change that also breaks doc accuracy).
  - Report recipe validation status explicitly, including each failed recipe path and validator error.
  - Emit a single unified verdict: APPROVE | PASS-WITH-NITS | BLOCK.

  Verdict semantics:
  - APPROVE       = zero actionable findings
  - PASS-WITH-NITS = only LOW/MEDIUM findings; no blocking issue
  - BLOCK         = one or more CRITICAL or HIGH findings with proof

  ## Self-validation checklist (complete before returning)
  - [ ] First visible output declared (scope + focus + approach)
  - [ ] bd prime run before any inspection
  - [ ] Code review subrecipe run (if scope is "code" or "full")
  - [ ] Doc-review subrecipe run (if scope is "docs" or "full")
  - [ ] Summary table emitted before detailed findings with CRITICAL/HIGH/MEDIUM/LOW counts
  - [ ] All findings severity-ranked (CRITICAL/HIGH/MEDIUM/LOW) with file references
  - [ ] Each CRITICAL/HIGH finding includes quoted evidence, concrete failure mode, fix, and exact `bd create` command
  - [ ] Recipe validation status reported, including failed paths/errors if any
  - [ ] Cross-surface implications noted between code and documentation changes
  - [ ] Single unified verdict emitted: APPROVE | PASS-WITH-NITS | BLOCK
  - [ ] Memory checkpoint explicitly records a proposed `bd remember` or states none was found
  - [ ] No files modified (read-only review unless explicitly instructed)

  Memory checkpoint:
  - At the end, decide whether a durable harness quality fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - Prefer pointer memories over content memories (< 250 chars, "read when" trigger).
  - Never store review findings in memory — create beads for actionable work.
settings:
  max_turns: 40
parameters:
  - key: task
    input_type: string
    requirement: optional
    default: ""
    description: >
      Review target — task description, bead ID, file path, or PR reference.
      Leave blank for a full harness review.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository root path (must contain .goose/ and .agents/).
  - key: scope
    input_type: select
    requirement: optional
    default: full
    options: [full, code, docs]
    description: >
      Review scope.
      full = code review + documentation review (default);
      code = code/diff/PR review only;
      docs = documentation consistency review only.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Extra review constraints or pass/fail criteria.
  - key: output_format
    input_type: select
    requirement: optional
    default: markdown
    options: [markdown, json]
    description: >
      Output format for the final report.
      markdown = human-readable report (default);
      json = structured JSON for CI integration.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: review
    path: "subrecipes/review.yaml"
    description: Code, diff, and PR review using the review-critic worker.
    values:
      task: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
  - name: doc-review
    path: "subrecipes/doc-review.yaml"
    description: Documentation consistency and memory-pointer hygiene review.
    values:
      scope: all
      repo_path: "{{ repo_path }}"
      focus: "{{ task }}"
      constraints: "{{ constraints }}"
prompt: |
  ## AD-001 pattern: Specialist. Load review-critic in-session for harness quality review.

  Task: {{ task }}
  Repo: {{ repo_path }}
  Scope: {{ scope }}
  Constraints: {{ constraints }}
  Output format: {{ output_format }}

  ## Step 0 — Elicit task if missing
  If the task line above is blank or empty AND scope is "code", ask the user:
  "What would you like me to review? (describe the goal, paste a bead ID, or provide a file/PR path)"
  Wait for their reply before proceeding.
  If scope is "docs" or "full" with no task, proceed immediately with a full harness review.

  ## Step 1 — First visible output
  State the scope, focus, and approach before any tool call or skill load.

  ## Step 2 — Orient
  load skill: code-review.
  load skill: agentic-devlopment.
  load skill: beads.
  load agent review-critic.
  Run `bd prime`, then `bd ready --json`, then `bd memories harness`.

  ## Step 3a — Code review (scope: full or code)
  If scope is "full" or "code":
    Invoke `review` subrecipe for: {{ task }}
    Collect severity-ranked code findings before proceeding.

  ## Step 3b — Documentation review (scope: full or docs)
  If scope is "full" or "docs":
    Invoke `doc-review` subrecipe (scope: all, focus: "{{ task }}").
    Collect severity-ranked documentation findings.

  ## Step 4 — Synthesize
  Merge all findings from both passes and deduplicate overlaps.
  Emit a summary table before the detailed findings with CRITICAL/HIGH/MEDIUM/LOW counts and code/docs origin.
  For each CRITICAL or HIGH finding, include exact file path, quoted evidence, concrete failure mode, proposed fix, and an exact `bd create` command.
  Note cross-surface implications between code and documentation changes.
  Emit one unified verdict: APPROVE | PASS-WITH-NITS | BLOCK.

  ## Step 5 — Handoff
  Report:
  - Summary table with total findings by severity (code + docs combined) before detailed findings
  - All CRITICAL/HIGH actionable findings with proposed fix and exact `bd create` command
  - Top 3 MEDIUM/LOW findings, if any, with concise fixes
  - Whether any recipe failed `goose recipe validate`, with path/error details
  - Unified verdict with one-sentence justification
  - Memory checkpoint: one proposed `bd remember` for a durable harness quality fact, or an explicit "none found" statement

  ## Output format
  If output_format is "json", emit only valid JSON with this schema:
  {
    "verdict": "APPROVE | PASS-WITH-NITS | BLOCK",
    "scope": "{{ scope }}",
    "focus": "{{ task }}",
    "summary": "<one sentence>",
    "findings": [{"severity": "...", "file": "...", "issue": "...", "fix": "..."}],
    "recipe_validation": {"passed": N, "failed": N, "errors": [...]},
    "memory_checkpoint": "<proposed memory or null>"
  }
  If output_format is "markdown", emit the human-readable report as usual.

  Stop after the handoff block. Do not continue exploring.
