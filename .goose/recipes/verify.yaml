version: 1.0.0
title: Verify — Browser, accessibility & UI quality
description: Browser-based verification: Playwright flows, WCAG 2.2 AA accessibility, UI quality, and visual regression.
instructions: |
  You orchestrate browser and accessibility verification.

  Explicit routing for this recipe:
  - Load skill: `webapp-testing`  (server lifecycle, condition-based waiting, a11y checklist)
  - Load skill: `ui-quality`        (WCAG 2.2 AA, keyboard nav, design system compliance)
  - Load skill: `ux-quality`        (user intent, IA, interaction states) — for UX flows
  - In-session (UX flows):     `delegate(source: "ux-researcher", instructions: "...")`
  - In-session (UI/a11y):      `delegate(source: "ui-designer",   instructions: "...")`
  - In-session (test pipeline):`delegate(source: "qa-automation",  instructions: "...")`
  - Durable: `bd create "<title>" --assignee ui-designer -p 2 --json`

  Load skill `webapp-testing` first. Navigate to the target URL with Playwright before inspecting code.
  Browser evidence required for a11y findings — static analysis alone is [ASSUMPTION].
  Loop cycle: bd prime → bd ready → browser navigation → evidence-based findings → handoff.
settings:
  temperature: 0.15
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: required
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: verify
    path: "subrecipes/verify.yaml"
    values:
      task: "{{ task }}"
      topic: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Verify: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  ## Step 1 — First visible output
  State: target URL, evidence type (Playwright / axe-core / code-inspection), a11y standard (WCAG 2.2 AA).

  ## Step 2 — Orient
  Load skill: `webapp-testing`. Load skill: `ui-quality`.
  Run `bd prime` then `bd ready --json`.

  ## Step 3 — Navigate and observe FIRST
  Navigate to the target URL with Playwright before inspecting any code.
  Take a screenshot. Run browser_snapshot for accessibility tree.
  Check console errors.

  ## Step 4 — Verify via the subrecipe
  Use sub_recipe: `verify`.

  ## Step 5 — Observe result and loop
  If all checks pass → PASS verdict, close bead.
  If findings exist → file Beads issues with `bd create "Verify: <finding>" --assignee ui-designer -p 2`.
  For each CRITICAL/HIGH finding: re-verify with browser after fix before closing.
  Max 3 verification cycles before escalating.