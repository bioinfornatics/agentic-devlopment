version: 1.0.0
title: Verify — Adaptive verification dispatcher
description: >
  Adaptive verification: detects what is being tested (API, web, CLI, library, UX/UI)
  and applies the appropriate protocol. API -> Bruno/curl; web -> Playwright/a11y;
  CLI -> shell; library -> test suite; UX/UI -> WCAG + design system.
instructions: |
  You orchestrate verification adapted to the target type.

  ## First visible output (required before any tool call)
  State this block before acting:
    Verify target: [name or URL]
    Detected type: [api | web | cli | library | ui | mixed]
    Protocol: [Bruno | Playwright | shell | test-suite | WCAG]

  ## Detect verification type from context

  | Signal | Type | Protocol |
  |---|---|---|
  | .bru files, OpenAPI spec, REST/gRPC endpoints, /api/ routes | api | Bruno + curl |
  | Browser URL, HTML/CSS/JS, React/Vue, frontend routes | web | Playwright + a11y |
  | Executable, argparse, main.py, bin/, shell script | cli | shell execution |
  | src/, lib/, package.json tests, pytest, cargo test | library | test suite |
  | Figma, design tokens, .css, component specs | ui | WCAG + design system |

  ## Skill and agent routing per type
  - api:     load skills agentic-dev-harness; delegate qa-automation
  - web:     load skills webapp-testing + ui-quality; delegate qa-automation + ui-designer
  - cli:     load skills agentic-dev-harness; delegate qa-automation
  - library: load skills agentic-dev-harness; delegate qa-automation
  - ui:     load skills ui-quality and design-systems-arch and atomic-design; delegate ui-designer

  ## Orient (bd prime FIRST)
  1. Run bd prime — load known defects, test memories, quality gates.
  2. Run bd ready --json — check for open verification beads.
  3. Read spec.md if present to extract [FEAT]-NN AC IDs to verify.

  ## Loop on failure (observe -> retry)
  For each failing check: bd create "Verify fail: <description>" --assignee <agent> -p 2
  After fix: re-verify that specific check. Max 3 cycles before escalating.
settings:
  temperature: 0.1
  max_turns: 40
parameters:
  - key: task
    input_type: string
    requirement: required
    description: What to verify — URL, bead ID, API endpoint, CLI command, or test suite path.
  - key: target_type
    input_type: select
    requirement: optional
    default: auto
    options: [auto, api, web, cli, library, ui]
    description: Verification type. Default auto-detects from context.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Test constraints, environment name, or specific flows to verify.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args: [beads-mcp]
    timeout: 300
  - type: stdio
    name: Playwright
    description: Browser automation (web + ui types only)
    cmd: npx
    args:
      - "@playwright/mcp@latest"
      - "--browser"
      - chromium
      - "--executable-path"
      - /usr/bin/chromium-browser
    timeout: 300
sub_recipes:
  - name: verify
    path: "subrecipes/verify.yaml"
    description: Isolated adaptive verification worker.
    values:
      task: "{{ task }}"
      target_type: "{{ target_type }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Verify: {{ task }}
  Type: {{ target_type }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  Step 1 — First visible output: state target, detected type, protocol before any tool call.
  Step 2 — Orient: bd prime, bd ready --json, read spec.md for [FEAT]-NN AC IDs.
  Step 3 — Detect type if auto: inspect file extensions, repo structure, task description.
  Step 4 — Load skills for detected type and use sub_recipe: verify.
  Step 5 — Observe result: PASS -> close bead. FAIL -> file Beads issue -> re-verify (max 3).