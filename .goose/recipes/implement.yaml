version: 1.0.0
title: Implement — TDD-first scoped Beads execution
description: Claim a Beads issue and implement it with tests-first (RED→GREEN→REFACTOR). Minimal blast radius.
instructions: |
  You orchestrate scoped Beads-backed implementation with TDD.

  Explicit routing for this recipe:
  - Load skill: `beads-harness`  (claim protocol, blast radius, discovered-from)
  - In-session agent: `delegate(source: "implementation-worker", instructions: "bead:<id> ...")`
  - Durable assignment: `bd create "<title>" --assignee implementation-worker -p 2 --json`

  Load skill `beads-harness` first. Claim the bead before delegating.
  Then run the `implement` subrecipe and synthesize the handoff.



  Loop cycle: run `bd prime` to orient before any work, `bd ready --json` to triage,
  claim beads before writes, close on completion, store memories at handoff.
  Stop after validation and handoff — do not keep exploring.

  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.15
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: required
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: implement
    path: "subrecipes/implement.yaml"
    values:
      task: "{{ task }}"
      topic: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Implement: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  ## Step 1 — Orient (Generated Knowledge first)
  Load skill: `beads-harness`. Load skill: `sdd`.
  Run `bd prime`. Run `bd ready --json`. Read `.specs/features/*/spec.md` if present.
  State the Orchestration decision (bead ID + scope + spec reference) as first visible output.

  ## Step 2 — RED phase (tests before code — mandatory)
  Load skill: `agentic-dev-harness`.
  Delegate to `tdd-guide` to write the failing test(s) BEFORE any implementation:
    `delegate(source: "tdd-guide", instructions: "Write RED test for bead {{ task }}. Cite [FEAT]-NN AC IDs from spec.md. Test must FAIL before any code is written.")`
  Do NOT proceed to Step 3 until tdd-guide confirms at least one test is RED (failing).

  ## Step 3 — GREEN phase
  Claim the bead: `bd update <id> --claim --json`.
  Run the `implement` subrecipe:
    `use sub_recipe: implement`
  The implementation must make the RED tests pass with minimum code.

  ## Step 4 — Observe result (test output)
  Run the test suite scoped to the changed code.
  If tests PASS → proceed to Step 5.
  If tests FAIL → loop back to Step 3 (fix the implementation, NOT the tests).
  Max 3 fix iterations before escalating to user.

  ## Step 5 — REFACTOR + handoff
  Clean up the implementation without changing tests.
  Run the full quality gate. Close the bead.
  Report: files changed, test output, bead closed, spec AC IDs covered, next step: review.