version: 1.0.0
title: Documentation Review
description: >
  Read-only documentation review workflow for the agentic development harness.
  Validates docs, recipe references, skill references, memory-pointer examples,
  and harness checklist consistency, then returns severity-ranked findings.
instructions: |
  You run the harness documentation review workflow. This is a read-only review;
  you MUST NOT modify files, Beads issues, or memory.

  Explicit routing for this recipe (AD-001 — Specialist pattern):
  - load skills agentic-devlopment  (read-only review protocol and handoff discipline)
  - load skills beads               (memory-pointer format and Beads hygiene rules)
  - In-session agent: load agent review-critic
  - Worker subrecipe: run `doc-review` for isolated documentation inspection.

  ## First visible output (required before any tool call)
  State this exact block before any tool call or skill load:
    Doc-review scope: [all | skills | recipes | docs | agents | memory]
    Focus: [specific item or "full documentation set" if unspecified]
    Approach: read-only documentation review via doc-review worker

  ## Orient (bd prime FIRST — run before inspection)
  1. load skills agentic-devlopment.
  2. load skills beads.
  3. load agent review-critic.
  4. Run `bd prime` — load project context and memories.
  5. Run `bd ready --json` — check for existing documentation-review work.

  ## Review workflow
  Run the `doc-review` subrecipe with the requested scope, focus, repository path,
  and constraints. Treat the worker output as evidence, verify that it reports
  `read_only: true`, then synthesize a final report. If the worker reports or causes
  any durable mutation, stop and return BLOCK with the mutation evidence.

  The review MUST cover, within the selected scope:
  - recipe validation results from `goose recipe validate`;
  - documentation and recipe cross-reference integrity;
  - skill and agent reference validity;
  - Beads memory-pointer examples (`canonical source is`, `read when`, `invariant:`);
  - harness workflow checklist presence;
  - TODO/FIXME/HACK hygiene in docs and harness recipe text.

  ## Verdict semantics
  - APPROVE = zero actionable findings.
  - PASS-WITH-NITS = only LOW/MEDIUM findings; no blocking issue.
  - BLOCK = one or more CRITICAL or HIGH findings with evidence.

  ## Self-validation checklist (complete before returning)
  - [ ] First visible output declared (scope + focus + approach).
  - [ ] No files, Beads issues, or memories modified.
  - [ ] bd prime run before documentation inspection.
  - [ ] doc-review worker run with the selected scope.
  - [ ] Findings are severity-ranked CRITICAL → HIGH → MEDIUM → LOW.
  - [ ] Every CRITICAL/HIGH finding has an exact file reference, quoted evidence, and proposed `bd create` command.
  - [ ] Recipe validation results are reported when recipes are in scope.
  - [ ] Final verdict emitted: APPROVE | PASS-WITH-NITS | BLOCK.

  Memory checkpoint:
  - Do not store memory during this read-only workflow.
  - If a durable documentation routing fact is discovered, propose a `bd remember` command instead.
  - If actionable work is discovered, propose Beads issues rather than TODO text.
settings:
  max_turns: 35
parameters:
  - key: scope
    input_type: select
    requirement: optional
    default: all
    options: [all, skills, recipes, docs, agents, memory]
    description: Documentation-review scope.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository root path.
  - key: focus
    input_type: string
    requirement: optional
    default: ""
    description: Optional narrowing focus — specific recipe, skill, doc path, or topic.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Additional review constraints or pass/fail criteria.
  - key: output_format
    input_type: select
    requirement: optional
    default: markdown
    options: [markdown, json]
    description: Final report format.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: doc-review
    path: "subrecipes/doc-review.yaml"
    description: Documentation consistency and memory-pointer hygiene review.
    values:
      scope: "{{ scope }}"
      repo_path: "{{ repo_path }}"
      focus: "{{ focus }}"
      constraints: "{{ constraints }}"
prompt: |
  ## AD-001 pattern: Specialist. Load review-critic in-session for documentation quality review.

  Scope: {{ scope }}
  Repo: {{ repo_path }}
  Focus: {{ focus }}
  Constraints: {{ constraints }}
  Output format: {{ output_format }}

  ## Step 1 — First visible output
  State Doc-review scope, focus, and approach before any tool call or skill load.

  ## Step 2 — Orient
  load skills agentic-devlopment.
  load skills beads.
  load agent review-critic.
  Run `bd prime`, then `bd ready --json`.

  ## Step 3 — Worker review
  Run `doc-review` subrecipe with scope={{ scope }}, repo_path={{ repo_path }}, focus={{ focus }}, constraints={{ constraints }}.
  Collect its severity-ranked findings and recipe validation results.

  ## Step 4 — Synthesize
  Emit a final report with:
  - Summary table: CRITICAL/HIGH/MEDIUM/LOW counts.
  - Findings in severity order, each with file reference, evidence, fix, and proposed bead for CRITICAL/HIGH.
  - Recipe validation table when recipes are in scope.
  - Read-only confirmation.
  - Unified verdict: APPROVE | PASS-WITH-NITS | BLOCK.
  - Memory checkpoint: proposed `bd remember` command or explicit "none".

  If output_format is "json", emit only valid JSON with this schema:
  {
    "verdict": "APPROVE | PASS-WITH-NITS | BLOCK",
    "scope": "{{ scope }}",
    "focus": "{{ focus }}",
    "summary": "<one sentence>",
    "findings": [{"severity": "...", "file": "...", "issue": "...", "evidence": "...", "fix": "...", "proposed_bead": "..."}],
    "recipe_validation": {"passed": N, "failed": N, "errors": []},
    "read_only": true,
    "memory_checkpoint": "<proposed memory or none>"
  }

  Stop after the final report. Do not modify files, Beads issues, or memory.
