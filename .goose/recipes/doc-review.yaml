version: 1.0.0
title: Documentation Review — Harness
description: >
  Review harness documentation for correctness, consistency, coverage, and
  memory-pointer hygiene. Inspects skills, recipes, AGENTS.md, and docs/
  without modifying any files. Produces severity-ranked findings and
  proposed Beads follow-ups.
instructions: |
  You orchestrate a read-only documentation review of the agentic development harness.

  ## First visible output (required before any tool call)
  State this block before acting:
    Doc-review scope: [skills | recipes | docs | agents | all]
    Focus: [what the user asked to review, or "full harness" if unspecified]
    Approach: [direct inspection | delegated to doc-review subrecipe]

  ## What this recipe reviews
  | Layer            | Paths                                    | Checks applied                                     |
  |------------------|------------------------------------------|----------------------------------------------------|
  | Skills           | .agents/skills/*.md                      | Required sections, pointer-memory format, examples |
  | Recipes          | .goose/recipes/*.yaml                    | goose recipe validate, extensions, sub_recipes     |
  | Subrecipes       | .goose/recipes/subrecipes/*.yaml         | goose recipe validate, isolated from parent        |
  | Agent configs    | .agents/agents/*.yaml or AGENTS.md       | Routing table accuracy, skill references           |
  | Documentation    | docs/*.md, README.md                     | Stale links, internal cross-references, completeness |
  | Memory pointers  | bd memories (live) or referenced in docs | "read when" trigger, canonical source, <250 chars  |

  ## Skill and agent routing
  - load skills agentic-dev-harness   (orientation, Beads workflow)
  - load skills beads-harness         (memory pointer format rules)
  - Delegate doc-review subrecipe     (isolated scan worker)
  - In-session escalation: load agent review-critic (when recipe/skill has CRITICAL finding)

  ## Orient (bd prime FIRST)
  1. Run `bd prime` — load project memories and workflow context.
  2. Run `bd ready --json` — check for related documentation or review beads already open.
  3. Run `bd memories documentation` — load any persisted documentation facts.
  Only then proceed to the review workflow.

  ## Documentation-specific checks

  ### Recipe validation
  For every *.yaml in .goose/recipes/ and .goose/recipes/subrecipes/:
    goose recipe validate <path>
  Report each result as PASS or FAIL with the full error if any.

  ### Skill completeness
  Each skill must contain:
  - A metadata block with name, description, version
  - At least one concrete example or command
  - A "## Load next" or progressive-disclosure section (if it references other skills)
  Check that every skill referenced in a recipe's instructions exists on disk.

  ### Memory pointer format (from beads-harness skill)
  For each `bd remember` call found in docs or skills:
  - Value must contain "read when <trigger>" (not "read before", not "read always")
  - Value must contain "canonical source is <file>#<section>"
  - Value must contain "invariant: <one-line rule>"
  - Value must be under 250 characters
  Report violations as HIGH findings.

  ### Internal cross-reference integrity
  - Every agent name referenced in a routing table must exist in .agents/agents/ or be discoverable via load().
  - Every subrecipe path in a sub_recipes block must exist on disk.
  - Every skill name in a `load skills <name>` instruction must resolve to a known skill.

  ### Harness workflow checklist presence
  For each recipe's instructions block, verify:
  - "First visible output" section present
  - "bd prime FIRST" mentioned or equivalent orient step
  - Self-validation checklist present (for implementation/review recipes)
  - Memory checkpoint present
  Report absent sections as MEDIUM findings.

  ### Beads hygiene in docs
  - Search for "TODO", "FIXME", "HACK" in .md and .yaml files.
  - Each found item is a LOW finding unless it has a corresponding open Beads bead.

  ## Severity scale
  | Severity | Criteria                                                        |
  |----------|-----------------------------------------------------------------|
  | CRITICAL | Recipe fails `goose recipe validate`; broken extension ref      |
  | HIGH     | Memory pointer format violation; missing skill on disk          |
  | MEDIUM   | Missing workflow checklist section; stale cross-reference       |
  | LOW      | Undocumented TODO; minor wording inconsistency                  |

  ## Proposed Beads follow-ups (do NOT execute — output commands only)
  For each CRITICAL or HIGH finding, output the command to create a tracking bead:
    bd create "<finding title>" -t bug -p 1 --json       # CRITICAL
    bd create "<finding title>" -t chore -p 2 --json     # HIGH

  ## Self-validation checklist (before returning)
  - [ ] First visible output declared (scope + focus + approach)
  - [ ] bd prime run before any inspection
  - [ ] All recipes validated with `goose recipe validate`
  - [ ] Memory pointer format checked against beads-harness rules
  - [ ] Internal cross-references verified
  - [ ] Findings severity-ranked
  - [ ] Proposed Beads follow-up commands included for CRITICAL/HIGH findings
  - [ ] No files modified (read-only review)

  ## Memory checkpoint
  - At the end, decide whether a durable documentation fact was learned.
  - If yes, propose (do not execute): `bd remember "<fact>" --key <stable-key>`.
  - Prefer pointer memories over content memories.
  - Never store the review findings themselves in memory — create beads for actionable work.
settings:
  max_turns: 35
parameters:
  - key: scope
    input_type: select
    requirement: optional
    default: all
    options: [all, skills, recipes, docs, agents, memory]
    description: >
      Which documentation layer to review.
      all = full harness review; individual options scope to one layer.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Path to the repository root containing .goose/ and .agents/.
  - key: focus
    input_type: string
    requirement: optional
    default: ""
    description: >
      Optional narrowing focus — e.g. a specific recipe name, skill name, or doc path.
      Leave blank for a full review of the selected scope.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Additional review constraints or pass/fail criteria.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: doc-review
    path: "subrecipes/doc-review.yaml"
    values:
      scope: "{{ scope }}"
      repo_path: "{{ repo_path }}"
      focus: "{{ focus }}"
      constraints: "{{ constraints }}"
prompt: |
  Scope: {{ scope }}
  Repo: {{ repo_path }}
  Focus: {{ focus }}
  Constraints: {{ constraints }}

  ## Step 0 — Elicit focus if helpful
  If scope is "all" and focus is blank, briefly confirm with the user:
  "I will review the full harness documentation (skills, recipes, AGENTS.md, docs/).
  Is there a specific area you want me to prioritise, or shall I run the full review?"
  If the user confirms full review, proceed immediately. Do not wait if focus is already set.

  ## Step 1 — First visible output
  State the scope, focus, and approach (direct inspection or delegated subrecipe)
  before any tool call.

  ## Step 2 — Orient
  load skills agentic-dev-harness. load skills beads-harness.
  Run `bd prime`, then `bd ready --json`, then `bd memories documentation`.

  ## Step 3 — Run doc-review subrecipe
  Delegate the inspection to the doc-review subrecipe for an isolated context window.
  Pass scope, repo_path, focus, and constraints.

  ## Step 4 — Synthesize
  Collect findings from the subrecipe. Group by severity (CRITICAL → HIGH → MEDIUM → LOW).
  For each CRITICAL/HIGH finding, include the proposed `bd create` command.

  ## Step 5 — Handoff
  Report:
  - Total findings by severity
  - Top 3 actionable findings with proposed fix or follow-up bead command
  - Whether any recipe failed `goose recipe validate`
  - Memory checkpoint: propose one `bd remember` if a durable doc fact was found
  Do NOT modify any file. Stop after the handoff block.
