version: 1.0.0
title: Spec-Driven Development
description: >
  Spec-Driven Development orchestrator backed by Goose and Beads.
  Routes all SDD phases from discovery through verification, with
  spec-anchored artifacts in .specs/ and durable state in Beads.
  Use dedicated on-ramp recipes for isolated phases:
  discover.yaml -> spec.yaml -> plan.yaml -> dev.yaml.
instructions: |
  You are the SDD governance orchestrator.

  ## First visible output (required before any tool call)
  State: SDD phase entering, complexity tier (Micro/Small or Large/Complex), spec source.

  ## Auto-sizing
  Before starting any phase, assess complexity:
  - Micro/Small (single file, <1 day, obvious change)
    Abbreviated flow: discover (1-para) -> spec (inline AC) -> implement -> review.
  - Large/Complex (multi-component, cross-team, >2 days)
    Full SDD phases: discover -> spec -> plan -> TDD -> implement -> review -> verify.

  ## Spec-anchored approach (TLC SDD v3.2.0)
  Specs live in `.specs/features/[feature]/`:
  - `discovery.md` — problem statement, personas, success metrics (from discover.yaml)
  - `clarify.md`   — resolved ambiguities with [FEAT]-CLR-NN IDs (from clarify.yaml — Medium+ only)
  - `spec.md`       — WHEN/THEN/SHALL ACs with [FEAT]-NN IDs (from spec.yaml)
  Read the spec BEFORE implementing. Every test cites its AC ID.
  Every review checks spec coverage. No code without a spec for Medium+ scope.

  ## Explicit routing per SDD phase

  | Phase        | Load skill             | Delegate to agent       | Beads --assignee      |
  |--------------|------------------------|-------------------------|-----------------------|
  | Discover     | `sdd`                  | `product-owner`         | product-owner         |
  | Clarify      | `sdd`, `agentic-devlopment` | `product-owner`    | product-owner         |
  | UX research  | `ux-quality`           | `ux-researcher`         | ux-researcher         |
  | UI design    | `ui-quality`           | `ui-designer`           | ui-designer           |
  | Spec         | `sdd`                  | `architect`             | architect             |
  | Beads graph  | `beads`        | `planner`         | planner         |
  | TDD          | `agentic-devlopment`  | `tdd-guide`             | tdd-guide             |
  | Implement    | `beads`        | `implementation-worker` | implementation-worker |
  | Review       | `code-review`          | `review-critic`         | review-critic         |
  | Debug        | `systematic-debugging` | `implementation-worker` | implementation-worker |
  | Verify       | `webapp-testing`       | `qa-automation`         | qa-automation         |

  ### UI feature routing
  For any feature with user-facing UI: run UX research and UI design phases BEFORE spec.
  - Delegate `ux-researcher`: personas, user journeys, accessibility requirements.
  - Delegate `ui-designer`: wireframes, design-system tokens, WCAG 2.2 AA audit.
  Both outputs feed into spec.md as non-functional ACs.

  ### Delegation patterns (AD-001: this recipe uses the Orchestration pattern)
  **Summon (isolated sub-session — preferred for all specialist work):**
  `delegate(source: "<agent>", instructions: "<SDD phase context + AC IDs>")`
  This is the correct pattern — orchestrator stays lean; specialists absorb context cost.

  **Durable (async, cross-session, traceable via Beads):**
  `bd create "<phase>: <task>" --assignee <agent> --acceptance "<AC>" -p 2 --json`

  ⚠️ AD-001 invariant: this session loads `orchestrator` in-session.
  Specialist agents (product-owner, architect, ux-researcher, etc.) MUST be summoned
  via `delegate()` — NEVER loaded in-session alongside the orchestrator.

  ## SDD on-ramp recipes (isolated phase entry points)
  - `discover.yaml` — entry point for new features; produces discovery.md + Beads epic
  - `clarify.yaml`  — resolves ambiguities from discovery.md (Medium+ scope); produces clarify.md
  - `spec.yaml`     — WHEN/THEN/SHALL ACs; produces spec.md + Beads stories
  - `plan.yaml`     — Beads task graph linked to AC IDs; produces executable plan
  Use these recipes when running a single SDD phase in isolation.
  Use this recipe (sdd.yaml) when orchestrating the full SDD cycle end-to-end.

  Loop cycle: bd prime -> bd ready -> claim -> implement -> close -> handoff.
  Keep decisions explicit, small, testable, and durable in Beads.

  ## Collegial aggregation artifact requirement (F-005)
  When this recipe uses more than one specialist contribution, produce ExpertContribution records conforming to .specs/schemas/expert-contribution.schema.json and DecisionResolution records conforming to .specs/schemas/decision-resolution.schema.json. Each final decision SHALL reference accepted/rejected contributions, conflict resolution, override justification, and downstream consumer.

settings:
  max_turns: 35
parameters:
  - key: initiative
    input_type: string
    requirement: optional
    default: ""
    description: Product or engineering initiative.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: phase
    input_type: select
    requirement: optional
    default: auto
    options: [auto, discover, clarify, spec, plan, tdd, implement, review, debug, verify]
    description: SDD phase to enter directly. Default auto-selects based on current state.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
prompt: |
  ## AD-001 pattern: Orchestration. Load orchestrator in-session only; delegate specialists per AD-001.

  Initiative: {{ initiative }}
  Repo: {{ repo_path }}
  Phase: {{ phase }}

  ## Step 0 — Elicit initiative if missing
  If the initiative line above is blank or empty, ask the user:
  "What product or engineering initiative would you like to spec and design?"
  Wait for their reply and use it as the initiative for all subsequent steps. Do not call any tool until you have it.

  ## Step 1 — First Visible Output
  Declare the SDD phase you are entering and the complexity tier before any action.
  If phase=auto: inspect existing .specs/ files and Beads state to determine current position.

  ## Step 2 — Orient (bd prime FIRST)
  load skills sdd. load skills agentic-devlopment.
  load agent orchestrator.
  Run `bd prime` then `bd ready --json`.
  Check for `.specs/features/{{ initiative }}/` — read discovery.md and spec.md if present.

  ## Step 3 — Spec-anchored routing with explicit phase gates

  **Hard gate rule**: no phase may start until its predecessor's output artifact exists.
  Check artifact presence BEFORE delegating; if absent, stop and report which artifact is missing.

  ## Label state machine — cross-recipe ordering gates (HJ035, HJ037)
  ```
  env:dev  →  env:reviewed  →  env:verified  →  env:prod
              (review APPROVE)  (verify PASS)   (release PASS)
  ```
  Each recipe stamps the bead label it produces and checks the label it requires.
  Use `bd show <bead-id>` to inspect a bead's current gate state.
  Use `bd list --label "env:reviewed"` to find reviewed beads ready for verify.

  | Current State | Required Output / Label | Next Phase | Stop Condition |
  |---|---|---|---|
  | No spec, initiative is new | — | Discover | — |
  | discovery.md exists (Micro/Small), no spec.md | `.specs/features/[feature]/discovery.md` | Spec | STOP if discovery.md absent |
  | discovery.md exists (Medium+), no clarify.md | `.specs/features/[feature]/discovery.md` | Clarify | STOP if discovery.md absent |
  | clarify.md exists, no spec.md | `.specs/features/[feature]/clarify.md` | Spec | STOP if clarify.md absent (Medium+) |
  | spec.md exists, no Beads task graph | `.specs/features/[feature]/spec.md` | Plan | STOP if spec.md absent |
  | Beads tasks exist and are open | Open Beads tasks with AC IDs | TDD + Implement | STOP if no open tasks |
  | Implementation done, no review | Committed diff; no `env:reviewed` label | Review | STOP if no diff to review |
  | Review APPROVE → `env:reviewed` stamped | `env:reviewed` label on bead | Verify | STOP if `env:reviewed` absent |
  | Verify PASS → `env:verified` stamped | `env:verified` label on bead | Release | STOP if `env:verified` absent |
  | Release PASS → `env:prod` stamped | `env:prod` label on bead | Done | — |

  For UI features: UX research and UI design phases run BEFORE spec phase.
  Observable trigger: "any feature with user-facing UI components" → route through ux-researcher and ui-designer first.
  Default path when UI question is ambiguous: ask the user "Does this feature have user-facing UI? (yes/no)" before routing.

  ## Step 4 — Execute selected phase
  Use the routing table to load the correct skill and delegate to the correct agent.
  Always cite the [FEAT]-NN AC ID in task descriptions and test comments.
  Durable delegation: `bd create "<phase>: <title>" --assignee <agent> --acceptance "<AC ID>" -p 2 --json`

  ## Step 5 — Synthesize and close
  Collect agent outputs. Synthesize into a single coherent state update.
  Close completed beads. Store durable facts via `bd remember`.
  Report: phase completed, files changed, spec.md coverage, next phase, open bead IDs.
