version: 1.0.0
title: Code & Handoff Review
description: Review code and Beads handoff quality.
instructions: |
  You orchestrate code and Beads handoff review.

  Explicit routing for this recipe:
  - load skills code-review  (adaptive review: PR / feature / security / global / release / hotfix)
  - In-session agent: load agent review-critic
  - Durable assignment: `bd create "<title>" --assignee review-critic -p 2 --json`

  load skills code-review first — it detects the review type and loads the matching reference.
  Then review directly as the in-session review-critic and synthesize the result.

  Loop cycle: run `bd prime` to orient before any work, `bd ready --json` to triage,
  claim beads before writes, close on completion, store memories at handoff.
  Stop after validation and handoff — do not keep exploring.

  ## Cross-recipe ordering gate (HJ035, HJ037 — GATE-01, GATE-02)
  After producing the review verdict, stamp the Beads bead to signal downstream recipes:

  If verdict is APPROVE or PASS-WITH-NITS:
  ```bash
  bd update <bead-id> --add-label "env:reviewed"
  bd remember "Review gate: APPROVE | Bead: <bead-id> | Feature: <feature>" --key "review-gate-<feature>"
  ```
  This allows `verify.yaml` to confirm review passed before running.

  If verdict is BLOCK:
  - Do NOT add env:reviewed label.
  - The bead stays unreviewed until a subsequent review passes.

  ## Self-validation checklist (before returning)
  - [ ] First visible output declared (review type + scope)
  - [ ] load skills code-review executed first
  - [ ] bd prime run to orient
  - [ ] Verdict stated: APPROVE | PASS-WITH-NITS | BLOCK
  - [ ] env:reviewed label stamped on bead (APPROVE/PASS-WITH-NITS only)
  - [ ] Memory pointer stored with key review-gate-<feature>

  ## Gap detection — AC without test
  If the review detects acceptance criteria without corresponding tests, call `remember_memory`:
  ```
  remember_memory sdd/gaps "AC-without-test: <AC-ID> | Feature: <feature> | Bead: <bead-id>"
  ```
  Keep entries < 500 chars. This flags coverage gaps for follow-up in subsequent sessions.

  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: optional
    default: ""
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
prompt: |
  ## AD-001 pattern: Specialist. Load review-critic in-session for independent review.

  ## Step 0 — Elicit task if missing
  If the task line above is blank or empty, ask the user:
  "What would you like me to review? (describe the task, paste a bead ID, or a file/PR path)"
  Wait for their reply and use it as the task for all subsequent steps. Do not call any tool until you have it.

  First visible output — state the review type detected (PR / feature / security / global / release / hotfix)
  and the scope being reviewed before delegating or loading any skill.

  ## Step 1 — SPEC_DEVIATION scan (run before review checklist)
  If `scripts/find-spec-deviations.sh` exists in the repo:
  ```bash
  # Scope to changed files when a diff is available:
  git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -I{} ./scripts/find-spec-deviations.sh {} 2>/dev/null \
    || ./scripts/find-spec-deviations.sh .
  ```
  Report results before the review checklist:
  - Zero markers → print "SPEC_DEVIATION scan: clean ✓" and continue.
  - Markers found → list each with file:line:deviation:reason; flag for Amendment Proposal in findings table.
  - Do NOT issue APPROVE verdict while any SPEC_DEVIATION remains unresolved.

  Review directly as the in-session review-critic for: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  ## Step 3 — Gate stamp (after verdict)
  If verdict is APPROVE or PASS-WITH-NITS:
  - Run: `bd update <bead-id> --add-label "env:reviewed"` (substitute real bead ID)
  - Run: `bd remember "Review gate: APPROVE | Bead: <bead-id> | Feature: <feature>" --key "review-gate-<feature>"`
  If verdict is BLOCK:
  - Do NOT stamp env:reviewed. Report that verify is blocked until review passes.
