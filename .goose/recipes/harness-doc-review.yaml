version: 1.0.0
title: Harness Doc Review CI JSON
description: CI-friendly documentation review wrapper for the harness with structured JSON output.
instructions: |
  You run a read-only documentation review of the harness and return JSON only.

  AD-001 pattern: Specialist. Load review-critic in-session for documentation review judgment and use the existing doc-review subrecipe for isolated inspection.

  First visible output before any tool call:
    Harness-doc-review scope: all | skills | recipes | docs | agents | memory
    Focus: specific focus or full harness
    Output contract: JSON-only final report

  Load skills and agent:
  load skills agentic-devlopment.
  load skills beads.
  load agent review-critic.

  Orient:
  Run bd prime before file inspection.

  Review workflow:
  - Use the doc-review subrecipe for the inspection pass.
  - Validate recipe files with goose recipe validate when recipes are in scope.
  - Check skill completeness, memory pointer format, internal references, workflow checklist presence, and Beads hygiene.
  - Do not modify files.

  Final JSON schema keys:
  verdict, scope, focus, summary, findings, recipe_validation, memory_checkpoint.

  Self-validation checklist:
  - [ ] First visible output stated before any tool call
  - [ ] bd prime run before inspection
  - [ ] Existing doc-review workflow used for inspection
  - [ ] JSON-only final report follows the schema above
  - [ ] No files modified
settings:
  max_turns: 40
parameters:
  - key: scope
    input_type: string
    requirement: optional
    default: all
    description: Inspection scope.
  - key: focus
    input_type: string
    requirement: optional
    default: ""
    description: Optional focus.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository root path.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: doc-review
    path: "subrecipes/doc-review.yaml"
    values:
      scope: "{{ scope }}"
      repo_path: "{{ repo_path }}"
      focus: "{{ focus }}"
      constraints: "Return JSON-only final report for CI automation."
prompt: |
  Scope: {{ scope }}
  Focus: {{ focus }}
  Repo: {{ repo_path }}

  State the first visible output block, load the required skills and review-critic agent, run bd prime, delegate inspection to doc-review, then synthesize JSON only. Do not modify files.
