version: 1.0.0
title: "Design Quality — UX Research · UI Audit · Accessibility"
description: Unified UX research, design taste, design system, frontend implementation, accessibility, and web testing.
instructions: |
  ## AD-001 Pattern: Specialist (sequential dual-phase)
  ## In-session agents: ux-researcher (Phase 1); ui-designer (Phase 2)
  ## AD-001 pattern: Specialist. Load UX/UI specialists in-session sequentially; do not use Summon sub-sessions.
  ## Pattern rationale: two sequential specialist phases with explicit handoff.
  ## Phase 2 depends on Phase 1 output — they must NOT run simultaneously.
  ## Stop/escalation: if Phase 1 produces no findings or fails to identify a target,
  ## stop before Phase 2 and report the Phase 1 blocker. If browser evidence cannot
  ## be captured after 2 attempts, report findings as code-inspection-only with a
  ## WCAG-confidence caveat.

  Explicit routing — TWO specialist phases, run in sequence:

  Phase 1 — UX Research (validate user needs before visual evaluation):
  - load skills ux-quality  (user research, personas, journey maps, usability heuristics)
  - load skills cognitive-ux  (Laws of UX for evaluating design decisions)
  - In-session: load agent ux-researcher
  - Beads: `bd create "<title>" --assignee ux-researcher -p 2 --json`

  Phase 2 — UI Design & Accessibility (after UX research validates direction):
  - load skills ui-quality  (visual design, WCAG 2.2 AA compliance, browser-evidence a11y)
  - load skills atomic-design  (component hierarchy: Atoms / Molecules / Organisms / Templates)
  - load skills design-systems-arch  (token W3C architecture, component library governance)
  - load skills webapp-testing  (browser automation + viewport testing)
  - In-session: load agent ui-designer
  - Beads: `bd create "<title>" --assignee ui-designer -p 2 --json`

  For AI interface design patterns, also load: `agentic-ux`
  (trust calibration, progressive disclosure of AI uncertainty, safety UX patterns)

  Run Phase 1 first; use its findings to scope Phase 2.
  Do NOT run both phases simultaneously — UI design depends on UX research output.
  Evaluate product UI across: user intent, visual taste, information architecture,
  design tokens/components, frontend states/performance, accessibility, and browser evidence.

  ## Accessibility audit
  For accessibility-focused reviews:
  - load skills wcag-accessibility-audit (WCAG 2.2 AA checklist, browser evidence)
  
  ## UI/UX optional deep-load policy
  Default UX: ux-quality + cognitive-ux.
  Default UI: ui-quality + atomic-design + design-systems-arch.
  Accessibility: add wcag-accessibility-audit for a11y risk.
  Frontend creation: add frontend-blueprint.

settings:
  max_turns: 35
parameters:
  - key: target
    input_type: string
    requirement: optional
    default: ""
    description: UI/page/component/product flow to evaluate or build.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Playwright
    cmd: npx
    args: ["@playwright/mcp@latest", "--browser", "chromium"]
    timeout: 300
sub_recipes:
  - name: verify
    path: "verify.yaml"
    values:
      task: "{{ target }}"
      repo_path: "{{ repo_path }}"
prompt: |
  Target: {{ target }}
  Repo: {{ repo_path }}

  ## Step 0 — Elicit target if missing
  If the target line above is blank or empty, ask the user:
  "What UI/page/component/product flow would you like to design or evaluate?"
  Wait for their reply and use it as the target for all subsequent steps. Do not call any tool until you have it.

  First visible output before any tool call:
    Design scope: {{ target }}
    AI interface patterns: [yes | no]
    Starting phase: Phase 1 UX Research

  Step 1 Orient: load skills agentic-devlopment. Run bd prime and bd ready --json.
  Step 2 Phase 1 UX Research: load skills ux-quality. load skills cognitive-ux. load agent ux-researcher.
  Step 3 Phase 2 UI Design: load skills ui-quality. load skills atomic-design. load skills design-systems-arch.
    If AI interface: load skills agentic-ux. load agent ui-designer.
    use sub_recipe: verify (target_type=ui) for browser evidence.
  Step 4 Observe: PASS->file follow-up beads. FAIL->bd create issue, re-verify after fix.
