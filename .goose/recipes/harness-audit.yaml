version: "1.0.0"
title: "Agentic Development Harness Global Audit"
description: "Run a read-only, evidence-first audit of skills, agents, Goose recipes, SDD/TDD/GDD flow, Beads control, and the current/target harness ontology, then obtain an independent judge verdict."

parameters:
  - key: repository_path
    input_type: string
    requirement: optional
    default: "."
    description: "Repository root to audit."
  - key: scope
    input_type: select
    requirement: optional
    default: "all"
    options: [skills, agents, recipes, frameworks, orchestration, all]
    description: "Primary audit scope; dependencies needed for cross-layer evidence remain in scope."
  - key: focus
    input_type: string
    requirement: optional
    default: "none"
    description: "Optional path, component, topic, or finding to prioritize."
  - key: output_dir
    input_type: string
    requirement: optional
    default: ".audit/harness"
    description: "Directory for generated audit evidence and graph artifacts."
  - key: graph_format
    input_type: select
    requirement: optional
    default: "jsonld"
    options: [jsonld, turtle, graphml, cypher, property-json]
    description: "Machine-readable graph export format."
  - key: evidence_budget
    input_type: select
    requirement: optional
    default: "full"
    options: [concise, full]
    description: "Evidence detail level; use full for scope=all."

sub_recipes:
  - name: harness_judge
    path: "./subrecipes/harness-judge-audit.yaml"
    description: "Independent final scoring of immutable completed audit evidence."

extensions:
  - type: builtin
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: skills
  - type: platform
    name: summon

instructions: |
  Act as the audit orchestrator. Execute an evidence-first, read-only audit; do not remediate.

  AD-001 pattern: Orchestration. The main session loads the orchestrator; the independent judge runs only through the isolated harness_judge subrecipe.

  AUTHORITATIVE INPUTS
  1. Load the reusable contract resource from the harness-judge skill: `harness-judge/templates/audit-contract.md`.
  2. Read that contract completely before scoring or delegating.
  3. Treat the contract as authoritative for required paths, checklists, ontology, findings, scoring inputs, and deliverables.
  4. Inspect repository `{{ repository_path }}` with scope `{{ scope }}` and focus `{{ focus }}`.

  FIRST VISIBLE OUTPUT
  Emit exactly this header before the first tool call:
    Harness-audit mode: AUDIT_ONLY
    Repository: {{ repository_path }}
    Scope: {{ scope }}
    Focus: {{ focus }}
    Contract: harness-judge/templates/audit-contract.md
    Output directory: {{ output_dir }}
    Graph format: {{ graph_format }}
    Independent judge: harness_judge subrecipe
    Mode note: read-only means no tracked source, Beads, memory, or external-system modifications; generated audit artifacts are allowed only under the authorized output directory.

  SAFETY BOUNDARY
  - Do not modify tracked repository files, agents, skills, recipes, templates, Beads, memories, or external systems.
  - Generated audit artifacts are permitted only under `{{ output_dir }}`. Create that directory when absent.
  - Before writing, prove that `{{ output_dir }}` is ignored ephemeral output (`git check-ignore {{ output_dir }}` or child path passes) or is governed by an explicit versioned-audit policy. Otherwise use a temporary directory and report the substitution.
  - Never execute implementation or remediation tasks returned by `bd list`.
  - If a required tool, agent, skill, path, or command is unavailable, record a blocker and continue unaffected work.

  ORCHESTRATION MODEL
  - The main session owns orchestration, synthesis, findings, target alternatives, and final closure.
  - Delegate bounded, non-overlapping evidence tasks to specialist agents when available.
  - Require each delegation to return: scope, inspected paths, facts, evidence references, uncertainties, and no final verdict.
  - Keep `harness_judge` isolated from authoring. Invoke it once, only after evidence is frozen.
  - Do not claim that parallel work occurred unless separate delegated sessions actually ran.

  REQUIRED LOADS
  Load skills goose-orchestration, sdd, knowledge-graph, and harness-judge.
  load skills: goose-orchestration
  load skills: sdd
  load skills: knowledge-graph
  load skills: harness-judge
  Load agent orchestrator in the main session. Load the contract resource `harness-judge/templates/audit-contract.md` before Phase 1. Load beads only when Beads evidence is examined.

  JUDGE SUBRECIPE CONTRACT
  The isolated harness_judge subrecipe is the only place that may run: load agent harness-judge; load skill harness-judge. Keep that judge isolated from authoring and invoke it only after evidence is frozen.

  PHASES AND HARD GATES
  # Structured gate reference (for programmatic validation):
  # phase: 0, input: none, output: preconditions.md, gate: all_known_or_blocked
  # phase: 1, input: contract, output: checklist-matrix.md, gate: all_items_assigned
  # phase: 2, input: SDD refs, output: inventory.md, gate: all_paths_classified
  # phase: 3, input: validators, output: validation-results.md, gate: all_commands_recorded
  # phase: 4, input: KG tools, output: graph exports, gate: exports_exist_or_blocked
  # phase: 5, input: artifacts, output: flow-analysis.md, gate: all_paths_terminate
  # phase: 6, input: evidence, output: findings-register.md, gate: critical_findings_evidenced
  # phase: 7, input: findings, output: alternatives.md, gate: disagreements_preserved
  # phase: 8, input: all artifacts, output: evidence-manifest.json, gate: manifest_immutable
  # phase: 9, input: manifest, output: judge-report.json, gate: judge_received
  # phase: 10, input: judge verdict, output: final-report.md, gate: status_emitted

  0. Preconditions: record repository revision, execution mode, output location, available tools, validators, and inaccessible dependencies.
     Gate: do not continue until each precondition is known or explicitly blocked.
  1. Contract model: convert every applicable contract item into a checklist-to-owner-to-evidence matrix.
     Gate: every item has an executor and expected evidence.
  2. Baseline and inventory: establish SDD/TDD/GDD references and classify every required L1/L2/L3 path as present, missing, or inaccessible.
     Gate: requested paths have explicit status.
  3. Deterministic validation: run available YAML, recipe, schema, reference, and repository consistency checks before semantic judgment.
     Gate: commands, exit codes, and outputs are recorded; missing validators are not fabricated.
  4. Current-state ontology: build TBox and ABox with provenance, confidence, current/target view separation, integrity checks, and required traversal queries.
     Mandatory KG reasoning evidence: run `node apps/kg/dist/cli.js pipeline --output-dir {{ output_dir }}/kg`, run `node apps/kg/dist/cli.js reason --rules`, read `.knowledge/memory.jsonl` and `{{ output_dir }}/kg/derived.jsonl`, and incorporate derived `HAS_STATUS` facts and inferred relations into `graph-query-results.md` and findings.
     Gate: graph exports, KG command outputs, derived fact summary, and query results exist or are blocked with reasons. If non-mutating KG output is absent or stale after an available KG pipeline, Domain G cannot PASS; do not dirty `.knowledge`.
  5. Flow analysis: map lifecycle, recipe invocation, delegated tasks, agents, loaded skills, responsibilities, artifacts, handoffs, gates, Beads, failure paths, and bounded retries.
     Beads evidence: prefer `python3 scripts/beads-readonly-evidence.py --format md` or direct `.beads/issues.jsonl` parsing; do not invoke Beads commands that may sync or mutate unless a before/after diff proves read-only behavior.
     Delegation fallback: if any mandatory delegated evidence collector returns empty output, max-action output, or missing facts, record the delegate as blocked and immediately replace it with deterministic extraction commands for that partition.
     Gate: every core path terminates or has an explicit finding, and no mandatory checklist item depends only on an empty delegate response.
  6. Findings: create only evidence-backed findings with severity, confidence, impact, root cause, target state, acceptance criteria, and verification.
     Gate: all critical/high findings have enough evidence for adversarial review.
  7. Alternatives and challenge: produce minimal, balanced, and high-assurance target architectures; have review-critic and principal-engineer challenge critical/high findings and proposals.
     Gate: disagreements and resolutions are preserved.
  8. Freeze evidence: write an immutable evidence manifest containing repository revision, artifact paths, hashes, commands, blockers, and unresolved uncertainties.
     Gate: manifest exists and no audit artifact changes after judge invocation except final synthesis.
  9. Independent judgment: invoke `harness_judge` with repository path, scope, focus, evidence budget, output directory, and evidence manifest path.
     Gate: judge output is received without asking it to author or repair audit evidence.
  10. Closure: incorporate—but do not silently override—the independent verdict, complete checklist statuses, and emit one allowed audit status.

  REQUIRED ARTIFACTS
  Write under `{{ output_dir }}`:
  - audit-checklist-status.md
  - evidence-register.md
  - evidence-manifest.json
  - current-inventory.md
  - sdd-reference-model.md
  - responsibility-matrix.md
  - artifact-handoff-map.md
  - recipe-invocation-map.md
  - current-state-graph.<format-extension>
  - target-state-graph.<format-extension>
  - graph-diff.md
  - graph-query-results.md
  - kg-derived-facts.md
  - findings-register.md
  - architecture-alternatives.md
  - adversarial-review.md
  - harness-judge-report.json
  - remediation-proposal.md
  - final-audit-report.md

  GRAPH FORMAT MAPPING
  jsonld -> jsonld; turtle -> ttl; graphml -> graphml; cypher -> cypher; property-json -> json.

  JUDGE HANDOFF
  Pass only frozen evidence and identifiers. Required judge inputs:
  - repository_path: {{ repository_path }}
  - scope: {{ scope }}
  - focus: {{ focus }}
  - evidence_budget: {{ evidence_budget }}
  - output_dir: {{ output_dir }}
  - evidence_manifest: path to `{{ output_dir }}/evidence-manifest.json`

  Canonical subrecipe parameter map:
    harness_judge.repository_path = "{{ repository_path }}"
    harness_judge.scope = "{{ scope }}"
    harness_judge.focus = "{{ focus }}"
    harness_judge.evidence_budget = "{{ evidence_budget }}"
    harness_judge.output_dir = "{{ output_dir }}"
    harness_judge.evidence_manifest = "{{ output_dir }}/evidence-manifest.json"

  FINAL RESPONSE
  Summarize scope, blockers, finding counts by severity, selected architecture, graph outputs, judge verdict, score, and final status. Cite artifact paths. Stop immediately after the final status.

prompt: |
  Audit repository `{{ repository_path }}` in AUDIT_ONLY mode.
  Scope: {{ scope }}
  Focus: {{ focus }}
  Evidence budget: {{ evidence_budget }}
  Output directory: {{ output_dir }}
  Graph format: {{ graph_format }}

  Follow the bundled contract resource `harness-judge/templates/audit-contract.md`, execute the gated workflow, freeze evidence, then invoke the independent `harness_judge` subrecipe exactly once. Do not modify tracked source, Beads, memory, or external systems.

activities:
  - "message: Run a read-only harness audit with ontology and independent judging."
  - "Audit the complete harness"
  - "Audit recipes and orchestration"
  - "Audit agents and loaded skills"