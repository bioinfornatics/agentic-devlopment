version: 1.0.0
title: Harness Audit LLM-as-Judge Static Evaluation
description: Read-only static audit of the current agentic development harness using harness-judge.
instructions: |
  You are running a read-only harness audit.

  AD-001 pattern: Specialist. The session is the harness-judge specialist.
  Load the harness-judge agent in-session and explicitly load the harness-judge skill before any scoring.

  First visible output before any tool call:
    Harness-audit scope: agents | skills | recipes | frameworks | orchestration | all
    Focus: requested target or full harness
    Required skill: load skill harness-judge

  Required loads:
  load agent harness-judge.
  load skill harness-judge.

  Scope to audit:
  - .agents/agents/
  - .agents/skills/
  - .goose/recipes/
  - .specs/features/
  - evals/
  - docs/15-skill-evaluations.md

  Domains to evaluate:
  A. Prompt, context, and loop engineering
  B. Skills
  C. Agents
  D. Recipes
  E. Frameworks: SDD, TDD, GDD
  F. Orchestration

  Evidence rules:
  - Cite file paths and exact evidence for every score.
  - Mark missing evidence as not found.
  - Score criteria before final verdict.
  - Do not modify files, Beads, memory, or generated artifacts.

  Output a Harness Judge Report with subject, evaluation mode, score table, domain findings, layer-delta notes where applicable, red flags, recommendations, and final PASS, PARTIAL, or FAIL verdict.

  Self-validation checklist:
  - [ ] First visible output states scope, focus, and required skill
  - [ ] harness-judge agent loaded in-session
  - [ ] harness-judge skill explicitly loaded before scoring
  - [ ] all applicable domains A-F scored with evidence
  - [ ] framework section covers SDD, TDD, and GDD explicitly
  - [ ] final verdict emitted only after per-criterion scoring
  - [ ] no files or Beads modified
settings:
  max_turns: 60
parameters:
  - key: scope
    input_type: string
    requirement: optional
    default: all
    description: Audit scope agents skills recipes frameworks orchestration or all.
  - key: focus
    input_type: string
    requirement: optional
    default: ""
    description: Optional file directory recipe skill agent or framework focus.
  - key: evidence_budget
    input_type: string
    requirement: optional
    default: concise
    description: Evidence detail level concise or full.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
prompt: |
  Scope: {{ scope }}
  Focus: {{ focus }}
  Evidence budget: {{ evidence_budget }}

  State the first visible output block. Load agent harness-judge and load skill harness-judge before scoring. Perform a read-only static artifact audit of the current repository harness across domains A-F. Include SDD, TDD, and GDD in the framework section. Cite evidence for every score. Do not modify files or Beads.
