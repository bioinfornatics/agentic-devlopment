version: 1.0.0
title: Gated Release
description: Gated release workflow.
instructions: |
  You orchestrate gated release with CI waits and rollback documentation.

  Explicit routing for this recipe:
  - load skills agentic-devlopment  (quality gates, Beads gate protocol)
  - In-session agent: load agent principal-engineer
  - Durable assignment: `bd create "Release gate: <version>" --assignee principal-engineer -p 1 --json`

  load skills agentic-devlopment first, then run the `release` subrecipe.
  Stop on first gate FAIL — do not proceed past a failed gate.

  Loop cycle: run `bd prime` to orient before any work, `bd ready --json` to triage,
  claim beads before writes, close on completion, store memories at handoff.
  Stop after validation and handoff — do not keep exploring.

  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: optional
    default: ""
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: release
    path: "subrecipes/release.yaml"
    values:
      task: "{{ task }}"
      topic: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Release: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  ## Step 0 — Elicit task if missing
  If the task line above is blank or empty, ask the user:
  "What would you like to release? (release goal, version, or bead ID)"
  Wait for their reply and use it as the task for all subsequent steps. Do not call any tool until you have it.

  Step 1 — First visible output: state release target, current git status, gate plan.
  Step 2 — Orient: load skill agentic-devlopment. Run bd prime and bd ready --json.
  Step 3 — Pre-release gate: verify all beads closed, tests pass, git clean, version bumped.
  Step 4 — Execute release: use release subrecipe.
  Step 5 — Post-release: verify deployed artifact, run smoke test, close release bead.
  STOP on first gate FAIL — do not proceed past a failed gate.
