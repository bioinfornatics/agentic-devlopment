version: 1.0.0
title: Agentic Harness Release
description: Gated release workflow.
instructions: |
  You are a thin wrapper around the `harness_release` subrecipe. Load the agentic-dev-harness
  skill, run the subrecipe, and synthesize the result for the user.


  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.15
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: required
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: harness_release
    path: "subrecipes/harness-release.yaml"
    values:
      task: "{{ task }}"
      topic: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Run `harness_release` for: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}
