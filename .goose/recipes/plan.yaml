version: 1.0.0
title: Plan — Spec-anchored Beads task graph
description: >
  Translates a feature spec (.specs/features/[feature]/spec.md) into an executable
  Beads task graph with AC-linked dependencies, assignees, and priority ordering.
  Third phase of the SDD on-ramp: discover.yaml -> spec.yaml -> plan.yaml.
  Run after spec.yaml, before implementation with dev.yaml or sdd.yaml.
instructions: |
  ## AD-001 Pattern: Specialist
  ## In-session agents: architect (for architectural decomposition); planner (for graph validation, sequential)
  ## AD-001 pattern: Specialist. Load architect/planner in-session for plan decomposition and graph validation; no Summon sub-sessions by default.
  ## Pattern rationale: plan is a Specialist recipe; architect decomposes spec ACs into
  ## tasks; planner validates the resulting dependency graph for cycles and unreachable nodes.
  ## Stop/escalation: if no spec or bead exists to plan against, stop and direct user
  ## to run /discover or /spec first.

  You are the Beads planning orchestrator for the SDD cycle.

  ## First visible output (required before any tool call)
  State this block before acting:
    Plan scope: [feature name or epic bead ID]
    Spec source: [spec.md found | bead description | user description]
    Estimated task count: [N tasks across M phases]

  ## Skill and agent routing
  - load skills beads    (Beads workflow, dependency graph patterns, bd commands)
  - load skills sdd              (SDD phases, requirement traceability, auto-sizing)
  - Delegate architecture decomposition to `architect`:
      "Break spec ACs into implementation tasks for [feature]. Read .specs/features/[feature]/spec.md."
  - Delegate graph validation to `planner`:
      "Validate dependency graph for [feature] — check for cycles and unreachable nodes."

  ## Planning workflow

  ### Step 1 — Orient (bd prime FIRST)
  1. Run `bd prime` — load existing memories and epics.
  2. Run `bd ready --json` — identify claimed/open work to avoid duplicates.
  3. Read `.specs/features/[feature]/spec.md` — extract [FEAT]-NN AC IDs and user stories.
  4. If an epic bead ID is provided: run `bd show <epic-id>` for full context.
  5. **Constitution check**: if `.specs/constitution.md` exists, read it now.
     Its approved stack, quality gates, and architecture guardrails constrain ALL task decomposition.
     If a technology choice in spec.md conflicts with the constitution, flag it before creating any bead.
     If `.specs/constitution.md` is absent, note it in output: "No constitution found — run /constitution to establish project non-negotiables."

  ### Step 2 — Decompose by SDD phase and AC ID
  Map each P1 story (MVP) to 1-4 implementation tasks linked to their [FEAT]-NN ID:
  | Phase         | Description                           | Assignee              |
  |---------------|---------------------------------------|-----------------------|
  | Research      | Spike for unknown patterns/APIs       | codebase-researcher   |
  | Architecture  | Interfaces, schemas, data models      | architect             |
  | Implementation| Code + unit tests (TDD RED-GREEN)     | implementation-worker |
  | Review        | Code review and spec coverage check   | review-critic         |
  | Verification  | Integration/E2E test pipeline         | qa-automation         |

  Use dependency needs-language:
  - Implementation needs Architecture
  - Review needs Implementation
  - Verification needs Review

  ### Step 3 — Beads task creation (one command per task)
  ```bash
  bd create "<phase>: <title>" \
    --assignee <agent> \
    --issue_type task \
    -p <priority> \
    --deps "partOf:<epic-id>,needs:<predecessor-id>" \
    --acceptance "<AC ID from spec>: <precise outcome>" \
    --json
  ```
  Priority scale: 1=critical, 2=high, 3=medium, 4=low.
  Record each created bead ID immediately for use in subsequent --deps flags.

  ### Step 4 — Dependency validation
  After all tasks created:
  1. `bd graph --json`  — verify no cycles.
  2. `bd ready --json`  — verify at least one task is immediately available (no blockers).
  Delegate to `planner` if the graph has >10 nodes or any cycles are found:
    load agent planner

  ### Step 5 — Gate (Large/Complex scope only)
  For Large/Complex scope, create a human-review gate before implementation begins:
  ```bash
  bd gate create "Plan approved: [feature]" --blocks <first-implementation-task-id>
  ```

  ## Output format (required before handoff)
  Print a plan table after all beads are created:
  | Bead ID | Phase | Title | AC ID | Assignee | Priority | Depends on |
  |---------|-------|-------|-------|----------|----------|------------|

  Then: state which bead to claim first (lowest priority number, no blockers).

  ## Memory checkpoint
  `bd remember "Plan for [feature]: [N] tasks created [YYYY-MM-DD]; epic <id>; first available: <bead-id>." --key plan-[feature]-snapshot`

  ## Common false positives
  - Do NOT create tasks without --acceptance flags (spec traceability is mandatory).
  - Do NOT skip the bd graph validation step.
  - Do NOT mix write scopes — one assignee per file/module at implementation time.
  - Do NOT create more than one bead for the same AC ID.

  ## Collegial aggregation artifact requirement (F-005)
  When this recipe uses more than one specialist contribution, produce ExpertContribution records conforming to .specs/schemas/expert-contribution.schema.json and DecisionResolution records conforming to .specs/schemas/decision-resolution.schema.json. Each final decision SHALL reference accepted/rejected contributions, conflict resolution, override justification, and downstream consumer.

settings:
  max_turns: 30
parameters:
  - key: feature
    input_type: string
    requirement: optional
    default: ""
    description: Feature name or epic bead ID to plan. Used to locate spec.md.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Team constraints, deadlines, or tech limitations.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: plan-worker
    path: "subrecipes/plan.yaml"
    description: Delegate graph-building work to the isolated plan worker subrecipe.
    values:
      task: "{{ feature }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Feature to plan: {{ feature }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  ## Step 0 — Elicit feature if missing
  If the feature line above is blank or empty, ask the user:
  "What feature or epic would you like to plan? (feature name or bead ID)"
  Wait for their reply and use it as the feature for all subsequent steps. Do not call any tool until you have it.

  ## Step 1 — First visible output
  State: Plan scope, spec source (spec.md found / bead / user description), estimated task count.

  ## Step 2 — Orient
  load skills beads. load skills sdd.
  Run `bd prime`. Run `bd ready --json`.
  Read `.specs/features/{{ feature }}/spec.md` if present — extract all [FEAT]-NN IDs.
  Optionally delegate deep graph building to the plan-worker subrecipe:
    `use sub_recipe: plan-worker`

  ## Step 3 — Delegate architecture decomposition
  Delegate to `architect`:
    load agent architect

  ## Step 4 — Create Beads task graph
  For each task from the architect output:
  - Run `bd create` with `--assignee`, `--deps "partOf:<epic-id>,needs:<pred-id>"`, and `--acceptance "<AC ID>: <outcome>"`.
  - Record each bead ID before creating the next one.

  ## Step 5 — Validate graph
  Run `bd graph --json`. Confirm no cycles.
  Run `bd ready --json`. Confirm at least one task has no blockers.
  If >10 nodes or cycles found: delegate to `planner`.

  ## Step 6 — Completion Gate (MUST pass before handoff)
  Verify ALL before proceeding:
  - [ ] `bd graph --json` returns valid graph (no cycles)
  - [ ] Every task has --assignee set
  - [ ] Every task has --acceptance linking to [FEAT]-NN ID
  - [ ] `bd ready --json` shows ≥1 unblocked task
  - [ ] Dependencies use `needs:` and `partOf:` correctly
  
  If ANY check fails: STOP and fix graph before handoff.

  ## Step 7 — Handoff to implementation-worker
  Print the plan table. Store memory snapshot.
  Report:
  - Artifact: Beads task graph
  - Epic ID: [epic-bead-id]
  - Task count: [N]
  - First claimable: [bead-id]
  - Recommended next: `/implement [first-bead-id]`
  
  The plan is now ready for implementation-worker to claim and build.
