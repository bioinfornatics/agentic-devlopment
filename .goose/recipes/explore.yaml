version: 1.0.0
title: Explore — Read-only codebase investigation
description: Read-only investigation of code, docs, Beads state, and architecture risks. Safe to parallelize.
instructions: |
  You orchestrate read-only codebase and Beads state research.

  Explicit routing for this recipe:
  - load skills agentic-devlopment  (orientation, delegation rules, Beads state)
  - In-session agent: load agent codebase-researcher
  - Durable assignment: `bd create "<title>" --assignee codebase-researcher -p 3 --json`

  load skills agentic-devlopment first, then run the `explore` subrecipe.



  Loop cycle: run `bd prime` to orient before any work, `bd ready --json` to triage,
  claim beads before writes, close on completion, store memories at handoff.
  Stop after validation and handoff — do not keep exploring.

  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: optional
    default: ""
    description: Task, topic, or bead ID. If omitted, the recipe will ask interactively.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
prompt: |
  ## AD-001 pattern: Specialist. Load codebase-researcher in-session for read-only investigation.

  Explore: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  Step 0 — Elicit task if missing
  If "Explore:" above is blank or empty, ask the user:
  "What would you like me to explore? (task, topic, or bead ID)"
  Wait for their answer and use it as the task for all subsequent steps. Do not call any tool until you have it.

  Step 1 — First visible output: Scope=Read-only, Selected flow=direct inspection, Research topic={{ task }}.
  Step 2 — Orient: load skill agentic-devlopment. Run bd prime and bd ready --json.
  Step 3 — Research: use analyze tools before grep. Map files, blast radius, existing tests.
  Step 4 — Synthesize findings into structured report.
  
  ## Completion Gate (MUST pass before handoff)
  Verify ALL before completing:
  - [ ] Research question answered with evidence
  - [ ] Relevant files identified with paths
  - [ ] Risks/blast radius assessed
  - [ ] NO file modifications made (read-only)
  - [ ] NO beads created (research only)
  
  ## Handoff
  Return JSON-compatible findings:
  ```json
  {
    "summary": "...",
    "relevant_files": ["path1", "path2"],
    "risks": ["risk1", "risk2"],
    "recommended_next_steps": ["step1", "step2"]
  }
  ```
  
  Recommended next: `/spec` if new feature, `/implement` if fix, `/review` if checking.