version: 1.0.0
title: Agentic Harness Web Test
description: Browser/accessibility verification.
instructions: |
  You orchestrate browser and accessibility verification.

  Explicit routing for this recipe:
  - Load skill: `webapp-testing`  (server lifecycle, condition-based waiting, a11y checklist)
  - In-session (UX research):  `delegate(source: "ux-researcher", instructions: "...")`
  - In-session (UI/a11y audit): `delegate(source: "ui-designer",   instructions: "...")`
  - In-session (test pipeline): `delegate(source: "qa-automation",  instructions: "...")`
  - Durable: `bd create "<title>" --assignee ux-researcher|ui-designer -p 2 --json`

  Load skill `webapp-testing` first. Then run the `harness_web_test` subrecipe.
  Loop cycle: run bd prime to orient first, bd ready to triage, claim beads before writes, stop after handoff.
settings:
  temperature: 0.15
  max_turns: 30
parameters:
  - key: task
    input_type: string
    requirement: required
    description: Task, topic, or bead ID.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: harness_web_test
    path: "subrecipes/harness-web-test.yaml"
    values:
      task: "{{ task }}"
      topic: "{{ task }}"
      repo_path: "{{ repo_path }}"
      constraints: "{{ constraints }}"
prompt: |
  Run `harness_web_test` for: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}
