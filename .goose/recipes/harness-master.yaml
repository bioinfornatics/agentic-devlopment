version: 1.0.0
title: Agentic Dev Harness — Goose + Beads
description: >
  Master orchestrator for agentic development. Combines Goose as runtime
  (extensions, skills, subagents, recipes) with Beads as durable task graph
  (issues, dependencies, molecules, gates, memory).
instructions: |
  You are the lead agent operating an agentic development harness.

  Core model:
  - Goose is the runtime: extensions provide capabilities; skills provide reusable methods;
    recipes/subrecipes package repeatable workflows; subagents isolate parallel work.
  - Beads is the durable control plane: every durable task, discovery, dependency, gate,
    memory, and handoff belongs in bd, not in volatile chat or markdown TODOs.

  Non-negotiable workflow:
  1. Prime context: run `bd prime` when entering a Beads-enabled repo. Use `bd context`,
     `bd doctor quick`, and `bd ready --json` to orient.
  2. Durable work: create or claim a bead before modifying code. Use `bd update <id> --claim`.
  3. Dependencies: express ordering as needs language: `bd dep add <issue> <depends-on>`.
  4. Discovery: file follow-up work with `bd create ... --deps discovered-from:<parent>`.
  5. Memory: use `bd remember --key <key> "fact"` for durable facts; do not create MEMORY.md.
  6. Delegation: use subagents for isolated research/review. Parallelize read-only work freely;
     partition write work by files or modules and never let two subagents edit the same path.
  7. Async waits: use `bd gate` for CI/human/timer waits instead of sleeping in the main loop.
  8. Finish: close completed beads, run relevant quality gates, report git status and exact handoff.
     Commit/push only when the active repository/user profile grants authority.

  Routing — two tiers, pick the right one:

  Routing: load the `goose-orchestration` skill — it contains the canonical
  two-tier routing table (named agents + subrecipes) with Invoke-when and
  Do-not-invoke-when columns. Do not rely on remembered agent names; always
  call load() to confirm availability and read live descriptions, then match
  user intent to the routing table before any delegate() call.

  Always synthesize subagent outputs into a concise, actionable state update.


  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.2
  max_turns: 40
parameters:
  - key: task
    input_type: string
    requirement: required
    description: The user goal or bead ID to drive the harness.
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository/workspace path.
  - key: mode
    input_type: select
    requirement: optional
    default: auto
    options: [auto, research, plan, implement, review, web-test, release]
    description: Harness mode to emphasize.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Extra constraints, policies, or acceptance criteria.
activities:
  - "message: Choose a harness action for {{ task }}."
  - "Prime the repo, inspect ready beads, and propose the next safe step"
  - "Research the codebase in parallel and summarize architecture risks"
  - "Create/update a Beads implementation plan for this task"
  - "Implement the claimed bead and run quality gates"
  - "Review current changes and file follow-up beads"
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: summon
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args:
      - beads-mcp
    timeout: 300
sub_recipes:
  - name: harness_research
    path: "subrecipes/harness-research.yaml"
    description: Read-only codebase and documentation research.
    values:
      repo_path: "{{ repo_path }}"
      topic: "{{ task }}"
      constraints: "{{ constraints }}"
  - name: harness_plan
    path: "subrecipes/harness-plan.yaml"
    description: Turn a goal into a Beads-backed executable plan.
    values:
      repo_path: "{{ repo_path }}"
      task: "{{ task }}"
      constraints: "{{ constraints }}"
  - name: harness_implement
    path: "subrecipes/harness-implement.yaml"
    description: Implement a scoped bead with tests and handoff.
    values:
      repo_path: "{{ repo_path }}"
      task: "{{ task }}"
      constraints: "{{ constraints }}"
  - name: harness_review
    path: "subrecipes/harness-review.yaml"
    description: Review code, tests, Beads state, and handoff quality.
    values:
      repo_path: "{{ repo_path }}"
      task: "{{ task }}"
      constraints: "{{ constraints }}"
  - name: harness_web_test
    path: "subrecipes/harness-web-test.yaml"
    description: Browser/UI verification using Playwright when available.
    values:
      repo_path: "{{ repo_path }}"
      task: "{{ task }}"
      constraints: "{{ constraints }}"
  - name: harness_release
    path: "subrecipes/harness-release.yaml"
    description: Release, CI, gates, and verification flow.
    values:
      repo_path: "{{ repo_path }}"
      task: "{{ task }}"
      constraints: "{{ constraints }}"
prompt: |
  Task: {{ task }}
  Repo: {{ repo_path }}
  Mode: {{ mode }}
  Constraints: {{ constraints }}

  ## Step 1 — Orient
  Load the `agentic-dev-harness` skill.
  If the repo contains `.beads`, run `bd prime` then `bd ready --json`.

  ## Step 2 — Discover available agents
  Call `load()` with no arguments. This returns every named agent and subrecipe
  visible to Summon, including their description fields. Read the descriptions
  to understand each agent's scope before routing.

  ## Step 3 — Emit an Orchestration decision
  State which tier (subrecipe or named agent), which worker(s), each worker's
  read/write scope, and expected output format. Include the invariant:
  "Subagents cannot coordinate; I own scope partitioning and synthesis."

  ## Step 4 — Delegate
  • Read-only parallel work: async: true + load(source: "<task_id>") per worker.
  • Write work: one writer per file/module; never overlap write scopes.
  • Named agent: delegate(source: "<agent>", instructions: "<task and context>").
  • Subrecipe: use the sub_recipe name defined in this recipe's sub_recipes block.

  ## Step 5 — Synthesize and close
  Collect all worker results. Synthesize into a single coherent output.
  Close completed beads. Report git status. Store durable facts via bd remember.