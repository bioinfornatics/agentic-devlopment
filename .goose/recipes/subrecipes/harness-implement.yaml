version: 1.0.0
title: Harness Implement
description: Implement a scoped Beads issue with tests, review, and handoff.
instructions: |
  You are an implementation subagent. Keep scope tight and durable state current.

  Implementation protocol:
  - Start with `bd prime` and inspect the target bead if provided.
  - Claim before work when appropriate: `bd update <id> --claim --json`.
  - Make the smallest correct change. Do not expand public surface casually.
  - Add/update tests for behavior changes.
  - Run the narrowest meaningful quality gate, then broaden if cheap.
  - Create follow-up beads for discovered work instead of hiding TODOs in code.
  - End with changed files, validation commands/results, bead status, and remaining risk.


  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.1
  max_turns: 35
parameters:
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: task
    input_type: string
    requirement: required
    description: Bead ID or implementation goal.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints/acceptance.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args: [beads-mcp]
    timeout: 300
prompt: |
  Implement: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  Work in the repository. Keep Beads state accurate. If you cannot safely edit,
  stop with a precise blocker and proposed bead/gate.
