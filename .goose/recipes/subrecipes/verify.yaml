# AGENT-FACING WORKER SUBRECIPE — invoked by verify.yaml
version: 1.0.0
title: Verify Worker — Adaptive
description: >
  Adaptive verification worker. Routes to the correct protocol based on target_type:
  API (Bruno/curl), web (Playwright/a11y), CLI (shell), library (test suite), UX/UI (WCAG).
instructions: |
  ## Detect type and load matching skill
  From target_type parameter and task context, load:
  - api:     load skills agentic-dev-harness
  - web:     load skills webapp-testing + ui-quality
  - cli:     load skills agentic-dev-harness + systematic-debugging
  - library: load skills agentic-dev-harness
  - ui:   load skills ui-quality and load skills atomic-design

  ## First visible output
  Before any tool call:
    Verify target: [target name]
    Type: [api | web | cli | library | ui]
    Protocol: [Bruno | Playwright | shell | test-suite | WCAG]
    AC IDs to verify: [[FEAT]-NN list or "no spec found"]

  ## Protocol per type

  ### api — Bruno / curl
  1. Locate Bruno collection: find .bru files or bruno.json in repo.
     Fallback: generate curl commands from OpenAPI spec or route definitions.
  2. Check API server is running:
     curl -sf http://localhost:<port>/health || echo "SERVER DOWN — check README for start command"
  3. Run Bruno collection:
     bru run --env <env> <collection-path> --reporter json
     Fallback: curl -s -w "
HTTP_CODE" <endpoint> | tee /tmp/response.txt
  4. For each failing request: show method, URL, request body, response status, response body.
  5. Cross-check against [FEAT]-NN ACs — verify each AC has a corresponding test.
  6. Report: N passed / M failed, coverage per AC ID.

  ### web — Playwright + accessibility
  1. Navigate with Playwright — screenshot + browser_snapshot (accessibility tree).
  2. Check console errors: browser_console_messages.
  3. Test critical flows: form submission, navigation, error/empty/loading states.
  4. Run WCAG 2.2 AA checklist from ui-quality skill:
     - Keyboard navigation (Tab/Shift-Tab in browser — NOT code inspection)
     - Focus indicator visible after each Tab keypress
     - Contrast >= 4.5:1 (measure via DevTools, not hex calculation)
     - All images have alt / aria-label
     - All form inputs have labels
  5. Label each finding [VERIFIED — browser-tested] or [ASSUMPTION — code-inspection].

  ### cli — Shell execution
  1. Build CLI if needed (detect from Makefile/Cargo.toml/setup.py/pyproject.toml).
  2. For each AC: run command and assert exit code + output:
     actual=$(./cli <args> 2>&1); echo "exit=$?"; echo "$actual"
  3. Test error paths: invalid args, missing files, permission errors.
  4. Test edge cases: empty input, unicode, very long strings.
  5. Report: command run, expected vs actual exit code + output.

  ### library — Test suite
  1. Detect test runner from repo (pytest / jest / cargo test / go test / mvn test / bun test).
  2. Run scoped tests for changed module:
     pytest tests/test_<feature>.py -v --cov=<module> --cov-report=term-missing
     (or equivalent for detected runner)
  3. Gate: >= 80% branch coverage for changed files.
  4. Report: N passed / M failed / coverage %. Full output for each failure.

  ### ui — Design system, WCAG 2.2 AA, Atomic Design (POST-IMPLEMENTATION UI verification)
  NOTE: UX research (personas, journeys, usability) belongs in discover/design phase.
        verify/ui covers only the IMPLEMENTATION LAYER: tokens, WCAG, component structure. — Design system + WCAG
  1. load skills ui-quality + ux-quality.
  2. Navigate with Playwright if browser URL available.
  3. Audit design tokens: grep CSS for hardcoded values not from design system.
  4. Check Atomic Design hierarchy (Atom/Molecule/Organism/Template — from atomic-design skill).
  5. Run WCAG 2.2 AA full checklist (same as web protocol steps 4-5).

  ## Self-validation before returning
  - [ ] Verification type correctly identified and stated
  - [ ] AC IDs from spec.md checked (or explicitly noted as absent)
  - [ ] All findings labeled VERIFIED or ASSUMPTION
  - [ ] PASS / FAIL verdict stated explicitly with evidence
  - [ ] Beads issues filed for each FAIL finding

  ## Result reporting
  Return to caller (verify.yaml) — do NOT loop internally.
  Caller owns the retry loop (max 3 cycles).
settings:
  temperature: 0.1
  max_turns: 35
parameters:
  - key: task
    input_type: string
    requirement: required
    description: What to verify.
  - key: target_type
    input_type: string
    requirement: optional
    default: auto
    description: "Verification type: api | web | cli | library | ui | auto"
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Test constraints or environment name.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Playwright
    description: Browser automation (web + ui types only)
    cmd: npx
    args:
      - "@playwright/mcp@latest"
      - "--browser"
      - chromium
      - "--executable-path"
      - /usr/bin/chromium-browser
    timeout: 300
prompt: |
  Verify: {{ task }}
  Type: {{ target_type }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  State type and protocol as first visible output.
  Apply the protocol for the detected type.
  Return PASS/FAIL verdict, AC IDs checked, findings with evidence labels, Beads issues filed.