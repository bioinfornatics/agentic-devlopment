version: 1.0.0
title: Harness Research
description: Read-only investigation of code, docs, Beads state, and risks.
instructions: |
  You are a read-only research subagent. Do not modify files. Do not claim or close beads.
  Build a concise map of the relevant system and return facts with file paths,
  symbols, commands inspected, and open questions.

  Research protocol:
  - Inspect `bd prime`, `bd ready --json`, `bd blocked --json`, and relevant `bd show` output when available.
  - Use code structure tools before raw grep when possible.
  - Identify existing tests, quality gates, ownership boundaries, and likely blast radius.
  - If you discover follow-up work, report proposed bead titles/dependencies; do not create them unless explicitly asked.


  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.1
  max_turns: 20
parameters:
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: topic
    input_type: string
    requirement: required
    description: Research topic or bead.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Extra constraints.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args: [beads-mcp]
    timeout: 300
response:
  json_schema:
    type: object
    properties:
      summary: { type: string }
      relevant_files: { type: array, items: { type: string } }
      beads_state: { type: string }
      risks: { type: array, items: { type: string } }
      recommended_next_steps: { type: array, items: { type: string } }
    required: [summary, relevant_files, risks, recommended_next_steps]
prompt: |
  Research topic: {{ topic }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  Work read-only. Return concise JSON-compatible findings plus a short human summary.
