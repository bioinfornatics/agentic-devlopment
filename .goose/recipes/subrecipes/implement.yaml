# AGENT-FACING WORKER SUBRECIPE — invoked by the implement recipe.
# Users invoke the top-level recipe; agents receive this subrecipe in an isolated session.
version: 1.0.0
title: Implement Worker
description: Implement a scoped Beads issue with tests, review, and handoff.
instructions: |
  ## Load skill first
  Load skill: `sdd`  — SDD loop, spec-anchored outcome rule, SPEC_DEVIATION markers.
  Load skill: `agentic-dev-harness`  — First Visible Output rule, Scoped plan format, blast radius.

  ## First visible output
  Before any tool call:
    Orchestration decision:
    - Bead: [id or "will create"]
    - Scope: [exact file(s)]
    - Selected flow: implement
    - Spec reference: [.specs/features/[feature]/spec.md or "none"]


  You are an implementation subagent. Keep scope tight, tests first, durable state current.

  ## Implementation protocol (TDD — non-negotiable)

  ### Phase RED — write failing test FIRST
  1. `bd prime` and `bd show <bead-id>` — load AC IDs from the bead.
  2. Read `.specs/features/*/spec.md` if present — extract [FEAT]-NN IDs.
  3. Write the failing test. Name it after the AC: `test_FEAT_NN_<description>`.
  4. Run it: confirm it FAILS with an informative message. Do NOT proceed if it passes silently.

  ### Phase GREEN — minimal implementation
  5. Claim the bead: `bd update <id> --claim --json`.
  6. Write the minimum code that makes the RED test pass.
  7. Run the test: confirm GREEN. No previously-passing tests may now fail.

  ### Phase REFACTOR — clean without breaking
  8. Remove duplication. Improve readability. Run tests after each edit.
  9. Final quality gate: `goose recipe validate` or project test command.

  ### Observe result — loop on failure (max 3 iterations)
  If tests still fail after GREEN: fix the implementation (NOT the tests). Repeat Steps 6-7.
  After 3 failures: stop, report exact failure output, file a blocker bead, escalate to user.

  ### SPEC_DEVIATION marker
  If implementation must deviate from the spec:
    `// SPEC_DEVIATION: [what diverged] — Reason: [why]`

  ### Scope guardrail
  Edit ONLY files listed in the Scoped plan. Any adjacent improvement → new bead with --deps discovered-from:<id>.

  - Create follow-up beads for discovered work instead of hiding TODOs in code.
  - End with changed files, test output (pass count), bead status, spec AC IDs covered.


  Memory checkpoint:
  - At the end, decide whether a durable project fact was learned.
  - If yes, store or propose: `bd remember "<fact>" --key <stable-key>`.
  - If it is work to do, create/propose a Beads issue instead of memory.
  - If it is long-form knowledge, update docs and remember only a short pointer.
  - Prefer pointer memories over content memories to reduce token use.
  - Never store secrets, tokens, credentials, or transient observations.
settings:
  temperature: 0.1
  max_turns: 35
parameters:
  - key: repo_path
    input_type: string
    requirement: optional
    default: "."
    description: Repository path.
  - key: task
    input_type: string
    requirement: required
    description: Bead ID or implementation goal.
  - key: constraints
    input_type: string
    requirement: optional
    default: ""
    description: Constraints/acceptance.
extensions:
  - type: platform
    name: developer
    bundled: true
    timeout: 300
  - type: platform
    name: analyze
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: stdio
    name: Beads
    description: Git-backed issue tracker and durable agentic task graph
    cmd: uvx
    args: [beads-mcp]
    timeout: 300
prompt: |
  Implement: {{ task }}
  Repo: {{ repo_path }}
  Constraints: {{ constraints }}

  Work in the repository. Keep Beads state accurate. If you cannot safely edit,
  stop with a precise blocker and proposed bead/gate.