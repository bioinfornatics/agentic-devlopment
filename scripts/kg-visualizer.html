<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Knowledge Graph — Agentic Dev Harness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 20px; background: #1a1f2e; border-bottom: 1px solid #2d3748; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 16px; font-weight: 600; color: #90cdf4; }
    #stats { font-size: 12px; color: #718096; }
    .controls { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    select, input { background: #2d3748; border: 1px solid #4a5568; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    #info-panel { position: fixed; right: 0; top: 48px; width: 280px; background: #1a1f2e; border-left: 1px solid #2d3748; padding: 16px; height: calc(100vh - 48px); overflow-y: auto; font-size: 12px; z-index: 10; }
    #info-panel h3 { font-size: 14px; color: #90cdf4; margin-bottom: 8px; }
    #info-panel .obs { background: #2d3748; padding: 4px 8px; border-radius: 3px; margin: 4px 0; }
    #info-panel .rel { color: #68d391; margin: 3px 0; }
    #svg-container { flex: 1; }
    svg { width: 100%; height: 100%; }
    .node circle { stroke-width: 1.5px; cursor: pointer; transition: r 0.1s; }
    .node circle:hover { stroke: #fff; stroke-width: 2px; }
    .node text { font-size: 9px; fill: #a0aec0; pointer-events: none; }
    .link { stroke: #4a5568; stroke-opacity: 0.5; stroke-width: 1px; marker-end: url(#arrow); }
    .link.derived { stroke: #f6ad55; stroke-opacity: 0.6; stroke-dasharray: 4,3; stroke-width: 1.5px; }
    .link:hover { stroke: #90cdf4; stroke-opacity: 0.9; }
    .link-label { font-size: 8px; fill: #4a5568; pointer-events: none; }
    #upload-zone { border: 2px dashed #4a5568; border-radius: 8px; padding: 40px; text-align: center; margin: 40px; color: #718096; cursor: pointer; }
    #upload-zone:hover { border-color: #90cdf4; color: #90cdf4; }
    .type-harness-recipe { fill: #4299e1; }
    .type-harness-skill { fill: #9f7aea; }
    .type-harness-agent { fill: #48bb78; }
    .type-harness-doc { fill: #718096; }
    .type-epic { fill: #f6ad55; }
    .type-feature { fill: #fc8181; }
    .type-acceptance_criterion { fill: #68d391; }
    .type-test { fill: #4fd1c5; }
    .type-code_file { fill: #b794f4; }
    .type-spec_file { fill: #faf089; }
    .type-user_story { fill: #f687b3; }
    .type-default { fill: #a0aec0; }
    #legend { position: fixed; left: 8px; bottom: 8px; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px; padding: 10px; font-size: 10px; }
    .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
<header>
  <h1>🕸 Knowledge Graph — Agentic Dev Harness</h1>
  <span id="stats">Loading…</span>
  <div class="controls">
    <input type="text" id="search" placeholder="Search entities…" style="width:180px">
    <select id="type-filter"><option value="">All types</option></select>
    <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="show-labels" checked> Labels
    </label>
    <label title="Drop a memory.jsonl file to load" style="font-size:12px;cursor:pointer;color:#90cdf4">
      📂 Load file
      <input type="file" id="file-input" accept=".jsonl,.json" style="display:none">
    </label>
  </div>
</header>
<div id="svg-container"></div>
<div id="info-panel"><p style="color:#718096">Click a node to inspect</p></div>
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4299e1"></div>recipe</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9f7aea"></div>skill</div>
  <div class="legend-item"><div class="legend-dot" style="background:#48bb78"></div>agent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f6ad55"></div>epic</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fc8181"></div>feature</div>
  <div class="legend-item"><div class="legend-dot" style="background:#68d391"></div>AC</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4fd1c5"></div>test</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b794f4"></div>code_file</div>
</div>

<script>
const COLORS = {
  'harness:recipe': '#4299e1','harness:skill': '#9f7aea','harness:agent': '#48bb78',
  'harness:doc': '#718096','epic': '#f6ad55','feature': '#fc8181',
  'user_story': '#f687b3','acceptance_criterion': '#68d391','test': '#4fd1c5',
  'code_file': '#b794f4','spec_file': '#faf089','bead': '#ed8936',
  'derived_status': '#e53e3e',  // red = problem status
  'default': '#a0aec0'
};
const RADII = {
  'harness:recipe':9,'harness:skill':9,'harness:agent':9,'epic':12,
  'feature':10,'acceptance_criterion':7,'test':6,'code_file':5,'default':7
};

let allNodes=[], allLinks=[], simulation, svg, g;

function colorOf(type) { return COLORS[type] || COLORS.default; }
function radiusOf(type) { return RADII[type] || RADII.default; }

function parseJSONL(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  const entities=[], relations=[];
  const seen = new Set();
  for(const l of lines) {
    try {
      const d=JSON.parse(l);
      if(d.type==='entity') {
        if(!seen.has(d.name)){seen.add(d.name); entities.push(d);}
      } else if(d.type==='relation') relations.push(d);
    } catch(e){}
  }
  return {entities, relations};
}

function render(entities, relations) {
  const nodeMap = new Map(entities.map(e=>[e.name, {...e, id:e.name}]));
  const links = relations
    .filter(r=>nodeMap.has(r.from)&&nodeMap.has(r.to))
    .map(r=>({source:r.from, target:r.to, rel:r.relationType}));

  allNodes = [...nodeMap.values()];
  allLinks = links;

  // Populate filter
  const types = [...new Set(allNodes.map(n=>n.entityType))].sort();
  const sel = document.getElementById('type-filter');
  types.forEach(t=>{ const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o); });

  document.getElementById('stats').textContent =
    allNodes.length+' entities · '+allLinks.length+' relations · '+types.length+' types';

  buildGraph(allNodes, allLinks);
}

function buildGraph(nodes, links) {
  const container = document.getElementById('svg-container');
  container.innerHTML = '';
  const W=container.clientWidth, H=container.clientHeight;

  svg = d3.select('#svg-container').append('svg')
    .attr('width',W).attr('height',H)
    .call(d3.zoom().scaleExtent([0.1,8])
      .on('zoom',e=>g.attr('transform',e.transform)));

  svg.append('defs').append('marker').attr('id','arrow')
    .attr('viewBox','0 -4 8 8').attr('refX',18).attr('markerWidth',6).attr('markerHeight',6)
    .attr('orient','auto').append('path').attr('d','M0,-4L8,0L0,4').attr('fill','#4a5568');

  g = svg.append('g');

  simulation = d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(80).strength(0.3))
    .force('charge',d3.forceManyBody().strength(-180))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide(20));

  const link = g.append('g').selectAll('.link')
    .data(links).join('line').attr('class', d => 'link' + (d.derived ? ' derived' : ''));

  const showLabels = ()=>document.getElementById('show-labels').checked;

  const linkLabel = g.append('g').selectAll('.link-label')
    .data(links).join('text').attr('class','link-label')
    .text(d=>d.rel.replace(/_/g,' '));

  const node = g.append('g').selectAll('.node').data(nodes)
    .join('g').attr('class','node')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('click',(e,d)=>showInfo(d,nodes,links));

  node.append('circle')
    .attr('r',d=>radiusOf(d.entityType))
    .attr('fill',d=>colorOf(d.entityType))
    .attr('stroke',d=>d3.color(colorOf(d.entityType)).darker())
    .attr('stroke-dasharray',d=>d.derived?'4,2':null)
    .attr('stroke-width',d=>d.derived?2:1.5);

  const labels = node.append('text')
    .attr('dy',d=>radiusOf(d.entityType)+10)
    .attr('text-anchor','middle')
    .text(d=>d.name.length>20?d.name.slice(0,18)+'…':d.name);

  simulation.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    linkLabel.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
    labels.style('display',showLabels()?'block':'none');
    linkLabel.style('display',showLabels()?'block':'none');
  });
}

function showInfo(d, nodes, links) {
  const out = links.filter(l=>(l.source.id||l.source)===d.id);
  const inp = links.filter(l=>(l.target.id||l.target)===d.id);
  const panel = document.getElementById('info-panel');
  panel.innerHTML = `
    <h3>${d.name}</h3>
    <div style="color:#9f7aea;margin:4px 0 10px">${d.entityType}</div>
    <div style="font-weight:600;margin-bottom:6px">Observations</div>
    ${(d.observations||[]).map(o=>`<div class="obs">${o}</div>`).join('')}
    <div style="font-weight:600;margin:10px 0 6px">Out → (${out.length})</div>
    ${out.map(l=>`<div class="rel">→ ${l.rel} → ${l.target.id||l.target}</div>`).join('')}
    <div style="font-weight:600;margin:10px 0 6px">← In (${inp.length})</div>
    ${inp.map(l=>`<div class="rel">← ${l.rel} ← ${l.source.id||l.source}</div>`).join('')}
  `;
}

// Search
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  d3.selectAll('.node circle').attr('opacity',d=>
    !q||d.name.toLowerCase().includes(q)||(d.observations||[]).some(o=>o.toLowerCase().includes(q))?1:0.15);
  d3.selectAll('.node text').attr('opacity',d=>
    !q||d.name.toLowerCase().includes(q)?1:0.1);
});

// Type filter
document.getElementById('type-filter').addEventListener('change',function(){
  const t=this.value;
  const visible=t?allNodes.filter(n=>n.entityType===t):allNodes;
  const vids=new Set(visible.map(n=>n.id));
  d3.selectAll('.node').attr('display',d=>vids.has(d.id)?null:'none');
  d3.selectAll('.link').attr('display',d=>vids.has(d.source.id||d.source)&&vids.has(d.target.id||d.target)?null:'none');
});

// Labels toggle
document.getElementById('show-labels').addEventListener('change',()=>simulation.restart());

// File drop
document.getElementById('file-input').addEventListener('change',function(){
  const f=this.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ const {entities,relations}=parseJSONL(e.target.result); render(entities,relations); };
  r.readAsText(f);
});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ const {entities,relations}=parseJSONL(ev.target.result); render(entities,relations); };
  r.readAsText(f);
});

// Auto-load both memory.jsonl (asserted) and derived.jsonl (inferred)
async function autoLoad() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('../../../.knowledge/memory.jsonl'),
      fetch('../../../.knowledge/derived.jsonl').catch(()=>null),
    ]);
    if (!r1.ok) throw new Error('memory.jsonl not found');
    const t1 = await r1.text();
    const t2 = r2 && r2.ok ? await r2.text() : '';
    const {entities, relations} = parseJSONL(t1 + '\n' + t2);
    render(entities, relations);
    if (t2) document.getElementById('stats').title = 'Solid = asserted, Dashed = inferred';
    return;
  } catch(e) {}
  document.getElementById('svg-container').innerHTML = `
    <div id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div style="font-size:32px;margin-bottom:12px">🕸</div>
      <div style="font-size:16px;margin-bottom:8px">Drop memory.jsonl here</div>
      <div style="font-size:12px">Also drop derived.jsonl to see inferred facts</div>
    </div>`;
}
autoLoad();
</script>
</body>
</html>
