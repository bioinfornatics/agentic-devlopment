              - generic "Reflexion" [ref=f39e418]
            - button "Copy page" [ref=f39e421] [cursor=pointer]:
              - img [ref=f39e422]
              - text: Copy page
              - img [ref=f39e425]
            - heading "Reflexion" [level=1] [ref=f39e427]
            - paragraph [ref=f39e428]:
              - text: Reflexion is a framework to reinforce language-based agents through linguistic feedback. According to
              - link "Shinn et al. (2023) (opens in a new tab)" [ref=f39e429] [cursor=pointer]:
                - /url: https://arxiv.org/pdf/2303.11366.pdf
                - text: Shinn et al. (2023)
                - generic [ref=f39e430]: (opens in a new tab)
              - text: ", \"Reflexion is a new paradigm for ‘verbal‘ reinforcement that parameterizes a policy as an agent’s memory encoding paired with a choice of LLM parameters.\""
            - paragraph [ref=f39e431]:
              - text: At a high level, Reflexion converts feedback (either free-form language or scalar) from the environment into linguistic feedback, also referred to as
              - strong [ref=f39e432]: self-reflection
              - text: ", which is provided as context for an LLM agent in the next episode. This helps the agent rapidly and effectively learn from prior mistakes leading to performance improvements on many advanced tasks."
            - paragraph [ref=f39e433]:
              - img "\"Reflexion Framework\"" [ref=f39e434]
            - paragraph [ref=f39e435]: "As shown in the figure above, Reflexion consists of three distinct models:"
            - list [ref=f39e436]:
              - listitem [ref=f39e437]:
                - strong [ref=f39e438]: An Actor
                - text: ": Generates text and actions based on the state observations. The Actor takes an action in an environment and receives an observation which results in a trajectory."
                - link "Chain-of-Thought (CoT) (opens in a new tab)" [ref=f39e439] [cursor=pointer]:
                  - /url: https://www.promptingguide.ai/techniques/cot
                  - text: Chain-of-Thought (CoT)
                  - generic [ref=f39e440]: (opens in a new tab)
                - text: and
                - link "ReAct (opens in a new tab)" [ref=f39e441] [cursor=pointer]:
                  - /url: https://www.promptingguide.ai/techniques/react
                  - text: ReAct
                  - generic [ref=f39e442]: (opens in a new tab)
                - text: are used as Actor models. A memory component is also added to provide additional context to the agent.
              - listitem [ref=f39e443]:
                - strong [ref=f39e444]: An Evaluator
                - text: ": Scores outputs produced by the Actor. Concretely, it takes as input a generated trajectory (also denoted as short-term memory) and outputs a reward score. Different reward functions are used depending on the task (LLMs and rule-based heuristics are used for decision-making tasks)."
              - listitem [ref=f39e445]:
                - strong [ref=f39e446]: Self-Reflection
                - text: ": Generates verbal reinforcement cues to assist the Actor in self-improvement. This role is achieved by an LLM and provides valuable feedback for future trials. To generate specific and relevant feedback, which is also stored in memory, the self-reflection model makes use of the reward signal, the current trajectory, and its persistent memory. These experiences (stored in long-term memory) are leveraged by the agent to rapidly improve decision-making."
            - paragraph [ref=f39e447]: In summary, the key steps of the Reflexion process are a) define a task, b) generate a trajectory, c) evaluate, d) perform reflection, and e) generate the next trajectory. The figure below demonstrates examples of how a Reflexion agent can learn to iteratively optimize its behavior to solve various tasks such as decision-making, programming, and reasoning. Reflexion extends the ReAct framework by introducing self-evaluation, self-reflection and memory components.
            - paragraph [ref=f39e448]:
              - img "\"Reflexion Examples\"" [ref=f39e449]
            - heading "ResultsPermalink for this section" [level=2] [ref=f39e450]:
              - text: Results
              - link "Permalink for this section" [ref=f39e451] [cursor=pointer]:
                - /url: "#results"
                - text: "#"
            - paragraph [ref=f39e452]: Experimental results demonstrate that Reflexion agents significantly improve performance on decision-making AlfWorld tasks, reasoning questions in HotPotQA, and Python programming tasks on HumanEval.
            - paragraph [ref=f39e453]: When evaluated on sequential decision-making (AlfWorld) tasks, ReAct + Reflexion significantly outperforms ReAct by completing 130/134 tasks using self-evaluation techniques of Heuristic and GPT for binary classification.
            - paragraph [ref=f39e454]:
              - img "\"Reflexion ALFWorld Results\"" [ref=f39e455]
            - paragraph [ref=f39e456]: Reflexion significantly outperforms all baseline approaches over several learning steps. For reasoning only and when adding an episodic memory consisting of the most recent trajectory, Reflexion + CoT outperforms CoT only and CoT with episodic memory, respectively.
            - paragraph [ref=f39e457]:
              - img "\"Reflexion ALFWorld Results\"" [ref=f39e458]
            - paragraph [ref=f39e459]: As summarized in the table below, Reflexion generally outperforms the previous state-of-the-art approaches on Python and Rust code writing on MBPP, HumanEval, and Leetcode Hard.
            - paragraph [ref=f39e460]:
              - img "\"Reflexion ALFWorld Results\"" [ref=f39e461]
            - heading "When to Use Reflexion?Permalink for this section" [level=2] [ref=f39e462]:
              - text: When to Use Reflexion?
              - link "Permalink for this section" [ref=f39e463] [cursor=pointer]:
                - /url: "#when-to-use-reflexion"
                - text: "#"
            - paragraph [ref=f39e464]: "Reflexion is best suited for the following:"
            - list [ref=f39e465]:
              - listitem [ref=f39e466]:
                - paragraph [ref=f39e467]:
                  - strong [ref=f39e468]: An agent needs to learn from trial and error
                  - text: ": Reflexion is designed to help agents improve their performance by reflecting on past mistakes and incorporating that knowledge into future decisions. This makes it well-suited for tasks where the agent needs to learn through trial and error, such as decision-making, reasoning, and programming."
              - listitem [ref=f39e469]:
                - paragraph [ref=f39e470]:
                  - strong [ref=f39e471]: Traditional reinforcement learning methods are impractical
                  - text: ": Traditional reinforcement learning (RL) methods often require extensive training data and expensive model fine-tuning. Reflexion offers a lightweight alternative that doesn't require fine-tuning the underlying language model, making it more efficient in terms of data and compute resources."
              - listitem [ref=f39e472]:
                - paragraph [ref=f39e473]:
                  - strong [ref=f39e474]: Nuanced feedback is required
                  - text: ": Reflexion utilizes verbal feedback, which can be more nuanced and specific than scalar rewards used in traditional RL. This allows the agent to better understand its mistakes and make more targeted improvements in subsequent trials."
              - listitem [ref=f39e475]:
                - paragraph [ref=f39e476]:
                  - strong [ref=f39e477]: Interpretability and explicit memory are important
                  - text: ": Reflexion provides a more interpretable and explicit form of episodic memory compared to traditional RL methods. The agent's self-reflections are stored in its memory, allowing for easier analysis and understanding of its learning process."
            - paragraph [ref=f39e478]: "Reflexion is effective in the following tasks:"
            - list [ref=f39e479]:
              - listitem [ref=f39e480]:
                - strong [ref=f39e481]: Sequential decision-making
                - text: ": Reflexion agents improve their performance in AlfWorld tasks, which involve navigating through various environments and completing multi-step objectives."
              - listitem [ref=f39e482]:
                - strong [ref=f39e483]: Reasoning
                - text: ": Reflexion improved the performance of agents on HotPotQA, a question-answering dataset that requires reasoning over multiple documents."
              - listitem [ref=f39e484]:
                - strong [ref=f39e485]: Programming
                - text: ": Reflexion agents write better code on benchmarks like HumanEval and MBPP, achieving state-of-the-art results in some cases."
            - paragraph [ref=f39e486]: "Here are some limitations of Reflexion:"
            - list [ref=f39e487]:
              - listitem [ref=f39e488]:
                - strong [ref=f39e489]: Reliance on self-evaluation capabilities
                - text: ": Reflexion relies on the agent's ability to accurately evaluate its performance and generate useful self-reflections. This can be challenging, especially for complex tasks but it's expected that Reflexion gets better over time as models keep improving in capabilities."
              - listitem [ref=f39e490]:
                - strong [ref=f39e491]: Long-term memory constraints
                - text: ": Reflexion makes use of a sliding window with maximum capacity but for more complex tasks it may be advantageous to use advanced structures such as vector embedding or SQL databases."
              - listitem [ref=f39e492]:
                - strong [ref=f39e493]: Code generation limitations
                - text: ": There are limitations to test-driven development in specifying accurate input-output mappings (e.g., non-deterministic generator function and function outputs influenced by hardware)."
