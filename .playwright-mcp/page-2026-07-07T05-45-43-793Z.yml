              - listitem [ref=f3e89]:
                - strong [ref=f3e90]: Request specialized help
                - text: ": \"Use a code reviewer to analyze this function for security issues\""
              - listitem [ref=f3e91]:
                - strong [ref=f3e92]: Reference specific recipes
                - text: ": \"Use the 'security-auditor' recipe to scan this endpoint\""
              - listitem [ref=f3e93]:
                - strong [ref=f3e94]: Run parallel tasks
                - text: ": \"Create three HTML templates simultaneously\""
              - listitem [ref=f3e95]:
                - strong [ref=f3e96]: Delegate complex work
                - text: ": \"Research quantum computing developments and summarize findings\""
              - listitem [ref=f3e97]:
                - strong [ref=f3e98]: Control extension access
                - text: ": \"Create a subagent with only the developer extension to refactor the code\""
            - paragraph [ref=f3e99]: You can run multiple subagents sequentially or in parallel.
