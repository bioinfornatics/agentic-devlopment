                - text: Autonomous Subagent Creation
              - paragraph [ref=f3e85]:
                - text: goose can autonomously decide to use subagents when it determines they would be beneficial for your task - you don't always need to explicitly request them. This happens automatically in autonomous
                - link "permission mode" [ref=f3e86] [cursor=pointer]:
                  - /url: /docs/guides/managing-tools/goose-permissions
                - text: (the default). Subagents are disabled in manual approval, smart approval, and chat-only modes.
            - paragraph [ref=f3e87]: "To use subagents, ask goose to delegate tasks using natural language. goose automatically decides when to spawn subagents and handles their lifecycle. You can:"
