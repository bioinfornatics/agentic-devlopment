            - paragraph [ref=f2e74]: Custom agents are reusable goose configurations for specific roles, behaviors, or areas of expertise. Each agent packages a name, description, optional model preference, and instructions so you can quickly ask goose to work with a specialized role such as code reviewer, documentation writer, test planner, or release assistant.
            - paragraph [ref=f2e75]: Use custom agents when you want the same role or behavior across multiple sessions without retyping the same instructions.
