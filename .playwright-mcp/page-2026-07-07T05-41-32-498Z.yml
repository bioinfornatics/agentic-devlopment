            - paragraph [ref=f2e242]: The delegated agent runs in a separate session with the instructions from the agent file. It can use the model specified in the agent frontmatter. Some interfaces also let you override settings such as model, provider, temperature, or max turns when you delegate.
            - heading "Load an agent's instructions into the current conversationDirect link to Load an agent's instructions into the current conversation" [level=3] [ref=f2e243]:
