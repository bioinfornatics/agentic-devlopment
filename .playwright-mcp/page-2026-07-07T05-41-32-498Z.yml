            - paragraph [ref=f2e335]: Agents define who goose should be for a task. Skills and recipes define what goose should know or do.
            - heading "Can custom agents be scheduled to run?Direct link to Can custom agents be scheduled to run?" [level=3] [ref=f2e336]:
              - text: Can custom agents be scheduled to run?
              - link "Direct link to Can custom agents be scheduled to run?" [ref=f2e337] [cursor=pointer]:
                - /url: "#can-custom-agents-be-scheduled-to-run"
                - text: "#"
            - paragraph [ref=f2e338]:
              - text: Not directly. Custom agents are reusable roles, not scheduled jobs. To run something on a schedule, create a
              - link "recipe" [ref=f2e339] [cursor=pointer]:
                - /url: /docs/guides/recipes
              - text: and schedule the recipe. If you want the scheduled job to behave like a custom agent, put the agent's instructions into the recipe or have the recipe delegate to that agent.
            - heading "Do custom agents have workflows?Direct link to Do custom agents have workflows?" [level=3] [ref=f2e340]:
              - text: Do custom agents have workflows?
              - link "Direct link to Do custom agents have workflows?" [ref=f2e341] [cursor=pointer]:
                - /url: "#do-custom-agents-have-workflows"
                - text: "#"
            - paragraph [ref=f2e342]: "No. A custom agent defines who goose should be for a task: its role, behavior, instructions, and optional model preference. It does not define a step-by-step workflow. Use a recipe when you need repeatable steps, parameters, extension configuration, or scheduled execution."
            - heading "Can custom agents use skills?Direct link to Can custom agents use skills?" [level=3] [ref=f2e343]:
              - text: Can custom agents use skills?
              - link "Direct link to Can custom agents use skills?" [ref=f2e344] [cursor=pointer]:
                - /url: "#can-custom-agents-use-skills"
                - text: "#"
            - paragraph [ref=f2e345]: Yes. A custom agent can use skills that are available in the session. Skills are still discovered and loaded through goose's normal skill behavior, so the agent can use them when your request matches a skill or when you explicitly ask for one.
            - heading "Can custom agents run recipes?Direct link to Can custom agents run recipes?" [level=3] [ref=f2e346]:
              - text: Can custom agents run recipes?
              - link "Direct link to Can custom agents run recipes?" [ref=f2e347] [cursor=pointer]:
                - /url: "#can-custom-agents-run-recipes"
                - text: "#"
            - paragraph [ref=f2e348]: A custom agent does not contain or automatically run a recipe. You can start goose with a recipe, ask goose to load or delegate a recipe when the relevant tools are available, or create a recipe that uses custom-agent instructions as part of its workflow.
            - heading "Can custom agents use MCP servers?Direct link to Can custom agents use MCP servers?" [level=3] [ref=f2e349]:
              - text: Can custom agents use MCP servers?
              - link "Direct link to Can custom agents use MCP servers?" [ref=f2e350] [cursor=pointer]:
                - /url: "#can-custom-agents-use-mcp-servers"
                - text: "#"
            - paragraph [ref=f2e351]: Yes. Custom agents can use the MCP servers and extensions that are enabled in the current session. The agent file itself does not define a separate MCP server list. If you need a reusable setup with a specific extension set, use a recipe.
            - heading "Can custom agents call subagents?Direct link to Can custom agents call subagents?" [level=3] [ref=f2e352]:
              - text: Can custom agents call subagents?
              - link "Direct link to Can custom agents call subagents?" [ref=f2e353] [cursor=pointer]:
                - /url: "#can-custom-agents-call-subagents"
                - text: "#"
            - paragraph [ref=f2e354]: Yes, when delegation tools are available in the session. A custom agent can ask goose to delegate work to a subagent just like the default goose agent can. Delegated subagents run in isolated sessions and do not automatically inherit the full parent conversation.
            - heading "Can one custom agent call another custom agent?Direct link to Can one custom agent call another custom agent?" [level=3] [ref=f2e355]:
              - text: Can one custom agent call another custom agent?
              - link "Direct link to Can one custom agent call another custom agent?" [ref=f2e356] [cursor=pointer]:
                - /url: "#can-one-custom-agent-call-another-custom-agent"
                - text: "#"
            - paragraph [ref=f2e357]: Yes, through delegation. For example, one custom agent can delegate a task to another custom agent by name if that agent is discoverable. This is useful for one-off collaboration between specialized agents.
            - paragraph [ref=f2e358]: For repeatable chains, use a recipe that explicitly defines the sequence, such as delegating first to a reviewer agent, then to a docs agent, then combining the results.
