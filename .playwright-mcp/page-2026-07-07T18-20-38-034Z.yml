            - paragraph [ref=f54e481]:
              - link "Sun (2023) (opens in a new tab)" [ref=f54e482] [cursor=pointer]:
                - /url: https://github.com/holarissun/PanelGPT
                - text: Sun (2023)
                - generic [ref=f54e483]: (opens in a new tab)
              - text: benchmarked the Tree-of-Thought Prompting with large-scale experiments, and introduce PanelGPT --- an idea of prompting with Panel discussions among LLMs.
