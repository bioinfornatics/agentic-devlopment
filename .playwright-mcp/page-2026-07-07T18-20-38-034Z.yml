            - heading "Tree of Thoughts (ToT)" [level=1] [ref=f54e427]
            - paragraph [ref=f54e428]:
              - text: For complex tasks that require exploration or strategic lookahead, traditional or simple prompting techniques fall short.
              - link "Yao et el. (2023) (opens in a new tab)" [ref=f54e429] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.10601
                - text: Yao et el. (2023)
                - generic [ref=f54e430]: (opens in a new tab)
              - text: and
              - link "Long (2023) (opens in a new tab)" [ref=f54e431] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.08291
                - text: Long (2023)
                - generic [ref=f54e432]: (opens in a new tab)
              - text: recently proposed Tree of Thoughts (ToT), a framework that generalizes over chain-of-thought prompting and encourages exploration over thoughts that serve as intermediate steps for general problem solving with language models.
            - paragraph [ref=f54e433]: ToT maintains a tree of thoughts, where thoughts represent coherent language sequences that serve as intermediate steps toward solving a problem. This approach enables an LM to self-evaluate the progress through intermediate thoughts made towards solving a problem through a deliberate reasoning process. The LM's ability to generate and evaluate thoughts is then combined with search algorithms (e.g., breadth-first search and depth-first search) to enable systematic exploration of thoughts with lookahead and backtracking.
            - paragraph [ref=f54e434]: "The ToT framework is illustrated below:"
            - img "TOT" [ref=f54e436]
            - paragraph [ref=f54e437]:
              - text: "Image Source:"
              - link "Yao et el. (2023) (opens in a new tab)" [ref=f54e438] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.10601
                - text: Yao et el. (2023)
                - generic [ref=f54e439]: (opens in a new tab)
            - paragraph [ref=f54e440]: When using ToT, different tasks requires defining the number of candidates and the number of thoughts/steps. For instance, as demonstrated in the paper, Game of 24 is used as a mathematical reasoning task which requires decomposing the thoughts into 3 steps, each involving an intermediate equation. At each step, the best b=5 candidates are kept.
            - paragraph [ref=f54e441]: "To perform BFS in ToT for the Game of 24 task, the LM is prompted to evaluate each thought candidate as \"sure/maybe/impossible\" with regard to reaching 24. As stated by the authors, \"the aim is to promote correct partial solutions that can be verdicted within few lookahead trials, and eliminate impossible partial solutions based on \"too big/small\" commonsense, and keep the rest \"maybe\"\". Values are sampled 3 times for each thought. The process is illustrated below:"
            - img "TOT2" [ref=f54e443]
            - paragraph [ref=f54e444]:
              - text: "Image Source:"
              - link "Yao et el. (2023) (opens in a new tab)" [ref=f54e445] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.10601
                - text: Yao et el. (2023)
                - generic [ref=f54e446]: (opens in a new tab)
            - paragraph [ref=f54e447]: "From the results reported in the figure below, ToT substantially outperforms the other prompting methods:"
            - img "TOT3" [ref=f54e449]
            - paragraph [ref=f54e450]:
              - text: "Image Source:"
              - link "Yao et el. (2023) (opens in a new tab)" [ref=f54e451] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.10601
                - text: Yao et el. (2023)
                - generic [ref=f54e452]: (opens in a new tab)
            - paragraph [ref=f54e453]:
              - text: Code available
              - link "here (opens in a new tab)" [ref=f54e454] [cursor=pointer]:
                - /url: https://github.com/princeton-nlp/tree-of-thought-llm
                - text: here
                - generic [ref=f54e455]: (opens in a new tab)
              - text: and
              - link "here (opens in a new tab)" [ref=f54e456] [cursor=pointer]:
                - /url: https://github.com/jieyilong/tree-of-thought-puzzle-solver
                - text: here
                - generic [ref=f54e457]: (opens in a new tab)
            - paragraph [ref=f54e458]:
              - text: At a high level, the main ideas of
              - link "Yao et el. (2023) (opens in a new tab)" [ref=f54e459] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.10601
                - text: Yao et el. (2023)
                - generic [ref=f54e460]: (opens in a new tab)
              - text: and
              - link "Long (2023) (opens in a new tab)" [ref=f54e461] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.08291
                - text: Long (2023)
                - generic [ref=f54e462]: (opens in a new tab)
              - text: are similar. Both enhance LLM's capability for complex problem solving through tree search via a multi-round conversation. One of the main difference is that
              - link "Yao et el. (2023) (opens in a new tab)" [ref=f54e463] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.10601
                - text: Yao et el. (2023)
                - generic [ref=f54e464]: (opens in a new tab)
              - text: leverages DFS/BFS/beam search, while the tree search strategy (i.e. when to backtrack and backtracking by how many levels, etc.) proposed in
              - link "Long (2023) (opens in a new tab)" [ref=f54e465] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2305.08291
                - text: Long (2023)
                - generic [ref=f54e466]: (opens in a new tab)
              - text: is driven by a "ToT Controller" trained through reinforcement learning. DFS/BFS/Beam search are generic solution search strategies with no adaptation to specific problems. In comparison, a ToT Controller trained through RL might be able learn from new data set or through self-play (AlphaGo vs brute force search), and hence the RL-based ToT system can continue to evolve and learn new knowledge even with a fixed LLM.
            - paragraph [ref=f54e467]:
              - link "Hulbert (2023) (opens in a new tab)" [ref=f54e468] [cursor=pointer]:
                - /url: https://github.com/dave1010/tree-of-thought-prompting
                - text: Hulbert (2023)
                - generic [ref=f54e469]: (opens in a new tab)
              - text: "has proposed Tree-of-Thought Prompting, which applies the main concept from ToT frameworks as a simple prompting technique, getting the LLM to evaluate intermediate thoughts in a single prompt. A sample ToT prompt is:"
            - generic [ref=f54e470]:
              - code [ref=f54e472]:
                - generic [ref=f54e473]: Imagine three different experts are answering this question.
                - generic [ref=f54e474]: All experts will write down 1 step of their thinking,
                - generic [ref=f54e475]: then share it with the group.
                - generic [ref=f54e476]: Then all experts will go on to the next step, etc.
                - generic [ref=f54e477]: If any expert realises they're wrong at any point then they leave.
                - generic [ref=f54e478]: The question is...
