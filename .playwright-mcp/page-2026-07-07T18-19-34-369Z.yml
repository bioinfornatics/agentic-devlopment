            - heading "Generated Knowledge Prompting" [level=1] [ref=f52e427]
            - img "GENKNOW" [ref=f52e429]
            - paragraph [ref=f52e430]:
              - text: "Image Source:"
              - link "Liu et al. 2022 (opens in a new tab)" [ref=f52e431] [cursor=pointer]:
                - /url: https://arxiv.org/pdf/2110.08387.pdf
                - text: Liu et al. 2022
                - generic [ref=f52e432]: (opens in a new tab)
            - paragraph [ref=f52e433]: LLMs continue to be improved and one popular technique includes the ability to incorporate knowledge or information to help the model make more accurate predictions.
            - paragraph [ref=f52e434]:
              - text: Using a similar idea, can the model also be used to generate knowledge before making a prediction? That's what is attempted in the paper by
              - link "Liu et al. 2022 (opens in a new tab)" [ref=f52e435] [cursor=pointer]:
                - /url: https://arxiv.org/pdf/2110.08387.pdf
                - text: Liu et al. 2022
                - generic [ref=f52e436]: (opens in a new tab)
              - text: "-- generate knowledge to be used as part of the prompt. In particular, how helpful is this for tasks such as commonsense reasoning?"
            - paragraph [ref=f52e437]: "Let's try a simple prompt:"
            - paragraph [ref=f52e438]:
              - emphasis [ref=f52e439]: "Prompt:"
            - generic [ref=f52e440]:
              - code [ref=f52e442]:
                - generic [ref=f52e443]: Part of golf is trying to get a higher point total than others. Yes or No?
              - button [ref=f52e445] [cursor=pointer]:
                - img
            - paragraph [ref=f52e446]:
              - emphasis [ref=f52e447]: "Output:"
            - generic [ref=f52e448]:
              - code [ref=f52e450]:
                - generic [ref=f52e451]: Yes.
              - button [ref=f52e453] [cursor=pointer]:
                - img
            - paragraph [ref=f52e454]: This type of mistake reveals the limitations of LLMs to perform tasks that require more knowledge about the world. How do we improve this with knowledge generation?
            - paragraph [ref=f52e455]: "First, we generate a few \"knowledges\":"
            - paragraph [ref=f52e456]:
              - emphasis [ref=f52e457]: "Prompt:"
            - generic [ref=f52e458]:
              - code [ref=f52e460]:
                - generic [ref=f52e461]: "Input: Greece is larger than mexico."
                - generic [ref=f52e462]: "Knowledge: Greece is approximately 131,957 sq km, while Mexico is approximately 1,964,375 sq km, making Mexico 1,389% larger than Greece."
                - generic [ref=f52e463]: "Input: Glasses always fog up."
                - generic [ref=f52e464]: "Knowledge: Condensation occurs on eyeglass lenses when water vapor from your sweat, breath, and ambient humidity lands on a cold surface, cools, and then changes into tiny drops of liquid, forming a film that you see as fog. Your lenses will be relatively cool compared to your breath, especially when the outside air is cold."
                - generic [ref=f52e465]: "Input: A fish is capable of thinking."
                - generic [ref=f52e466]: "Knowledge: Fish are more intelligent than they appear. In many areas, such as memory, their cognitive powers match or exceed those of ’higher’ vertebrates including non-human primates. Fish’s long-term memories help them keep track of complex social relationships."
                - generic [ref=f52e467]: "Input: A common effect of smoking lots of cigarettes in one’s lifetime is a higher than normal chance of getting lung cancer."
                - generic [ref=f52e468]: "Knowledge: Those who consistently averaged less than one cigarette per day over their lifetime had nine times the risk of dying from lung cancer than never smokers. Among people who smoked between one and 10 cigarettes per day, the risk of dying from lung cancer was nearly 12 times higher than that of never smokers."
                - generic [ref=f52e469]: "Input: A rock is the same size as a pebble."
                - generic [ref=f52e470]: "Knowledge: A pebble is a clast of rock with a particle size of 4 to 64 millimetres based on the Udden-Wentworth scale of sedimentology. Pebbles are generally considered larger than granules (2 to 4 millimetres diameter) and smaller than cobbles (64 to 256 millimetres diameter)."
                - generic [ref=f52e471]: "Input: Part of golf is trying to get a higher point total than others."
                - generic [ref=f52e472]: "Knowledge:"
              - button [ref=f52e474] [cursor=pointer]:
                - img
            - paragraph [ref=f52e475]:
              - emphasis [ref=f52e476]: "Knowledge 1:"
            - generic [ref=f52e477]:
              - code [ref=f52e479]:
                - generic [ref=f52e480]: The objective of golf is to play a set of holes in the least number of strokes. A round of golf typically consists of 18 holes. Each hole is played once in the round on a standard golf course. Each stroke is counted as one point, and the total number of strokes is used to determine the winner of the game.
              - button [ref=f52e482] [cursor=pointer]:
                - img
            - paragraph [ref=f52e483]:
              - emphasis [ref=f52e484]: "Knowledge 2:"
            - generic [ref=f52e485]:
              - code [ref=f52e487]:
                - generic [ref=f52e488]: Golf is a precision club-and-ball sport in which competing players (or golfers) use many types of clubs to hit balls into a series of holes on a course using the fewest number of strokes. The goal is to complete the course with the lowest score, which is calculated by adding up the total number of strokes taken on each hole. The player with the lowest score wins the game.
              - button [ref=f52e490] [cursor=pointer]:
                - img
            - paragraph [ref=f52e491]:
              - text: We are using the prompt provided in the paper by
              - link "Liu et al. 2022 (opens in a new tab)" [ref=f52e492] [cursor=pointer]:
                - /url: https://arxiv.org/pdf/2110.08387.pdf
                - text: Liu et al. 2022
                - generic [ref=f52e493]: (opens in a new tab)
              - text: .
            - paragraph [ref=f52e494]: The next step is to integrate the knowledge and get a prediction. I reformatted the question into QA format to guide the answer format.
            - paragraph [ref=f52e495]:
              - emphasis [ref=f52e496]: "Prompt:"
            - generic [ref=f52e497]:
              - code [ref=f52e499]:
                - generic [ref=f52e500]: "Question: Part of golf is trying to get a higher point total than others. Yes or No?"
                - generic [ref=f52e501]: "Knowledge: The objective of golf is to play a set of holes in the least number of strokes. A round of golf typically consists of 18 holes. Each hole is played once in the round on a standard golf course. Each stroke is counted as one point, and the total number of strokes is used to determine the winner of the game."
                - generic [ref=f52e502]: "Explain and Answer:"
              - button [ref=f52e504] [cursor=pointer]:
                - img
            - paragraph [ref=f52e505]:
              - emphasis [ref=f52e506]: "Answer 1 (confidence very high):"
            - generic [ref=f52e507]:
