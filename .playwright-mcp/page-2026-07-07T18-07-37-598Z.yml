        - article [ref=f33e411]:
          - main [ref=f33e412]:
            - generic "Prompt Engineering" [ref=f33e414]
            - heading "Prompt Engineering Guide" [level=1] [ref=f33e442]
            - paragraph [ref=f33e443]: Le prompt engineering est une discipline relativement nouvelle pour développer et optimiser des prompts afin d'utiliser efficacement des modèles de langage (LMs) pour une grande variété d'applications et de sujets de recherche. Les compétences en Prompt engineering aident à mieux comprendre les capacités et les limites des grands modèles de langage (LLMs).
            - paragraph [ref=f33e444]: Les chercheurs utilisent le prompt engineering pour améliorer la capacité des LLMs sur une large gamme de tâches courantes et complexes telles que la réponse à des questions et le raisonnement arithmétique. Les développeurs utilisent le prompt engineering pour concevoir des techniques de prompts robustes et efficaces qui interagissent avec les LLMs et d'autres outils.
            - paragraph [ref=f33e445]: Le prompt engineering ne se résume pas seulement à la conception et au développement de prompts. Elle englobe une large gamme de compétences et de techniques utiles pour interagir et développer avec les LLMs. C'est une compétence importante pour interfacer, construire et comprendre les capacités des LLMs. Vous pouvez utiliser le prompt engineering pour améliorer la sécurité des LLMs et créer de nouvelles fonctionnalités telles que l'augmentation des LLMs avec des connaissances de domaine et des outils externes.
            - paragraph [ref=f33e446]: Animés par un fort intérêt pour le développement avec les LLMs, nous avons créé ce nouveau guide d'ingénierie de prompts qui contient tous les derniers papers, guides d'apprentissage, modèles, conférences, références, nouvelles capacités des LLM, et outils liés au prompt engineering.
