            - heading "Results on Knowledge-Intensive TasksPermalink for this section" [level=2] [ref=f44e497]:
              - text: Results on Knowledge-Intensive Tasks
              - link "Permalink for this section" [ref=f44e498] [cursor=pointer]:
                - /url: "#results-on-knowledge-intensive-tasks"
                - text: "#"
            - paragraph [ref=f44e499]:
              - text: The paper first evaluates ReAct on knowledge-intensive reasoning tasks such as question answering (HotPotQA) and fact verification (
              - link "Fever (opens in a new tab)" [ref=f44e500] [cursor=pointer]:
                - /url: https://fever.ai/resources.html
                - text: Fever
                - generic [ref=f44e501]: (opens in a new tab)
              - text: ). PaLM-540B is used as the base model for prompting.
            - img "REACT1" [ref=f44e503]
            - paragraph [ref=f44e504]:
              - text: "Image Source:"
              - link "Yao et al., 2022 (opens in a new tab)" [ref=f44e505] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2210.03629
                - text: Yao et al., 2022
                - generic [ref=f44e506]: (opens in a new tab)
            - paragraph [ref=f44e507]: The prompting results on HotPotQA and Fever using different prompting methods show that ReAct generally performs better than Act (involves acting only) on both tasks.
            - paragraph [ref=f44e508]: "We can also observe that ReAct outperforms CoT on Fever and lags behind CoT on HotpotQA. A detailed error analysis is provided in the paper. In summary:"
            - list [ref=f44e509]:
              - listitem [ref=f44e510]: CoT suffers from fact hallucination
              - listitem [ref=f44e511]: ReAct's structural constraint reduces its flexibility in formulating reasoning steps
              - listitem [ref=f44e512]: ReAct depends a lot on the information it's retrieving; non-informative search results derails the model reasoning and leads to difficulty in recovering and reformulating thoughts
            - paragraph [ref=f44e513]: Prompting methods that combine and support switching between ReAct and CoT+Self-Consistency generally outperform all the other prompting methods.
            - heading "Results on Decision Making TasksPermalink for this section" [level=2] [ref=f44e514]:
              - text: Results on Decision Making Tasks
              - link "Permalink for this section" [ref=f44e515] [cursor=pointer]:
                - /url: "#results-on-decision-making-tasks"
                - text: "#"
            - paragraph [ref=f44e516]:
              - text: The paper also reports results demonstrating ReAct's performance on decision making tasks. ReAct is evaluated on two benchmarks called
              - link "ALFWorld (opens in a new tab)" [ref=f44e517] [cursor=pointer]:
                - /url: https://alfworld.github.io/
                - text: ALFWorld
                - generic [ref=f44e518]: (opens in a new tab)
              - text: (text-based game) and
              - link "WebShop (opens in a new tab)" [ref=f44e519] [cursor=pointer]:
                - /url: https://webshop-pnlp.github.io/
                - text: WebShop
                - generic [ref=f44e520]: (opens in a new tab)
              - text: (online shopping website environment). Both involve complex environments that require reasoning to act and explore effectively.
            - paragraph [ref=f44e521]: Note that the ReAct prompts are designed differently for these tasks while still keeping the same core idea of combining reasoning and acting. Below is an example for an ALFWorld problem involving ReAct prompting.
            - img "REACT2" [ref=f44e523]
            - paragraph [ref=f44e524]:
              - text: "Image Source:"
              - link "Yao et al., 2022 (opens in a new tab)" [ref=f44e525] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2210.03629
                - text: Yao et al., 2022
                - generic [ref=f44e526]: (opens in a new tab)
            - paragraph [ref=f44e527]: ReAct outperforms Act on both ALFWorld and Webshop. Act, without any thoughts, fails to correctly decompose goals into subgoals. Reasoning seems to be advantageous in ReAct for these types of tasks but current prompting-based methods are still far from the performance of expert humans on these tasks.
            - paragraph [ref=f44e528]: Check out the paper for more detailed results.
            - heading "LangChain ReAct UsagePermalink for this section" [level=2] [ref=f44e529]:
              - text: LangChain ReAct Usage
              - link "Permalink for this section" [ref=f44e530] [cursor=pointer]:
                - /url: "#langchain-react-usage"
                - text: "#"
            - paragraph [ref=f44e531]:
              - text: Below is a high-level example of how the ReAct prompting approach works in practice. We will be using OpenAI for the LLM and
              - link "LangChain (opens in a new tab)" [ref=f44e532] [cursor=pointer]:
                - /url: https://python.langchain.com/en/latest/index.html
                - text: LangChain
                - generic [ref=f44e533]: (opens in a new tab)
              - text: as it already has built-in functionality that leverages the ReAct framework to build agents that perform tasks by combining the power of LLMs and different tools.
            - paragraph [ref=f44e534]: "First, let's install and import the necessary libraries:"
            - generic [ref=f44e535]:
              - code [ref=f44e537]:
                - generic [ref=f44e538]: "%%capture"
                - generic [ref=f44e539]: "# update or install the necessary libraries"
                - generic [ref=f44e540]: "!pip install --upgrade openai"
                - generic [ref=f44e541]: "!pip install --upgrade langchain"
                - generic [ref=f44e542]: "!pip install --upgrade python-dotenv"
                - generic [ref=f44e543]: "!pip install google-search-results"
                - generic [ref=f44e545]: "# import libraries"
                - generic [ref=f44e546]: import openai
                - generic [ref=f44e547]: import os
                - generic [ref=f44e548]: from langchain.llms import OpenAI
                - generic [ref=f44e549]: from langchain.agents import load_tools
                - generic [ref=f44e550]: from langchain.agents import initialize_agent
                - generic [ref=f44e551]: from dotenv import load_dotenv
                - generic [ref=f44e552]: load_dotenv()
                - generic [ref=f44e554]: "# load API keys; you will need to obtain these if you haven't yet"
                - generic [ref=f44e555]: os.environ["OPENAI_API_KEY"] = os.getenv("OPENAI_API_KEY")
                - generic [ref=f44e556]: os.environ["SERPER_API_KEY"] = os.getenv("SERPER_API_KEY")
              - button [ref=f44e559] [cursor=pointer]:
                - img
            - paragraph [ref=f44e560]: Now we can configure the LLM, the tools we will use, and the agent that allows us to leverage the ReAct framework together with the LLM and tools. Note that we are using a search API for searching external information and LLM as a math tool.
            - generic [ref=f44e561]:
              - code [ref=f44e563]:
                - generic [ref=f44e564]: llm = OpenAI(model_name="text-davinci-003" ,temperature=0)
                - generic [ref=f44e565]: tools = load_tools(["google-serper", "llm-math"], llm=llm)
                - generic [ref=f44e566]: agent = initialize_agent(tools, llm, agent="zero-shot-react-description", verbose=True)
              - button [ref=f44e568] [cursor=pointer]:
                - img
            - paragraph [ref=f44e569]: Once that's configured, we can now run the agent with the desired query/prompt. Notice that here we are not expected to provide few-shot exemplars as explained in the paper.
            - generic [ref=f44e570]:
              - code [ref=f44e572]:
                - generic [ref=f44e573]: agent.run("Who is Olivia Wilde's boyfriend? What is his current age raised to the 0.23 power?")
              - button [ref=f44e575] [cursor=pointer]:
                - img
            - paragraph [ref=f44e576]: "The chain execution looks as follows:"
            - generic [ref=f44e577]:
              - code [ref=f44e579]:
                - generic [ref=f44e580]: "> Entering new AgentExecutor chain..."
                - generic [ref=f44e581]: I need to find out who Olivia Wilde's boyfriend is and then calculate his age raised to the 0.23 power.
                - generic [ref=f44e582]: "Action: Search"
                - generic [ref=f44e583]: "Action Input: \"Olivia Wilde boyfriend\""
                - generic [ref=f44e584]: "Observation: Olivia Wilde started dating Harry Styles after ending her years-long engagement to Jason Sudeikis — see their relationship timeline."
                - generic [ref=f44e585]: "Thought: I need to find out Harry Styles' age."
                - generic [ref=f44e586]: "Action: Search"
                - generic [ref=f44e587]: "Action Input: \"Harry Styles age\""
                - generic [ref=f44e588]: "Observation: 29 years"
                - generic [ref=f44e589]: "Thought: I need to calculate 29 raised to the 0.23 power."
                - generic [ref=f44e590]: "Action: Calculator"
                - generic [ref=f44e591]: "Action Input: 29^0.23"
                - generic [ref=f44e592]: "Observation: Answer: 2.169459462491557"
                - generic [ref=f44e594]: "Thought: I now know the final answer."
                - generic [ref=f44e595]: "Final Answer: Harry Styles, Olivia Wilde's boyfriend, is 29 years old and his age raised to the 0.23 power is 2.169459462491557."
                - generic [ref=f44e597]: "> Finished chain."
              - button [ref=f44e599] [cursor=pointer]:
                - img
            - paragraph [ref=f44e600]: "The output we get is as follows:"
            - generic [ref=f44e601]:
              - code [ref=f44e603]:
                - generic [ref=f44e604]: "\"Harry Styles, Olivia Wilde's boyfriend, is 29 years old and his age raised to the 0.23 power is 2.169459462491557.\""
              - button [ref=f44e606] [cursor=pointer]:
                - img
            - paragraph [ref=f44e607]:
              - text: We adapted the example from the
              - link "LangChain documentation (opens in a new tab)" [ref=f44e608] [cursor=pointer]:
                - /url: https://python.langchain.com/docs/modules/agents/agent_types/react
                - text: LangChain documentation
                - generic [ref=f44e609]: (opens in a new tab)
