        - article [ref=f44e411]:
          - main [ref=f44e412]:
            - generic [ref=f44e413]:
              - generic "Prompting Techniques" [ref=f44e414]:
                - link "Prompting Techniques" [ref=f44e415] [cursor=pointer]:
                  - /url: /techniques
              - img [ref=f44e416]
              - generic "ReAct" [ref=f44e418]
            - button "Copy page" [ref=f44e421] [cursor=pointer]:
              - img [ref=f44e422]
              - text: Copy page
              - img [ref=f44e425]
            - heading "ReAct Prompting" [level=1] [ref=f44e427]
            - paragraph [ref=f44e428]:
              - link "Yao et al., 2022 (opens in a new tab)" [ref=f44e429] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2210.03629
                - text: Yao et al., 2022
                - generic [ref=f44e430]: (opens in a new tab)
              - text: introduced a framework named ReAct where LLMs are used to generate both
              - emphasis [ref=f44e431]: reasoning traces
              - text: and
              - emphasis [ref=f44e432]: task-specific actions
              - text: in an interleaved manner.
            - paragraph [ref=f44e433]: Generating reasoning traces allow the model to induce, track, and update action plans, and even handle exceptions. The action step allows to interface with and gather information from external sources such as knowledge bases or environments.
            - paragraph [ref=f44e434]: The ReAct framework can allow LLMs to interact with external tools to retrieve additional information that leads to more reliable and factual responses.
            - paragraph [ref=f44e435]: Results show that ReAct can outperform several state-of-the-art baselines on language and decision-making tasks. ReAct also leads to improved human interpretability and trustworthiness of LLMs. Overall, the authors found that best approach uses ReAct combined with chain-of-thought (CoT) that allows use of both internal knowledge and external information obtained during reasoning.
            - heading "How it Works?Permalink for this section" [level=2] [ref=f44e436]:
              - text: How it Works?
              - link "Permalink for this section" [ref=f44e437] [cursor=pointer]:
                - /url: "#how-it-works"
                - text: "#"
            - paragraph [ref=f44e438]: ReAct is inspired by the synergies between "acting" and "reasoning" which allow humans to learn new tasks and make decisions or reasoning.
            - paragraph [ref=f44e439]:
              - text: Chain-of-thought (CoT) prompting has shown the capabilities of LLMs to carry out reasoning traces to generate answers to questions involving arithmetic and commonsense reasoning, among other tasks
              - link "(Wei et al., 2022) (opens in a new tab)" [ref=f44e440] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2201.11903
                - text: (Wei et al., 2022)
                - generic [ref=f44e441]: (opens in a new tab)
              - text: . But its lack of access to the external world or inability to update its knowledge can lead to issues like fact hallucination and error propagation.
            - paragraph [ref=f44e442]: ReAct is a general paradigm that combines reasoning and acting with LLMs. ReAct prompts LLMs to generate verbal reasoning traces and actions for a task. This allows the system to perform dynamic reasoning to create, maintain, and adjust plans for acting while also enabling interaction to external environments (e.g., Wikipedia) to incorporate additional information into the reasoning. The figure below shows an example of ReAct and the different steps involved to perform question answering.
            - img "REACT" [ref=f44e444]
            - paragraph [ref=f44e445]:
              - text: "Image Source:"
              - link "Yao et al., 2022 (opens in a new tab)" [ref=f44e446] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2210.03629
                - text: Yao et al., 2022
                - generic [ref=f44e447]: (opens in a new tab)
            - paragraph [ref=f44e448]:
              - text: In the example above, we pass a prompt like the following question from
              - link "HotpotQA (opens in a new tab)" [ref=f44e449] [cursor=pointer]:
                - /url: https://hotpotqa.github.io/
                - text: HotpotQA
                - generic [ref=f44e450]: (opens in a new tab)
              - text: ":"
            - generic [ref=f44e451]:
              - code [ref=f44e453]:
                - generic [ref=f44e454]: Aside from the Apple Remote, what other devices can control the program Apple Remote was originally designed to interact with?
              - button [ref=f44e456] [cursor=pointer]:
                - img
            - paragraph [ref=f44e457]:
              - text: Note that in-context examples are also added to the prompt but we exclude that here for simplicity. We can see that the model generates
              - emphasis [ref=f44e458]: task solving trajectories
              - text: (Thought, Act). Obs corresponds to observation from the environment that's being interacted with (e.g., Search engine). In essence, ReAct can retrieve information to support reasoning, while reasoning helps to target what to retrieve next.
            - heading "ReAct PromptingPermalink for this section" [level=2] [ref=f44e459]:
              - text: ReAct Prompting
              - link "Permalink for this section" [ref=f44e460] [cursor=pointer]:
                - /url: "#react-prompting"
                - text: "#"
            - paragraph [ref=f44e461]: To demonstrate how ReAct prompting works, let's follow an example from the paper.
            - paragraph [ref=f44e462]: The first step is to select cases from a training set (e.g., HotPotQA) and compose ReAct-format trajectories. These are used as few-shot exemplars in the prompts. The trajectories consist of multiple thought-action-observation steps as shown in the figure above. The free-form thoughts are used to achieve different tasks such as decomposing questions, extracting information, performing commonsense/arithmetic reasoning, guide search formulation, and synthesizing final answer.
            - paragraph [ref=f44e463]: "Here is an example of what the ReAct prompt exemplars look like (obtained from the paper and shortened to one example for simplicity):"
            - generic [ref=f44e464]:
              - code [ref=f44e466]:
                - generic [ref=f44e467]: Question What is the elevation range for the area that the eastern sector of the
                - generic [ref=f44e468]: Colorado orogeny extends into?
                - generic [ref=f44e469]: Thought 1 I need to search Colorado orogeny, find the area that the eastern sector
                - generic [ref=f44e470]: of the Colorado orogeny extends into, then find the elevation range of the
                - generic [ref=f44e471]: area.
                - generic [ref=f44e472]: Action 1 Search[Colorado orogeny]
                - generic [ref=f44e473]: Observation 1 The Colorado orogeny was an episode of mountain building (an orogeny) in
                - generic [ref=f44e474]: Colorado and surrounding areas.
                - generic [ref=f44e475]: Thought 2 It does not mention the eastern sector. So I need to look up eastern
                - generic [ref=f44e476]: sector.
                - generic [ref=f44e477]: Action 2 Lookup[eastern sector]
                - generic [ref=f44e478]: Observation 2 (Result 1 / 1) The eastern sector extends into the High Plains and is called
                - generic [ref=f44e479]: the Central Plains orogeny.
                - generic [ref=f44e480]: Thought 3 The eastern sector of Colorado orogeny extends into the High Plains. So I
                - generic [ref=f44e481]: need to search High Plains and find its elevation range.
                - generic [ref=f44e482]: Action 3 Search[High Plains]
                - generic [ref=f44e483]: Observation 3 High Plains refers to one of two distinct land regions
                - generic [ref=f44e484]: Thought 4 I need to instead search High Plains (United States).
                - generic [ref=f44e485]: Action 4 Search[High Plains (United States)]
                - generic [ref=f44e486]: Observation 4 The High Plains are a subregion of the Great Plains. From east to west, the
                - generic [ref=f44e487]: High Plains rise in elevation from around 1,800 to 7,000 ft (550 to 2,130
                - generic [ref=f44e488]: m).[3]
                - generic [ref=f44e489]: Thought 5 High Plains rise in elevation from around 1,800 to 7,000 ft, so the answer
                - generic [ref=f44e490]: is 1,800 to 7,000 ft.
                - generic [ref=f44e491]: Action 5 Finish[1,800 to 7,000 ft]
                - generic [ref=f44e492]: ...
              - button [ref=f44e494] [cursor=pointer]:
                - img
            - paragraph [ref=f44e495]: Note that different prompts setups are used for different types of tasks. For tasks where reasoning is of primary importance (e.g., HotpotQA), multiple thought-action-observation steps are used for the task-solving trajectory. For decision making tasks involving lots of action steps, thoughts are used sparsely.
            - iframe [ref=f44e496]:
              - generic [active] [ref=f45e1]:
                - generic "Lecteur vidéo YouTube" [ref=f45e3]
                - generic [ref=f45e5]:
                  - generic:
