            - paragraph [ref=f48e431]: To improve the reliability and performance of LLMs, one of the important prompt engineering techniques is to break tasks into its subtasks. Once those subtasks have been identified, the LLM is prompted with a subtask and then its response is used as input to another prompt. This is what's referred to as prompt chaining, where a task is split into subtasks with the idea to create a chain of prompt operations.
            - paragraph [ref=f48e432]: Prompt chaining is useful to accomplish complex tasks which an LLM might struggle to address if prompted with a very detailed prompt. In prompt chaining, chain prompts perform transformations or additional processes on the generated responses before reaching a final desired state.
            - paragraph [ref=f48e433]: Besides achieving better performance, prompt chaining helps to boost the transparency of your LLM application, increases controllability, and reliability. This means that you can debug problems with model responses much more easily and analyze and improve performance in the different stages that need improvement.
            - paragraph [ref=f48e434]: Prompt chaining is particularly useful when building LLM-powered conversational assistants and improving the personalization and user experience of your applications.
            - heading "Use Cases for Prompt ChainingPermalink for this section" [level=2] [ref=f48e435]:
              - text: Use Cases for Prompt Chaining
              - link "Permalink for this section" [ref=f48e436] [cursor=pointer]:
                - /url: "#use-cases-for-prompt-chaining"
                - text: "#"
            - heading "Prompt Chaining for Document QAPermalink for this section" [level=3] [ref=f48e437]:
              - text: Prompt Chaining for Document QA
              - link "Permalink for this section" [ref=f48e438] [cursor=pointer]:
                - /url: "#prompt-chaining-for-document-qa"
                - text: "#"
            - paragraph [ref=f48e439]: Prompt chaining can be used in different scenarios that could involve several operations or transformations. For instance, one common use case of LLMs involves answering questions about a large text document. It helps if you design two different prompts where the first prompt is responsible for extracting relevant quotes to answer a question and a second prompt takes as input the quotes and original document to answer a given question. In other words, you will be creating two different prompts to perform the task of answering a question given in a document.
            - paragraph [ref=f48e440]:
              - text: The first prompt below extracts the relevant quotes from the document given the question. Note that for simplicity, we have added a placeholder for the document
              - code [ref=f48e441]: "{{document}}"
              - text: . To test the prompt you can copy and paste an article from Wikipedia such as this page for
              - link "prompt engineering (opens in a new tab)" [ref=f48e442] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Prompt_engineering
                - text: prompt engineering
                - generic [ref=f48e443]: (opens in a new tab)
              - text: . Due to larger context used for this task, we are using the
              - code [ref=f48e444]: gpt-4-1106-preview
              - text: model from OpenAI. You can use the prompt with other long-context LLMs like Claude.
            - paragraph [ref=f48e445]: "Prompt 1:"
            - generic [ref=f48e446]:
              - code [ref=f48e448]:
                - generic [ref=f48e449]: "You are a helpful assistant. Your task is to help answer a question given in a document. The first step is to extract quotes relevant to the question from the document, delimited by ####. Please output the list of quotes using <quotes></quotes>. Respond with \"No relevant quotes found!\" if no relevant quotes were found."
                - generic [ref=f48e450]: "####"
