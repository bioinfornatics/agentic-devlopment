        - article [ref=f51e411]:
          - main [ref=f51e412]:
            - generic [ref=f51e413]:
              - generic "AI Agents" [ref=f51e414]:
                - link "AI Agents" [ref=f51e415] [cursor=pointer]:
                  - /url: /agents
              - img [ref=f51e416]
              - generic "Context Engineering for AI Agents" [ref=f51e418]
            - button "Copy page" [ref=f51e421] [cursor=pointer]:
              - img [ref=f51e422]
              - text: Copy page
              - img [ref=f51e425]
            - heading "Why Context Engineering?" [level=1] [ref=f51e427]
            - paragraph [ref=f51e428]:
              - link "Context engineering (opens in a new tab)" [ref=f51e429] [cursor=pointer]:
                - /url: https://www.promptingguide.ai/guides/context-engineering-guide
                - text: Context engineering
                - generic [ref=f51e430]: (opens in a new tab)
              - text: is a critical practice for building reliable and effective AI agents. This guide explores the importance of context engineering through a practical example of building a deep research agent.
            - paragraph [ref=f51e431]: Context engineering involves carefully crafting and refining the prompts, instructions, and constraints that guide an AI agent's behavior to achieve desired outcomes.
            - generic [ref=f51e432]:
              - generic [ref=f51e433]: 📚
              - paragraph [ref=f51e435]:
                - text: This content is based on our new course
                - link "\"Building Effective AI Agents with n8n\" (opens in a new tab)" [ref=f51e436] [cursor=pointer]:
                  - /url: https://academy.dair.ai/courses/building-effective-ai-agents
                  - text: "\"Building Effective AI Agents with n8n\""
                  - generic [ref=f51e437]: (opens in a new tab)
                - text: ", which provides comprehensive insights, downloadable templates, prompts, and advanced tips into designing and implementing agentic systems."
            - heading "What is Context Engineering?Permalink for this section" [level=2] [ref=f51e438]:
              - text: What is Context Engineering?
              - link "Permalink for this section" [ref=f51e439] [cursor=pointer]:
                - /url: "#what-is-context-engineering"
                - text: "#"
            - paragraph [ref=f51e440]:
              - link "Context engineering (opens in a new tab)" [ref=f51e441] [cursor=pointer]:
                - /url: https://www.promptingguide.ai/guides/context-engineering-guide
                - text: Context engineering
                - generic [ref=f51e442]: (opens in a new tab)
              - text: "is the process of designing, testing, and iterating on the contextual information provided to AI agents to shape their behavior and improve task performance. Unlike simple prompt engineering for single LLM calls, context engineering for agents involves (but not limited to):"
            - list [ref=f51e443]:
              - listitem [ref=f51e444]:
                - strong [ref=f51e445]: System prompts
                - text: that define agent behavior and capabilities
              - listitem [ref=f51e446]:
                - strong [ref=f51e447]: Task constraints
                - text: that guide decision-making
              - listitem [ref=f51e448]:
                - strong [ref=f51e449]: Tool descriptions
                - text: that clarify when and how to use available functions/tools
              - listitem [ref=f51e450]:
                - strong [ref=f51e451]: Memory management
                - text: for tracking state across multiple steps
              - listitem [ref=f51e452]:
                - strong [ref=f51e453]: Error handling
                - text: patterns for robust execution
            - 'heading "Building a Deep Research Agent: A Case StudyPermalink for this section" [level=2] [ref=f51e454]':
              - text: "Building a Deep Research Agent: A Case Study"
              - link "Permalink for this section" [ref=f51e455] [cursor=pointer]:
                - /url: "#building-a-deep-research-agent-a-case-study"
                - text: "#"
            - paragraph [ref=f51e456]: "Let's explore context engineering principles through an example: a minimal deep research agent that performs web searches and generates reports."
            - paragraph [ref=f51e457]:
              - img "Agent Workflow" [ref=f51e458]
            - heading "The Context Engineering ChallengePermalink for this section" [level=3] [ref=f51e459]:
              - text: The Context Engineering Challenge
              - link "Permalink for this section" [ref=f51e460] [cursor=pointer]:
                - /url: "#the-context-engineering-challenge"
                - text: "#"
            - paragraph [ref=f51e461]: "When building the first version of this agent system, the initial implementation revealed several behavioral issues that required careful context engineering:"
            - 'heading "Issue 1: Incomplete Task ExecutionPermalink for this section" [level=4] [ref=f51e462]':
              - text: "Issue 1: Incomplete Task Execution"
              - link "Permalink for this section" [ref=f51e463] [cursor=pointer]:
                - /url: "#issue-1-incomplete-task-execution"
                - text: "#"
            - paragraph [ref=f51e464]:
              - strong [ref=f51e465]: Problem
              - text: ": When running the agentic workflow, the orchestrator agent often creates three search tasks but only executes searches for two of them, skipping the third task without explicit justification."
            - paragraph [ref=f51e466]:
              - strong [ref=f51e467]: Root Cause
              - text: ": The agent's system prompt lacked explicit constraints about task completion requirements. The agent made assumptions about which searches were necessary, leading to inconsistent behavior."
            - paragraph [ref=f51e468]:
              - strong [ref=f51e469]: Solution
              - text: ": Two approaches are possible:"
            - list [ref=f51e470]:
              - listitem [ref=f51e471]:
                - strong [ref=f51e472]: Flexible Approach
                - text: "(current): Allow the agent to decide which searches are necessary, but require explicit reasoning for skipped tasks"
              - listitem [ref=f51e473]:
                - strong [ref=f51e474]: Strict Approach
                - text: ": Add explicit constraints requiring search execution for all planned tasks"
            - paragraph [ref=f51e475]: "Example system prompt enhancement:"
            - generic [ref=f51e476]:
              - code [ref=f51e478]:
                - generic [ref=f51e479]: You are a deep research agent responsible for executing comprehensive research tasks.
                - generic [ref=f51e480]: "TASK EXECUTION RULES:"
                - generic [ref=f51e481]: "- For each search task you create, you MUST either:"
                - generic [ref=f51e482]: 1. Execute a web search and document findings, OR
                - generic [ref=f51e483]: 2. Explicitly state why the search is unnecessary and mark it as completed with justification
                - generic [ref=f51e484]: "- Do NOT skip tasks silently or make assumptions about task redundancy"
                - generic [ref=f51e485]: "- If you determine tasks overlap, consolidate them BEFORE execution"
                - generic [ref=f51e486]: "- Update task status in the spreadsheet after each action"
              - button [ref=f51e488] [cursor=pointer]:
                - img
            - 'heading "Issue 2: Lack of Debugging VisibilityPermalink for this section" [level=4] [ref=f51e489]':
              - text: "Issue 2: Lack of Debugging Visibility"
              - link "Permalink for this section" [ref=f51e490] [cursor=pointer]:
                - /url: "#issue-2-lack-of-debugging-visibility"
                - text: "#"
            - paragraph [ref=f51e491]:
              - strong [ref=f51e492]: Problem
              - text: ": Without proper logging and state tracking, it was difficult to understand why the agent made certain decisions."
            - paragraph [ref=f51e493]:
              - strong [ref=f51e494]: Solution
              - text: ": For this example, it helps to implement a task management system using a spreadsheet or text file (for simplicity) with the following fields:"
            - list [ref=f51e495]:
              - listitem [ref=f51e496]: Task ID
              - listitem [ref=f51e497]: Search query
              - listitem [ref=f51e498]: Status (todo, in_progress, completed)
              - listitem [ref=f51e499]: Results summary
              - listitem [ref=f51e500]: Timestamp
            - paragraph [ref=f51e501]: "This visibility enables:"
            - list [ref=f51e502]:
              - listitem [ref=f51e503]: Real-time debugging of agent decisions
              - listitem [ref=f51e504]: Understanding of task execution flow
              - listitem [ref=f51e505]: Identification of behavioral patterns
              - listitem [ref=f51e506]: Data for iterative improvements
            - heading "Context Engineering Best PracticesPermalink for this section" [level=3] [ref=f51e507]:
              - text: Context Engineering Best Practices
              - link "Permalink for this section" [ref=f51e508] [cursor=pointer]:
                - /url: "#context-engineering-best-practices"
                - text: "#"
            - paragraph [ref=f51e509]: "Based on this case study, here are key principles for effective context engineering:"
            - heading "1. Eliminate Prompt AmbiguityPermalink for this section" [level=4] [ref=f51e510]:
              - text: 1. Eliminate Prompt Ambiguity
              - link "Permalink for this section" [ref=f51e511] [cursor=pointer]:
                - /url: "#1-eliminate-prompt-ambiguity"
                - text: "#"
            - paragraph [ref=f51e512]:
              - strong [ref=f51e513]: "Bad Example:"
            - generic [ref=f51e514]:
              - code [ref=f51e516]:
                - generic [ref=f51e517]: Perform research on the given topic.
              - button [ref=f51e519] [cursor=pointer]:
                - img
            - paragraph [ref=f51e520]:
              - strong [ref=f51e521]: "Good Example:"
            - generic [ref=f51e522]:
              - code [ref=f51e524]:
                - generic [ref=f51e525]: "Perform research on the given topic by:"
                - generic [ref=f51e526]: 1. Breaking down the query into 3-5 specific search subtasks
                - generic [ref=f51e527]: 2. Executing a web search for EACH subtask using the search_tool
                - generic [ref=f51e528]: 3. Documenting findings for each search in the task tracker
                - generic [ref=f51e529]: 4. Synthesizing all findings into a comprehensive report
              - button [ref=f51e531] [cursor=pointer]:
                - img
            - heading "2. Make Expectations ExplicitPermalink for this section" [level=4] [ref=f51e532]:
              - text: 2. Make Expectations Explicit
              - link "Permalink for this section" [ref=f51e533] [cursor=pointer]:
                - /url: "#2-make-expectations-explicit"
                - text: "#"
            - paragraph [ref=f51e534]: "Don't assume the agent knows what you want. Be explicit about:"
            - list [ref=f51e535]:
              - listitem [ref=f51e536]: Required vs. optional actions
              - listitem [ref=f51e537]: Quality standards
              - listitem [ref=f51e538]: Output formats
              - listitem [ref=f51e539]: Decision-making criteria
            - heading "3. Implement ObservabilityPermalink for this section" [level=4] [ref=f51e540]:
              - text: 3. Implement Observability
              - link "Permalink for this section" [ref=f51e541] [cursor=pointer]:
                - /url: "#3-implement-observability"
                - text: "#"
            - paragraph [ref=f51e542]: "Build debugging mechanisms into your agentic system:"
            - list [ref=f51e543]:
              - listitem [ref=f51e544]: Log all agent decisions and reasoning
              - listitem [ref=f51e545]: Track state changes in external storage
              - listitem [ref=f51e546]: Record tool calls and their outcomes
              - listitem [ref=f51e547]: Capture errors and edge cases
            - generic [ref=f51e548]:
              - generic [ref=f51e549]: ⚠️
              - paragraph [ref=f51e551]: Pay close attention to every run of your agentic system. Strange behaviors and edge cases are opportunities to improve your context engineering efforts.
            - heading "4. Iterate Based on BehaviorPermalink for this section" [level=4] [ref=f51e552]:
              - text: 4. Iterate Based on Behavior
              - link "Permalink for this section" [ref=f51e553] [cursor=pointer]:
                - /url: "#4-iterate-based-on-behavior"
                - text: "#"
            - paragraph [ref=f51e554]: "Context engineering is an iterative process:"
            - list [ref=f51e555]:
              - listitem [ref=f51e556]:
                - strong [ref=f51e557]: Deploy
                - text: the agent with initial context
              - listitem [ref=f51e558]:
                - strong [ref=f51e559]: Observe
                - text: actual behavior in production
              - listitem [ref=f51e560]:
                - strong [ref=f51e561]: Identify
                - text: deviations from expected behavior
              - listitem [ref=f51e562]:
                - strong [ref=f51e563]: Refine
                - text: system prompts and constraints
              - listitem [ref=f51e564]:
                - strong [ref=f51e565]: Test
                - text: and validate improvements
              - listitem [ref=f51e566]:
                - strong [ref=f51e567]: Repeat
            - heading "5. Balance Flexibility and ConstraintsPermalink for this section" [level=4] [ref=f51e568]:
              - text: 5. Balance Flexibility and Constraints
              - link "Permalink for this section" [ref=f51e569] [cursor=pointer]:
                - /url: "#5-balance-flexibility-and-constraints"
                - text: "#"
            - paragraph [ref=f51e570]: "Consider the tradeoff between:"
            - list [ref=f51e571]:
              - listitem [ref=f51e572]:
                - strong [ref=f51e573]: Strict constraints
                - text: ": More predictable but less adaptable"
              - listitem [ref=f51e574]:
                - strong [ref=f51e575]: Flexible guidelines
                - text: ": More adaptable but potentially inconsistent"
            - paragraph [ref=f51e576]: Choose based on your use case requirements.
            - heading "Advanced Context Engineering TechniquesPermalink for this section" [level=2] [ref=f51e577]:
              - text: Advanced Context Engineering Techniques
              - link "Permalink for this section" [ref=f51e578] [cursor=pointer]:
                - /url: "#advanced-context-engineering-techniques"
                - text: "#"
            - heading "Layered Context ArchitecturePermalink for this section" [level=3] [ref=f51e579]:
              - text: Layered Context Architecture
              - link "Permalink for this section" [ref=f51e580] [cursor=pointer]:
                - /url: "#layered-context-architecture"
                - text: "#"
            - paragraph [ref=f51e581]: "Context engineering applies to all stages of the AI agent build process. Depending on the AI Agent, it's sometimes helpful to think of context as a hierarchical structure. For our basic agentic system, we can organize context into hierarchical layers:"
            - list [ref=f51e582]:
              - listitem [ref=f51e583]:
                - strong [ref=f51e584]: System Layer
                - text: ": Core agent identity and capabilities"
              - listitem [ref=f51e585]:
                - strong [ref=f51e586]: Task Layer
                - text: ": Specific instructions for the current task"
              - listitem [ref=f51e587]:
                - strong [ref=f51e588]: Tool Layer
                - text: ": Descriptions and usage guidelines for each tool"
              - listitem [ref=f51e589]:
                - strong [ref=f51e590]: Memory Layer
                - text: ": Relevant historical context and learnings"
            - heading "Dynamic Context AdjustmentPermalink for this section" [level=3] [ref=f51e591]:
              - text: Dynamic Context Adjustment
              - link "Permalink for this section" [ref=f51e592] [cursor=pointer]:
                - /url: "#dynamic-context-adjustment"
                - text: "#"
            - paragraph [ref=f51e593]: "Another approach is to dynamically adjust context based on the task complexity, available resources, previous execution history, and error patterns. Based on our example, we can adjust context based on:"
            - list [ref=f51e594]:
              - listitem [ref=f51e595]: Task complexity
              - listitem [ref=f51e596]: Available resources
              - listitem [ref=f51e597]: Previous execution history
              - listitem [ref=f51e598]: Error patterns
            - heading "Context ValidationPermalink for this section" [level=3] [ref=f51e599]:
              - text: Context Validation
              - link "Permalink for this section" [ref=f51e600] [cursor=pointer]:
                - /url: "#context-validation"
                - text: "#"
            - paragraph [ref=f51e601]: "Evaluation is key to ensuring context engineering techniques are working as they should for your AI agents. Before deployment, validate your context design:"
            - list [ref=f51e602]:
              - listitem [ref=f51e603]:
                - strong [ref=f51e604]: Completeness
                - text: ": Does it cover all important scenarios?"
              - listitem [ref=f51e605]:
                - strong [ref=f51e606]: Clarity
                - text: ": Is it unambiguous?"
              - listitem [ref=f51e607]:
                - strong [ref=f51e608]: Consistency
                - text: ": Do different parts align?"
              - listitem [ref=f51e609]:
                - strong [ref=f51e610]: Testability
                - text: ": Can you verify the behavior?"
            - heading "Common Context Engineering PitfallsPermalink for this section" [level=2] [ref=f51e611]:
              - text: Common Context Engineering Pitfalls
              - link "Permalink for this section" [ref=f51e612] [cursor=pointer]:
                - /url: "#common-context-engineering-pitfalls"
                - text: "#"
            - paragraph [ref=f51e613]: "Below are a few common context engineering pitfalls to avoid when building AI agents:"
            - heading "1. Over-ConstraintPermalink for this section" [level=3] [ref=f51e614]:
              - text: 1. Over-Constraint
              - link "Permalink for this section" [ref=f51e615] [cursor=pointer]:
                - /url: "#1-over-constraint"
                - text: "#"
            - paragraph [ref=f51e616]:
              - strong [ref=f51e617]: Problem
              - text: ": Too many rules make the agent inflexible and unable to handle edge cases."
            - paragraph [ref=f51e618]:
              - strong [ref=f51e619]: Example
              - text: ":"
            - generic [ref=f51e620]:
              - code [ref=f51e622]:
                - generic [ref=f51e623]: NEVER skip a search task.
                - generic [ref=f51e624]: ALWAYS perform exactly 3 searches.
                - generic [ref=f51e625]: NEVER combine similar queries.
              - button [ref=f51e627] [cursor=pointer]:
                - img
            - paragraph [ref=f51e628]:
              - strong [ref=f51e629]: Better Approach
              - text: ":"
            - generic [ref=f51e630]:
              - code [ref=f51e632]:
                - generic [ref=f51e633]: Aim to perform searches for all planned tasks. If you determine that tasks are redundant, consolidate them before execution and document your reasoning.
              - button [ref=f51e635] [cursor=pointer]:
                - img
            - heading "2. Under-SpecificationPermalink for this section" [level=3] [ref=f51e636]:
              - text: 2. Under-Specification
              - link "Permalink for this section" [ref=f51e637] [cursor=pointer]:
                - /url: "#2-under-specification"
                - text: "#"
            - paragraph [ref=f51e638]:
              - strong [ref=f51e639]: Problem
              - text: ": Vague instructions lead to unpredictable behavior."
            - paragraph [ref=f51e640]:
              - strong [ref=f51e641]: Example
              - text: ":"
            - generic [ref=f51e642]:
              - code [ref=f51e644]:
                - generic [ref=f51e645]: Do some research and create a report.
              - button [ref=f51e647] [cursor=pointer]:
                - img
            - paragraph [ref=f51e648]:
              - strong [ref=f51e649]: Better Approach
              - text: ":"
            - generic [ref=f51e650]:
              - code [ref=f51e652]:
                - generic [ref=f51e653]: "Execute research by:"
                - generic [ref=f51e654]: 1. Analyzing the user query to identify key information needs
                - generic [ref=f51e655]: 2. Creating 3-5 specific search tasks covering different aspects
                - generic [ref=f51e656]: 3. Executing searches using the search_tool for each task
                - generic [ref=f51e657]: "4. Synthesizing findings into a structured report with sections for:"
                - generic [ref=f51e658]: "- Executive summary"
                - generic [ref=f51e659]: "- Key findings per search task"
                - generic [ref=f51e660]: "- Conclusions and insights"
              - button [ref=f51e662] [cursor=pointer]:
                - img
            - heading "3. Ignoring Error CasesPermalink for this section" [level=3] [ref=f51e663]:
              - text: 3. Ignoring Error Cases
              - link "Permalink for this section" [ref=f51e664] [cursor=pointer]:
                - /url: "#3-ignoring-error-cases"
                - text: "#"
            - paragraph [ref=f51e665]:
              - strong [ref=f51e666]: Problem
              - text: ": Context doesn't specify behavior when things go wrong."
            - paragraph [ref=f51e667]:
              - strong [ref=f51e668]: Solution
              - text: ": In some cases, it helps to add error handling instructions to your AI Agents:"
            - generic [ref=f51e669]:
              - code [ref=f51e671]:
                - generic [ref=f51e672]: "ERROR HANDLING:"
                - generic [ref=f51e673]: "- If a search fails, retry once with a rephrased query"
                - generic [ref=f51e674]: "- If retry fails, document the failure and continue with remaining tasks"
                - generic [ref=f51e675]: "- If more than 50% of searches fail, alert the user and request guidance"
                - generic [ref=f51e676]: "- Never stop execution completely without user notification"
              - button [ref=f51e678] [cursor=pointer]:
                - img
            - heading "Measuring Context Engineering SuccessPermalink for this section" [level=2] [ref=f51e679]:
              - text: Measuring Context Engineering Success
              - link "Permalink for this section" [ref=f51e680] [cursor=pointer]:
                - /url: "#measuring-context-engineering-success"
                - text: "#"
            - paragraph [ref=f51e681]: "Track these metrics to evaluate context engineering effectiveness:"
            - list [ref=f51e682]:
              - listitem [ref=f51e683]:
                - strong [ref=f51e684]: Task Completion Rate
                - text: ": Percentage of tasks completed successfully"
              - listitem [ref=f51e685]:
                - strong [ref=f51e686]: Behavioral Consistency
                - text: ": Similarity of agent behavior across similar inputs"
              - listitem [ref=f51e687]:
                - strong [ref=f51e688]: Error Rate
                - text: ": Frequency of failures and unexpected behaviors"
              - listitem [ref=f51e689]:
                - strong [ref=f51e690]: User Satisfaction
                - text: ": Quality and usefulness of outputs"
              - listitem [ref=f51e691]:
                - strong [ref=f51e692]: Debugging Time
                - text: ": Time required to identify and fix issues"
            - paragraph [ref=f51e693]: "It's important to not treat context engineering as a one-time activity but an ongoing practice that requires:"
            - list [ref=f51e694]:
              - listitem [ref=f51e695]:
                - strong [ref=f51e696]: Systematic observation
                - text: of agent behavior
              - listitem [ref=f51e697]:
                - strong [ref=f51e698]: Careful analysis
                - text: of failures and edge cases
              - listitem [ref=f51e699]:
                - strong [ref=f51e700]: Iterative refinement
                - text: of instructions and constraints
              - listitem [ref=f51e701]:
                - strong [ref=f51e702]: Rigorous testing
                - text: of changes
            - paragraph [ref=f51e703]: We will be covering these principles in more detail in upcoming guides. By applying these principles, you can build AI agent systems that are reliable, predictable, and effective at solving complex tasks.
            - generic [ref=f51e704]:
              - generic [ref=f51e705]: 🎓
              - paragraph [ref=f51e707]:
                - text: Learn how to build production-ready AI agents in our comprehensive course.
                - link "Join now! (opens in a new tab)" [ref=f51e708] [cursor=pointer]:
