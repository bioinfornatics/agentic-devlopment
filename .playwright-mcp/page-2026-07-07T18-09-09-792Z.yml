            - heading "Chain-of-Thought Prompting" [level=1] [ref=f35e611]
            - heading "Chain-of-Thought (CoT) PromptingPermalink for this section" [level=2] [ref=f35e612]:
              - text: Chain-of-Thought (CoT) Prompting
              - link "Permalink for this section" [ref=f35e613] [cursor=pointer]:
                - /url: "#chain-of-thought-cot-prompting"
                - text: "#"
            - img "COT" [ref=f35e431]
            - paragraph [ref=f35e614]:
              - text: "Image Source:"
              - link "Wei et al. (2022) (opens in a new tab)" [ref=f35e615] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2201.11903
                - text: Wei et al. (2022)
                - generic [ref=f35e616]: (opens in a new tab)
            - paragraph [ref=f35e617]:
              - text: Introduced in
              - link "Wei et al. (2022) (opens in a new tab)" [ref=f35e618] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2201.11903
                - text: Wei et al. (2022)
                - generic [ref=f35e619]: (opens in a new tab)
              - text: ", chain-of-thought (CoT) prompting enables complex reasoning capabilities through intermediate reasoning steps. You can combine it with few-shot prompting to get better results on more complex tasks that require reasoning before responding."
            - paragraph [ref=f35e620]:
              - emphasis [ref=f35e621]: "Prompt:"
            - generic [ref=f35e440]:
              - code [ref=f35e442]:
                - generic [ref=f35e443]: "The odd numbers in this group add up to an even number: 4, 8, 9, 15, 12, 2, 1."
                - generic [ref=f35e444]: "A: Adding all the odd numbers (9, 15, 1) gives 25. The answer is False."
                - generic [ref=f35e445]: "The odd numbers in this group add up to an even number: 17, 10, 19, 4, 8, 12, 24."
                - generic [ref=f35e446]: "A: Adding all the odd numbers (17, 19) gives 36. The answer is True."
                - generic [ref=f35e447]: "The odd numbers in this group add up to an even number: 16, 11, 14, 4, 8, 13, 24."
                - generic [ref=f35e448]: "A: Adding all the odd numbers (11, 13) gives 24. The answer is True."
                - generic [ref=f35e449]: "The odd numbers in this group add up to an even number: 17, 9, 10, 12, 13, 4, 2."
                - generic [ref=f35e450]: "A: Adding all the odd numbers (17, 9, 13) gives 39. The answer is False."
                - generic [ref=f35e451]: "The odd numbers in this group add up to an even number: 15, 32, 5, 13, 82, 7, 1."
                - generic [ref=f35e452]: "A:"
              - button [ref=f35e454] [cursor=pointer]:
                - img
            - paragraph [ref=f35e622]:
              - emphasis [ref=f35e623]: "Output:"
            - generic [ref=f35e457]:
              - code [ref=f35e459]:
                - generic [ref=f35e460]: Adding all the odd numbers (15, 5, 13, 7, 1) gives 41. The answer is False.
              - button [ref=f35e462] [cursor=pointer]:
                - img
            - paragraph [ref=f35e624]: "Wow! We can see a perfect result when we provided the reasoning step. In fact, we can solve this task by providing even fewer examples, i.e., just one example seems enough:"
            - paragraph [ref=f35e625]:
              - emphasis [ref=f35e626]: "Prompt:"
            - generic [ref=f35e466]:
              - code [ref=f35e468]:
                - generic [ref=f35e469]: "The odd numbers in this group add up to an even number: 4, 8, 9, 15, 12, 2, 1."
                - generic [ref=f35e470]: "A: Adding all the odd numbers (9, 15, 1) gives 25. The answer is False."
                - generic [ref=f35e471]: "The odd numbers in this group add up to an even number: 15, 32, 5, 13, 82, 7, 1."
                - generic [ref=f35e472]: "A:"
              - button [ref=f35e474] [cursor=pointer]:
                - img
            - paragraph [ref=f35e627]:
              - emphasis [ref=f35e628]: "Output:"
            - generic [ref=f35e477]:
              - code [ref=f35e479]:
                - generic [ref=f35e480]: Adding all the odd numbers (15, 5, 13, 7, 1) gives 41. The answer is False.
              - button [ref=f35e482] [cursor=pointer]:
                - img
            - paragraph [ref=f35e629]: Keep in mind that the authors claim that this is an emergent ability that arises with sufficiently large language models.
            - heading "Zero-shot COT PromptingPermalink for this section" [level=2] [ref=f35e630]:
              - text: Zero-shot COT Prompting
              - link "Permalink for this section" [ref=f35e631] [cursor=pointer]:
                - /url: "#zero-shot-cot-prompting"
                - text: "#"
            - img "Zero-shot COT" [ref=f35e487]
            - paragraph [ref=f35e632]:
              - text: "Image Source:"
              - link "Kojima et al. (2022) (opens in a new tab)" [ref=f35e633] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2205.11916
                - text: Kojima et al. (2022)
                - generic [ref=f35e634]: (opens in a new tab)
            - paragraph [ref=f35e635]:
              - text: One recent idea that came out more recently is the idea of
              - link "zero-shot CoT (opens in a new tab)" [ref=f35e636] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2205.11916
                - text: zero-shot CoT
                - generic [ref=f35e637]: (opens in a new tab)
              - text: "(Kojima et al. 2022) that essentially involves adding \"Let's think step by step\" to the original prompt. Let's try a simple problem and see how the model performs:"
            - paragraph [ref=f35e638]:
              - emphasis [ref=f35e639]: "Prompt:"
            - generic [ref=f35e496]:
              - code [ref=f35e498]:
                - generic [ref=f35e499]: I went to the market and bought 10 apples. I gave 2 apples to the neighbor and 2 to the repairman. I then went and bought 5 more apples and ate 1. How many apples did I remain with?
              - button [ref=f35e501] [cursor=pointer]:
                - img
            - paragraph [ref=f35e640]:
              - emphasis [ref=f35e641]: "Output:"
            - generic [ref=f35e504]:
              - code [ref=f35e506]:
                - generic [ref=f35e507]: 11 apples
              - button [ref=f35e509] [cursor=pointer]:
                - img
            - paragraph [ref=f35e642]: The answer is incorrect! Now Let's try with the special prompt.
            - paragraph [ref=f35e643]:
              - emphasis [ref=f35e644]: "Prompt:"
            - generic [ref=f35e513]:
              - code [ref=f35e515]:
                - generic [ref=f35e516]: I went to the market and bought 10 apples. I gave 2 apples to the neighbor and 2 to the repairman. I then went and bought 5 more apples and ate 1. How many apples did I remain with?
                - generic [ref=f35e517]: Let's think step by step.
              - button [ref=f35e519] [cursor=pointer]:
                - img
            - paragraph [ref=f35e645]:
              - emphasis [ref=f35e646]: "Output:"
            - generic [ref=f35e522]:
              - code [ref=f35e524]:
                - generic [ref=f35e525]: First, you started with 10 apples.
                - generic [ref=f35e526]: You gave away 2 apples to the neighbor and 2 to the repairman, so you had 6 apples left.
                - generic [ref=f35e527]: Then you bought 5 more apples, so now you had 11 apples.
                - generic [ref=f35e528]: Finally, you ate 1 apple, so you would remain with 10 apples.
              - button [ref=f35e530] [cursor=pointer]:
                - img
            - paragraph [ref=f35e647]: It's impressive that this simple prompt is effective at this task. This is particularly useful where you don't have too many examples to use in the prompt.
            - heading "Automatic Chain-of-Thought (Auto-CoT)Permalink for this section" [level=2] [ref=f35e648]:
              - text: Automatic Chain-of-Thought (Auto-CoT)
              - link "Permalink for this section" [ref=f35e649] [cursor=pointer]:
                - /url: "#automatic-chain-of-thought-auto-cot"
                - text: "#"
            - paragraph [ref=f35e650]:
              - text: When applying chain-of-thought prompting with demonstrations, the process involves hand-crafting effective and diverse examples. This manual effort could lead to suboptimal solutions.
              - link "Zhang et al. (2022) (opens in a new tab)" [ref=f35e651] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2210.03493
                - text: Zhang et al. (2022)
                - generic [ref=f35e652]: (opens in a new tab)
              - text: propose an approach to eliminate manual efforts by leveraging LLMs with "Let's think step by step" prompt to generate reasoning chains for demonstrations one by one. This automatic process can still end up with mistakes in generated chains. To mitigate the effects of the mistakes, the diversity of demonstrations matter. This work proposes Auto-CoT, which samples questions with diversity and generates reasoning chains to construct the demonstrations.
            - paragraph [ref=f35e653]: "Auto-CoT consists of two main stages:"
            - list [ref=f35e654]:
              - listitem [ref=f35e655]:
                - text: "Stage 1):"
                - strong [ref=f35e656]: question clustering
                - text: ": partition questions of a given dataset into a few clusters"
              - listitem [ref=f35e657]:
                - text: "Stage 2):"
                - strong [ref=f35e658]: demonstration sampling
                - text: ": select a representative question from each cluster and generate its reasoning chain using Zero-Shot-CoT with simple heuristics"
            - paragraph [ref=f35e659]: The simple heuristics could be length of questions (e.g., 60 tokens) and number of steps in rationale (e.g., 5 reasoning steps). This encourages the model to use simple and accurate demonstrations.
            - paragraph [ref=f35e660]: "The process is illustrated below:"
            - img "AUTOCOT" [ref=f35e546]
            - paragraph [ref=f35e661]:
              - text: "Image Source:"
              - link "Zhang et al. (2022) (opens in a new tab)" [ref=f35e662] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2210.03493
                - text: Zhang et al. (2022)
                - generic [ref=f35e663]: (opens in a new tab)
            - paragraph [ref=f35e664]:
              - text: Code for Auto-CoT is available
              - link "here (opens in a new tab)" [ref=f35e665] [cursor=pointer]:
                - /url: https://github.com/amazon-science/auto-cot
                - text: here
                - generic [ref=f35e666]: (opens in a new tab)
              - text: .
