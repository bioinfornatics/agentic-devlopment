                - generic [ref=f53e456]: there will be 21 trees. How many trees did the grove workers plant today?
                - generic [ref=f53e457]: "A: We start with 15 trees. Later we have 21 trees. The difference must be the number of trees they planted."
                - generic [ref=f53e458]: So, they must have planted 21 - 15 = 6 trees. The answer is 6.
                - generic [ref=f53e459]: "Q: If there are 3 cars in the parking lot and 2 more cars arrive, how many cars are in the parking lot?"
                - generic [ref=f53e460]: "A: There are 3 cars in the parking lot already. 2 more arrive. Now there are 3 + 2 = 5 cars. The answer is 5."
