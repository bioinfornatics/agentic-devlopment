            - paragraph [ref=f53e571]:
              - text: Perhaps one of the more advanced techniques out there for prompt engineering is self-consistency. Proposed by
              - link "Wang et al. (2022) (opens in a new tab)" [ref=f53e572] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2203.11171
                - text: Wang et al. (2022)
                - generic [ref=f53e573]: (opens in a new tab)
              - text: ", self-consistency aims \"to replace the naive greedy decoding used in chain-of-thought prompting\". The idea is to sample multiple, diverse reasoning paths through few-shot CoT, and use the generations to select the most consistent answer. This helps to boost the performance of CoT prompting on tasks involving arithmetic and commonsense reasoning."
            - paragraph [ref=f53e574]: "Let's try the following example for arithmetic reasoning:"
            - paragraph [ref=f53e575]:
              - emphasis [ref=f53e576]: "Prompt:"
            - generic [ref=f53e434]:
