              - text: should include both what the Skill does and when Claude should use it. For complete authoring guidance, see the
              - link "best practices guide" [ref=f24e371] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/agent-skills/best-practices
              - text: .
            - heading "Security considerations" [level=2] [ref=f24e372]:
              - generic [ref=f24e374]: Security considerations
            - paragraph [ref=f24e375]: "Use Skills only from trusted sources: those you created yourself or obtained from Anthropic. Skills provide Claude with new capabilities through instructions and code, and while this makes them powerful, it also means a malicious Skill can direct Claude to invoke tools or execute code in ways that don't match the Skill's stated purpose."
            - generic [ref=f24e376]:
              - generic [ref=f24e378]: 
              - paragraph [ref=f24e380]: If you must use a Skill from an untrusted or unknown source, exercise extreme caution and thoroughly audit it before use. Depending on what access Claude has when executing the Skill, malicious Skills could lead to data exfiltration, unauthorized system access, or other security risks.
            - paragraph [ref=f24e381]:
              - strong [ref=f24e382]: Key security considerations
              - text: ":"
            - list [ref=f24e383]:
              - listitem [ref=f24e384]:
                - text: •
                - strong [ref=f24e385]: Audit thoroughly
                - text: ": Review all files bundled in the Skill: SKILL.md, scripts, images, and other resources. Look for unusual patterns like unexpected network calls, file access patterns, or operations that don't match the Skill's stated purpose"
              - listitem [ref=f24e386]:
                - text: •
                - strong [ref=f24e387]: External sources are risky
                - text: ": Skills that fetch data from external URLs pose particular risk, as fetched content may contain malicious instructions. Even trustworthy Skills can be compromised if their external dependencies change over time"
              - listitem [ref=f24e388]:
                - text: •
                - strong [ref=f24e389]: Tool misuse
                - text: ": Malicious Skills can invoke tools (file operations, bash commands, code execution) in harmful ways"
              - listitem [ref=f24e390]:
                - text: •
                - strong [ref=f24e391]: Data exposure
                - text: ": Skills with access to sensitive data could be designed to leak information to external systems"
              - listitem [ref=f24e392]:
                - text: •
                - strong [ref=f24e393]: Treat like installing software
                - text: ": Only use Skills from trusted sources. Be especially careful when integrating Skills into production systems with access to sensitive data or critical operations"
            - heading "Available Skills" [level=2] [ref=f24e394]:
              - generic [ref=f24e396]: Available Skills
            - heading "Pre-built Agent Skills" [level=3] [ref=f24e397]:
              - generic [ref=f24e399]: Pre-built Agent Skills
            - paragraph [ref=f24e400]: "The following pre-built Agent Skills are available for immediate use:"
            - list [ref=f24e401]:
              - listitem [ref=f24e402]:
                - text: •
                - strong [ref=f24e403]: PowerPoint (pptx)
                - text: ": Create presentations, edit slides, analyze presentation content"
              - listitem [ref=f24e404]:
                - text: •
                - strong [ref=f24e405]: Excel (xlsx)
                - text: ": Create spreadsheets, analyze data, generate reports with charts"
              - listitem [ref=f24e406]:
                - text: •
                - strong [ref=f24e407]: Word (docx)
                - text: ": Create documents, edit content, format text"
              - listitem [ref=f24e408]:
                - text: •
                - strong [ref=f24e409]: PDF (pdf)
                - text: ": Generate formatted PDF documents and reports"
            - paragraph [ref=f24e410]:
              - text: These Skills are available on the Claude API,
              - link "Claude Platform on AWS" [ref=f24e411] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/claude-platform-on-aws
              - text: ","
              - link "Microsoft Foundry" [ref=f24e412] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/claude-in-microsoft-foundry
              - text: ", and claude.ai. On Microsoft Foundry, Agent Skills require a"
              - link "Hosted on Anthropic deployment" [ref=f24e413] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/claude-in-microsoft-foundry#additional-features-not-supported-when-hosted-on-azure
              - text: . See the
              - link "quickstart tutorial" [ref=f24e414] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/agent-skills/quickstart
              - text: to start using them in the API.
            - heading "Open-source Skills" [level=3] [ref=f24e415]:
              - generic [ref=f24e417]: Open-source Skills
            - paragraph [ref=f24e418]:
              - text: Anthropic also publishes open-source Skills in the
              - link "skills repository" [ref=f24e419] [cursor=pointer]:
                - /url: https://github.com/anthropics/skills
              - text: ":"
            - list [ref=f24e420]:
              - listitem [ref=f24e421]:
                - text: •
                - strong [ref=f24e422]:
                  - link "Claude API" [ref=f24e423] [cursor=pointer]:
                    - /url: /docs/en/agents-and-tools/agent-skills/claude-api-skill
                - text: ": Provides Claude with up-to-date API reference material, SDK documentation, and best practices for 8 programming languages. Bundled with Claude Code and also available for installation from the skills repository."
            - heading "Custom Skills examples" [level=3] [ref=f24e424]:
              - generic [ref=f24e426]: Custom Skills examples
            - paragraph [ref=f24e427]:
              - text: For complete examples of custom Skills, see the
              - link "Skills cookbook" [ref=f24e428] [cursor=pointer]:
                - /url: https://platform.claude.com/cookbook/skills-notebooks-01-skills-introduction
              - text: .
            - heading "Data retention" [level=2] [ref=f24e429]:
              - generic [ref=f24e431]: Data retention
            - paragraph [ref=f24e432]: Agent Skills is not covered by ZDR arrangements. Skill definitions and execution data are retained according to Anthropic's standard data retention policy.
            - paragraph [ref=f24e433]:
              - text: For ZDR eligibility across all features, see
              - link "API and data retention" [ref=f24e434] [cursor=pointer]:
                - /url: /docs/en/manage-claude/api-and-data-retention
              - text: .
            - heading "Limitations and constraints" [level=2] [ref=f24e435]:
              - generic [ref=f24e437]: Limitations and constraints
            - paragraph [ref=f24e438]: Understanding these limitations helps you plan your Skills deployment effectively. Claude Platform on AWS and Microsoft Foundry follow the same limitations as the Claude API in the following subsections.
            - heading "Cross-surface availability" [level=3] [ref=f24e439]:
              - generic [ref=f24e441]: Cross-surface availability
            - paragraph [ref=f24e442]:
              - strong [ref=f24e443]: Custom Skills do not sync across surfaces
              - text: ". Skills uploaded to one surface are not automatically available on others:"
            - list [ref=f24e444]:
              - listitem [ref=f24e445]: • Skills uploaded to claude.ai must be separately uploaded to the API
              - listitem [ref=f24e446]: • Skills uploaded through the API are not available on claude.ai
              - listitem [ref=f24e447]: • Claude Code Skills are filesystem-based and separate from both claude.ai and API
            - paragraph [ref=f24e448]: You'll need to manage and upload Skills separately for each surface where you want to use them.
            - heading "Sharing scope" [level=3] [ref=f24e449]:
              - generic [ref=f24e451]: Sharing scope
            - paragraph [ref=f24e452]: "Skills have different sharing models depending on where you use them:"
            - list [ref=f24e453]:
              - listitem [ref=f24e454]:
                - text: •
                - strong [ref=f24e455]: claude.ai
                - text: ": Individual user only; each team member must upload separately"
              - listitem [ref=f24e456]:
                - text: •
                - strong [ref=f24e457]: Claude API
                - text: ": Workspace-wide; all workspace members can access uploaded Skills"
              - listitem [ref=f24e458]:
                - text: •
                - strong [ref=f24e459]: Claude Code
                - text: ": Personal ("
                - code [ref=f24e460]: ~/.claude/skills/
                - text: ) or project-based (
                - code [ref=f24e461]: .claude/skills/
                - text: ); can also be shared via Claude Code Plugins
            - paragraph [ref=f24e462]: claude.ai does not support centralized admin management or org-wide distribution of custom Skills.
            - heading "Runtime environment constraints" [level=3] [ref=f24e463]:
              - generic [ref=f24e465]: Runtime environment constraints
            - paragraph [ref=f24e466]: The exact runtime environment available to your skill depends on the product surface where you use it.
            - list [ref=f24e467]:
              - listitem [ref=f24e468]:
                - text: •
                - strong [ref=f24e469]: claude.ai
                - text: ":"
                - list [ref=f24e470]:
                  - listitem [ref=f24e471]:
                    - text: •
                    - strong [ref=f24e472]: Varying network access
                    - text: ": Depending on user/admin settings, Skills may have full, partial, or no network access. For more details, see the"
                    - link "Create and Edit Files" [ref=f24e473] [cursor=pointer]:
                      - /url: https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude#h_6b7e833898
                    - text: support article.
              - listitem [ref=f24e474]:
                - text: •
                - strong [ref=f24e475]: Claude API
                - text: ":"
                - list [ref=f24e476]:
                  - listitem [ref=f24e477]:
                    - text: •
                    - strong [ref=f24e478]: No network access
                    - text: ": Skills cannot make external API calls or access the internet"
                  - listitem [ref=f24e479]:
                    - text: •
                    - strong [ref=f24e480]: No runtime package installation
                    - text: ": Only pre-installed packages are available. You cannot install new packages during execution."
                  - listitem [ref=f24e481]:
                    - text: •
                    - strong [ref=f24e482]: Pre-configured dependencies only
                    - text: ": Check the"
                    - link "code execution tool documentation" [ref=f24e483] [cursor=pointer]:
                      - /url: /docs/en/agents-and-tools/tool-use/code-execution-tool
                    - text: for the list of available packages
              - listitem [ref=f24e484]:
                - text: •
                - strong [ref=f24e485]: Claude Code
                - text: ":"
                - list [ref=f24e486]:
                  - listitem [ref=f24e487]:
                    - text: •
                    - strong [ref=f24e488]: Full network access
                    - text: ": Skills have the same network access as any other program on the user's computer"
                  - listitem [ref=f24e489]:
                    - text: •
                    - strong [ref=f24e490]: Global package installation discouraged
                    - text: ": Skills should only install packages locally in order to avoid interfering with the user's computer"
            - paragraph [ref=f24e491]: Plan your Skills to work within these constraints.
