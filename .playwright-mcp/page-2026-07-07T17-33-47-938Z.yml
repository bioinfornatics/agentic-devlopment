            - heading "The Skills architecture" [level=3] [ref=f24e221]:
              - generic [ref=f24e223]: The Skills architecture
            - paragraph [ref=f24e224]: "Skills run in a code execution environment where Claude has filesystem access, bash commands, and code execution capabilities. Think of it like this: Skills exist as directories on a virtual machine, and Claude interacts with them using the same bash commands you'd use to navigate files on your computer."
            - paragraph [ref=f24e225]:
              - img "Agent Skills Architecture - showing how Skills integrate with the agent's configuration and virtual machine" [ref=f24e226]
            - paragraph [ref=f24e227]:
              - strong [ref=f24e228]: "How Claude accesses Skill content:"
            - paragraph [ref=f24e229]: When a Skill is triggered, Claude uses bash to read SKILL.md from the filesystem, bringing its instructions into the context window. If those instructions reference other files (like FORMS.md or a database schema), Claude reads those files too using additional bash commands. When instructions mention executable scripts, Claude runs them via bash and receives only the output (the script code itself never enters context).
            - paragraph [ref=f24e230]:
              - strong [ref=f24e231]: "What this architecture enables:"
            - paragraph [ref=f24e232]:
              - strong [ref=f24e233]: On-demand file access
              - text: ": Claude reads only the files needed for each specific task. A Skill can include dozens of reference files, but if your task only needs the sales schema, Claude loads just that one file. The rest remain on the filesystem consuming zero tokens."
            - paragraph [ref=f24e234]:
              - strong [ref=f24e235]: Efficient script execution
              - text: ": When Claude runs"
              - code [ref=f24e236]: validate_form.py
              - text: ", the script's code never loads into the context window. Only the script's output (like \"Validation passed\" or specific error messages) consumes tokens. This makes scripts far more efficient than having Claude generate equivalent code on the fly."
            - paragraph [ref=f24e237]:
              - strong [ref=f24e238]: No practical limit on bundled content
              - text: ": Because files don't consume context until accessed, Skills can include comprehensive API documentation, large datasets, extensive examples, or any reference materials you need. There's no context penalty for bundled content that isn't used."
            - paragraph [ref=f24e239]: This filesystem-based model is what makes progressive disclosure work. Claude navigates your Skill like you'd reference specific sections of an onboarding guide, accessing exactly what each task requires.
            - 'heading "Example: Loading a PDF processing skill" [level=3] [ref=f24e240]':
              - generic [ref=f24e242]: "Example: Loading a PDF processing skill"
            - paragraph [ref=f24e243]: "Here's how Claude loads and uses a PDF processing skill:"
            - list [ref=f24e244]:
              - listitem [ref=f24e245]:
                - strong [ref=f24e246]: Startup
                - text: ": System prompt includes:"
                - code [ref=f24e247]: PDF Processing - Extract text and tables from PDF files, fill forms, merge documents
              - listitem [ref=f24e248]:
                - strong [ref=f24e249]: User request
                - text: ": \"Extract the text from this PDF and summarize it\""
              - listitem [ref=f24e250]:
                - strong [ref=f24e251]: Claude invokes
                - text: ":"
                - code [ref=f24e252]: "bash: read pdf-skill/SKILL.md"
                - text: → Instructions loaded into context
              - listitem [ref=f24e253]:
                - strong [ref=f24e254]: Claude determines
                - text: ": Form filling is not needed, so FORMS.md is not read"
              - listitem [ref=f24e255]:
                - strong [ref=f24e256]: Claude executes
                - text: ": Uses instructions from SKILL.md to complete the task"
            - paragraph [ref=f24e257]:
              - img "Skills loading into context window - showing the progressive loading of skill metadata and content" [ref=f24e258]
            - paragraph [ref=f24e259]: "The diagram shows:"
            - list [ref=f24e260]:
              - listitem [ref=f24e261]: Default state with system prompt and skill metadata pre-loaded
              - listitem [ref=f24e262]: Claude triggers the skill by reading SKILL.md via bash
              - listitem [ref=f24e263]: Claude optionally reads additional bundled files like FORMS.md as needed
              - listitem [ref=f24e264]: Claude proceeds with the task
            - paragraph [ref=f24e265]: This dynamic loading ensures only relevant skill content occupies the context window.
