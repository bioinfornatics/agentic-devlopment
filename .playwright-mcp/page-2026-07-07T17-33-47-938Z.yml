            - heading "How Skills work" [level=2] [ref=f24e115]:
              - generic [ref=f24e117]: How Skills work
            - paragraph [ref=f24e118]: Skills leverage Claude's VM environment to provide capabilities beyond what's possible with prompts alone. Claude operates in a virtual machine with filesystem access, allowing Skills to exist as directories containing instructions, executable code, and reference materials, organized like an onboarding guide you'd create for a new team member.
            - paragraph [ref=f24e119]:
              - text: This filesystem-based architecture enables
              - strong [ref=f24e120]: progressive disclosure
              - text: ": Claude loads information in stages as needed, rather than consuming context upfront."
            - heading "Three types of Skill content, three levels of loading" [level=3] [ref=f24e121]:
              - generic [ref=f24e123]: Three types of Skill content, three levels of loading
            - paragraph [ref=f24e124]: "Skills can contain three types of content, each loaded at different times:"
            - 'heading "Level 1: Metadata (always loaded)" [level=3] [ref=f24e125]':
              - generic [ref=f24e127]: "Level 1: Metadata (always loaded)"
            - paragraph [ref=f24e128]:
              - strong [ref=f24e129]: "Content type: Instructions"
              - text: ". The Skill's YAML frontmatter provides discovery information:"
            - generic [ref=f24e130]:
              - code [ref=f24e134]:
                - generic [ref=f24e135]: "---"
                - generic [ref=f24e136]: "name: pdf-processing"
                - generic [ref=f24e137]: "description: Extract text and tables from PDF files, fill forms, merge documents. Use when working with PDF files or when the user mentions PDFs, forms, or document extraction."
                - generic [ref=f24e138]: "---"
              - button "Copy code" [ref=f24e140] [cursor=pointer]:
                - generic [ref=f24e143]: 
            - paragraph [ref=f24e144]: Claude loads this metadata at startup and includes it in the system prompt. This lightweight approach means you can install many Skills without context penalty; Claude only knows each Skill exists and when to use it.
            - 'heading "Level 2: Instructions (loaded when triggered)" [level=3] [ref=f24e145]':
              - generic [ref=f24e147]: "Level 2: Instructions (loaded when triggered)"
            - paragraph [ref=f24e148]:
              - strong [ref=f24e149]: "Content type: Instructions"
              - text: ". The main body of SKILL.md contains procedural knowledge: workflows, best practices, and guidance:"
