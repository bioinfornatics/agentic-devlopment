                - text: For a deep dive into the architecture and real-world applications of Agent Skills, see the engineering blog post
                - link "Equipping agents for the real world with Agent Skills" [ref=f24e89] [cursor=pointer]:
                  - /url: https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills
                - text: .
            - heading "Using Skills" [level=2] [ref=f24e90]:
              - generic [ref=f24e92]: Using Skills
            - paragraph [ref=f24e93]: Anthropic provides pre-built Agent Skills for common document tasks (PowerPoint, Excel, Word, PDF), and you can create your own custom Skills. Both work the same way. Claude automatically uses them when relevant to your request.
