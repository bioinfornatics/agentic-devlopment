            - heading "Why use Skills" [level=2] [ref=f24e71]:
              - generic [ref=f24e73]: Why use Skills
            - paragraph [ref=f24e74]: "Skills are reusable, filesystem-based resources that provide Claude with domain-specific expertise: workflows, context, and best practices that transform general-purpose agents into specialists. Unlike prompts (conversation-level instructions for one-off tasks), Skills load on-demand and eliminate the need to repeatedly provide the same guidance across multiple conversations."
            - paragraph [ref=f24e75]:
              - strong [ref=f24e76]: Key benefits
              - text: ":"
            - list [ref=f24e77]:
              - listitem [ref=f24e78]:
                - text: •
                - strong [ref=f24e79]: Specialize Claude
                - text: ": Tailor capabilities for domain-specific tasks"
              - listitem [ref=f24e80]:
                - text: •
                - strong [ref=f24e81]: Reduce repetition
                - text: ": Create once, use automatically"
              - listitem [ref=f24e82]:
                - text: •
                - strong [ref=f24e83]: Compose capabilities
                - text: ": Combine Skills to build complex workflows"
            - generic [ref=f24e84]:
              - generic [ref=f24e86]: 
