            - paragraph [ref=f24e169]: When you request something that matches a Skill's description, Claude reads SKILL.md from the filesystem via bash. Only then does this content enter the context window.
            - 'heading "Level 3: Resources and code (loaded as needed)" [level=3] [ref=f24e170]':
