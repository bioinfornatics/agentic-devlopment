      - generic [ref=f55e64]:
        - generic [ref=f55e66]:
          - generic [ref=f55e68]:
            - heading "Agile scrum roles and responsibilities" [level=1] [ref=f55e69]
            - paragraph [ref=f55e71]: The truth about scrum roles, titles and responsibilities
          - generic [ref=f55e76]:
            - button "By Dave West, scrum.org CEO" [ref=f55e77] [cursor=pointer]:
              - paragraph [ref=f55e81]: By Dave West, scrum.org CEO
            - paragraph [ref=f55e85]: Dave West is the product owner and CEO at scrum.org. He is a frequent keynote at major industry conferences and is a widely published author of articles and research reports. He also is the co-author of two books, The Nexus Framework For Scaling Scrum and Head First Object-Oriented Analysis and Design. Reach out to Dave on twitter @DavidJWest
          - generic [ref=f55e86]:
            - generic [ref=f55e87]:
              - paragraph [ref=f55e88]: Get started with the free Jira scrum template
              - paragraph [ref=f55e89]: Streamline your project and easily plan, track, and manage work across sprints. This template includes boards, backlogs, roadmaps, reports, and more!
            - link "Use template Get started with the free Jira scrum template" [ref=f55e91] [cursor=pointer]:
              - /url: /software/jira/templates/scrum
              - text: Use template
        - generic [ref=f55e92]:
          - paragraph [ref=f55e94]: Key Takeaways
          - list [ref=f55e96]:
            - listitem [ref=f55e97]:
              - paragraph [ref=f55e98]: "A Scrum team consists of three core roles: product owner, Scrum master, and development team, each with distinct responsibilities."
            - listitem [ref=f55e99]:
              - paragraph [ref=f55e100]: The product owner manages the backlog and prioritizes work, the Scrum master facilitates the process and removes blockers, and the development team delivers increments of value.
            - listitem [ref=f55e101]:
              - paragraph [ref=f55e102]: Scrum teams are self-organizing, cross-functional, and focused on collaboration and continuous improvement.
            - listitem [ref=f55e103]:
              - paragraph [ref=f55e104]: Clearly define and support each Scrum role to foster team autonomy, accountability, and project success.
          - heading "What are the main roles in a Scrum team?" [level=2] [ref=f55e106]
          - paragraph [ref=f55e108]:
            - text: The main roles in a Scrum team are the Product Owner, Scrum Master, and Development Team. The Product Owner defines and prioritizes the
            - link "product backlog" [ref=f55e109] [cursor=pointer]:
              - /url: /agile/scrum/backlogs
            - text: ", the Scrum Master facilitates the Scrum process, and the Development Team delivers the work. While this is pretty clear, what to do with existing job titles can get confusing. Many teams ask if they need to change their titles when adopting scrum. The short answer is no."
          - paragraph [ref=f55e111]: Each role has distinct responsibilities, but they work closely together to achieve sprint goals. For example, the Product Owner communicates vision and priorities, the Scrum Master removes obstacles, and the Development Team collaborates to build and deliver high-quality increments.
          - paragraph [ref=f55e113]: In this article, we’ll define scrum roles and how you can fold them into your organization, without printing new business cards.
          - heading "Who is the leader of a Scrum team?" [level=3] [ref=f55e115]
          - paragraph [ref=f55e117]:
            - text: A Scrum team does not have a traditional leader; instead, leadership is distributed among the roles. The
            - link "Scrum Master" [ref=f55e118] [cursor=pointer]:
              - /url: /agile/scrum/scrum-master
            - text: leads the process and facilitates meetings, while the Product Owner leads on product vision and priorities. The Development Team is self-organizing and collectively responsible for delivery.
          - paragraph [ref=f55e120]:
            - text: This shared leadership model empowers team members to take ownership and collaborate effectively. For example, the Scrum Master may guide the team through challenges, but decisions about how to do the work and what gets picked up from the
            - link "sprint backlog" [ref=f55e121] [cursor=pointer]:
              - /url: /agile/project-management/sprint-backlog
            - text: are made by the team itself, fostering autonomy and accountability.
          - heading "Scrum roles vs. job titles" [level=2] [ref=f55e123]
          - paragraph [ref=f55e125]:
            - text: The three
            - link "scrum roles" [ref=f55e126] [cursor=pointer]:
              - /url: https://scrumguides.org/scrum-guide.html#team
            - text: describe the key responsibilities for those on the scrum team. They aren’t job titles. This means that any job title, even your existing ones, can be used to perform one of the roles.
          - paragraph [ref=f55e128]: Because the essence of Scrum is empiricism, self-organization, and continuous improvement, the three roles provide a minimum definition of responsibilities and accountability, allowing teams to deliver work effectively. This allows teams to take responsibility for how they organize and continually improve themselves.
          - button "Play Video" [ref=f55e132]:
            - img "Getting started with Jira video thumbnail"
            - img
          - heading "Building a scrum team" [level=2] [ref=f55e134]
          - paragraph [ref=f55e136]: Scrum is a framework for teams to build their processes on top of. It provides the basic structure for regular meetings, artifacts, and who does what.
          - paragraph [ref=f55e138]: What it doesn’t do is provide a one-size-fits-all model for teams to work within. For example, if the team is working on a web insurance application, they will need people who know the technology, the back-end systems, and the business domain. If, on the other hand, the team is working on the next generation of Donkey Kong, the skills needed would be very different. They would include a graphic designer, sound engineer, and graphics developer. Because the problems are different, the team structures and skills needed are also different.
          - paragraph [ref=f55e140]: This gets even harder the more complex the problem a team is trying to solve. As the old saying goes ‘you don’t know what you don’t know, until you know you don’t know it’. Teams might not know the skills or amount of work needed up front, and need the flexibility to change course once they know more.
          - paragraph [ref=f55e142]: To provide some structure to this complex, ever-changing, and often annoying world, scrum gives a lightweight structure with the three scrum roles of development team member, product owner, and scrum master.
          - heading "How many people are in a Scrum team?" [level=3] [ref=f55e144]
          - paragraph [ref=f55e146]: A Scrum team typically consists of 5 to 11 members, including the Product Owner, Scrum Master, and Development Team. This size range is recommended to ensure effective communication, collaboration, and flexibility.
          - paragraph [ref=f55e148]: Smaller teams may struggle with capacity, while larger teams can face coordination challenges. For example, a team of seven often strikes a balance between diverse skills and efficient decision-making, supporting the Scrum principle of small, cross-functional teams.
          - 'heading "The development team: Redefining “developer”" [level=2] [ref=f55e150]'
          - paragraph [ref=f55e152]:
            - text: The development team includes the people that do the work. At first glance, you may think the “
            - link "development team" [ref=f55e153] [cursor=pointer]:
              - /url: https://www.scrum.org/resources/what-is-a-scrum-development-team
            - text: ” means engineers. But that’s not always the case. According to the
            - link "Scrum Guide" [ref=f55e154] [cursor=pointer]:
              - /url: https://www.scrumguides.org/
            - text: ", the development team can be comprised of all kinds of people including designers, writers, programmers, etc."
          - paragraph [ref=f55e156]: You can think of it in the same way as when you have a house project and you hire a developer. They develop the project and do the work. Yes, this might mean they lay bricks, do plumbing, even dig holes, but the person is known as a developer. So, that means the ‘developer’ role in scrum means a team member who has the right skills, as part of the team to do the work.
          - generic:
            - 'img "A diagram showing the development team''s responsibilities: Self organization, design, development, UX, testing, deployment."'
          - paragraph [ref=f55e158]: The development team should be able to self-organize so they can make decisions to get work done. Think of a development team as similar to a production support team that is called in during the night because something has gone wrong. The development team, like the production support team, can make decisions and deliver the fix/value for the problem at hand. Self-organization isn’t about disrespecting the organization, but rather about empowering the people closest to the work to do what’s needed to solve the problem.
          - paragraph [ref=f55e160]: "The development team’s responsibilities include:"
          - list [ref=f55e162]:
            - listitem [ref=f55e163]:
              - paragraph [ref=f55e164]: Delivering the work through the sprint.
            - listitem [ref=f55e165]:
              - paragraph [ref=f55e166]:
                - text: To ensure transparency during the sprint they meet daily at the
                - link "daily scrum" [ref=f55e167] [cursor=pointer]:
                  - /url: /agile/scrum/standups
                - text: ( sometimes called a standup). The daily scrum provides transparency to the work and provides a dedicated place for team members to seek help, talk about success and highlight issues and blockers. The scrum master might facilitate the daily scrum, but ultimately it is the responsibility of the development team to run this meeting. It is their meeting to help them, as a group, to inspect and adapt the work they are doing and work in a more effective way.
          - 'heading "The product owner: Setting clear direction" [level=2] [ref=f55e169]'
          - paragraph [ref=f55e171]:
            - text: Scrum product owners understand the customer and business requirements, then create and manage the
            - link "product backlog" [ref=f55e172] [cursor=pointer]:
              - /url: /agile/project-management/sprint-backlog
            - text: based on those requirements. Since agile teams are, by design, flexible and responsive, it is the responsibility of the
            - link "product owner" [ref=f55e173] [cursor=pointer]:
              - /url: https://www.scrum.org/pathway/product-owner-learning-path
            - text: to ensure that they are delivering the most value. The business is represented by the product owner who tells the development what is important to deliver. Trust between these two roles is crucial.
          - paragraph [ref=f55e175]: The product owner should not only understand the customer but also have a vision for the value the scrum team is delivering to the customer. The product owner also balances the needs of other stakeholders in the organization.
          - paragraph [ref=f55e177]: So the product owner must take all these inputs and prioritize the work. This is probably their most important responsibility because conflicting priorities and unclear directions will not only reduce the effectiveness of the team but also could break the important trust relationship that the business has with the development team.
          - paragraph [ref=f55e179]: Agile teams are designed to inspect and adapt. That means a change in priority may lead to a massive change to the team structure, work products, as well as the end result. It is, therefore, crucial for scrum teams to be successful and that only one person sets the priority. That person is the product owner.
          - paragraph [ref=f55e181]: "The Scrum Guide defines the product owners responsibilities as:"
          - list [ref=f55e183]:
            - listitem [ref=f55e184]:
              - paragraph [ref=f55e185]:
                - text: Managing the scrum backlog - This does not mean that they are the only one putting in new product backlog Items into the backlog. But ultimately they are responsible for the backlog that the development team pulls to deliver from. That means the product owner should know about everything that is in the backlog and other people that add items to the product backlog should ensure that they communicate with the product owner. We even offer a
                - link "free scrum template" [ref=f55e186] [cursor=pointer]:
                  - /url: /software/jira/templates/scrum
                - text: that makes it easy to get your backlog up and running.
            - listitem [ref=f55e187]:
              - paragraph [ref=f55e188]:
                - text: Release management - The sprint is not a release cycle, but instead a planning cycle. That means that scrum teams can deliver at any time. Ideally, they would deliver frequently throughout the sprint allowing the
                - link "sprint review" [ref=f55e189] [cursor=pointer]:
                  - /url: /agile/scrum/sprint-reviews
                - text: to review real customer usage and feedback. However continuous delivery is not always possible and other release models are required. It is important for the product owner to know when things can and should be released.
            - listitem [ref=f55e190]:
              - paragraph [ref=f55e191]: Stakeholder management - Any product will have many stakeholders involved ranging from users, customers, governance and organizational leadership. The product owner will have to work with all these people to effectively ensure that the development team is delivering value. That can mean a large amount of stakeholder management and communication.
          - generic:
            - 'img "A diagram showing the product owner''s responsibilities: Manage the product backlog, release management, stakeholder management."'
          - 'heading "The scrum master: Holding it all together" [level=2] [ref=f55e193]'
          - paragraph [ref=f55e195]:
            - text: The
            - link "scrum master" [ref=f55e196] [cursor=pointer]:
              - /url: /agile/scrum/scrum-master
            - text: is the role responsible for gluing everything together and ensuring that scrum is being done well. In practical terms, that means they help the product owner define value, the development team deliver the value, and the scrum team to get to get better. The scrum master is a servant leader which not only describes a supportive style of leadership but describes what they do on a day-to-day basis.
          - paragraph [ref=f55e198]: They serve the product owner by helping them better understand and communicate value, to manage the backlog, help them plan the work with the team and break down that work to deliver the most effective learning. Serving the development team, the scrum master helps them self-organize, focus on outcomes, get to a “done increment,” and manage blockers. The scrum master also serves the organization at large, helping them understand what scrum is and create an environment that supports scrum.
          - generic:
            - 'img "A diagram showing the scrum master''s responsibilities: Transparency, Empiricism, Self organization, Scrum values, Protecting the team, Remove blockers."'
          - paragraph [ref=f55e200]: "The scrum master focuses on:"
          - list [ref=f55e202]:
            - listitem [ref=f55e203]:
              - paragraph [ref=f55e204]: Transparency - To effectively inspect and adapt it is important that the right people can see what is going on. But this is actually much harder than it looks. The scrum master is tasked with ensuring that the scrum team works in a transparent way. Examples include creating story maps and updating Confluence pages with retrospective ideas.
            - listitem [ref=f55e205]:
              - paragraph [ref=f55e206]: Empiricism - A fundamental for scrum and agile approaches the idea that the best way of planning is to do work and learn from it. The empirical process is not easy and requires the scrum master to coach the scrum team on breaking down work, describing clear outcomes, and reviewing those outcomes.
            - listitem [ref=f55e207]:
              - paragraph [ref=f55e208]:
                - text: Self-organization - Telling a development team they can self-organize does mean that the team will self-organize. In fact, self-organization comes over time and requires help and support. The scrum master will encourage team members to step outside their comfort zone and try different things and use practices such as ‘
                - link "delegation poker" [ref=f55e209] [cursor=pointer]:
                  - /url: https://management30.com/product/delegation-poker/
                - text: ’ to expose and challenge predefined ideas about role boundaries and responsibilities.
            - listitem [ref=f55e210]:
              - paragraph [ref=f55e211]:
                - text: Values - Scrum defines
                - link "5 values" [ref=f55e212] [cursor=pointer]:
                  - /url: https://www.scrum.org/resources/scrum-values-poster
                - text: of courage, focus, commitment, respect, and openness not because they are nice to have, but because they create an environment of physiological safety and trust. This environment is necessary for agility to thrive. Following the values is the responsibility of everyone in the scrum team, but the scrum master takes an active role in encouraging and reminding everyone of the importance of those values.
          - paragraph [ref=f55e214]:
            - text: The scrum master serves the product owner in
            - link "sprint planning" [ref=f55e215] [cursor=pointer]:
              - /url: /agile/scrum/sprint-planning
            - text: and sprint reviews, ensuring that value is clearly being described and direction set. They serve the development team in the daily scrum by ensuring that work is happening and that blockers are being removed. They also take responsibility for blockers that are outside of the team's ability to resolve. The scrum master ensures that every opportunity to improve is made transparent to the scrum team and the
            - link "retrospective" [ref=f55e216] [cursor=pointer]:
              - /url: /team-playbook/plays/retrospective
            - text: has a clear set of outcomes that can be executed.
          - heading "Get started with agile scrum roles" [level=2] [ref=f55e218]
          - paragraph [ref=f55e220]: "The three scrum roles are pretty simple in describing the three major areas of responsibility on any scrum team, but often it is hard to map them to your own job title. So here is a starter:"
          - list [ref=f55e222]:
            - listitem [ref=f55e223]:
              - paragraph [ref=f55e224]: If you have lots of great skills for delivering customer value and that is what excites you, then you should be a scrum development team member. In fact, the team is the most important element of any agile organization as they actually deliver value to customers and stakeholders. That means that seniority is determined by how much you deliver value or help others do it.
            - listitem [ref=f55e225]:
              - paragraph [ref=f55e226]: If you are passionate about the customer, managing stakeholders, and the business domain, then the product owner role would be best suited to your desires. In most organizations, this person needs to have the respect and trust of the business, so they can make decisions. The role also requires some level of politicking as you negotiate trade-offs and keep everyone happy.
            - listitem [ref=f55e227]:
              - paragraph [ref=f55e228]: If you want to help teams work effectively together and also want to change the world with scrum and agile, then the scrum master role is for you; a very people-centric role with a heavy emphasis on coaching, teaching, and facilitation.
