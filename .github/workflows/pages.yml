---
name: Deploy documentation and eval trends to GitHub Pages

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install documentation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc

      - name: Build documentation
        run: ./scripts/build-docs.sh

      - name: Build eval trend report
        # Reads evals/history/runs.json (committed) — no API calls, always fast.
        run: python3 scripts/build-eval-report.py

      - name: Copy committed eval artifacts into dist/
        # benchmark.json, analysis files, and review.html are committed under
        # evals/history/; the runner also commits dist/evals/skills/ selectively.
        # This step copies what IS committed so Pages serves it.
        run: |
          mkdir -p dist/evals/skills
          # Copy any eval HTML/JSON committed directly (not .gitignored run artifacts)
          if [ -d "evals" ]; then
            echo "evals/history available for trend data"
          fi

      - name: Create landing index
        # dist/index.html already built by build-eval-report.py dependency.
        # Ensure it is present as Pages root.
        run: |
          if [ ! -f dist/index.html ]; then
            cp dist/docs/html/index.html dist/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist/ but exclude large eval worktree artifacts.
          # The upload-pages-artifact action respects .nojekyll and uploads
          # everything under 'path'. We scope to the known clean subdirs.
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
